, {"heading": "Key Takeaway", "body": "You have the power to see through marketing tricks and check if health information is true. When you see an ad or hear a health claim: 1. Spot the marketing tactic 2. Ask the 3 questions 3. Make your decision based on facts, not manipulation. If a company is spending money to convince you, ask yourself: who benefits?"}], "remember": ["Companies spend millions designing messages to make substances seem harmless, fun, and socially necessary.", "Recognizing these tactics is the first step to making your own informed decisions.", "If a company is spending money to convince you, ask yourself: who benefits?", "Not all health information is trustworthy -- you need to check WHO created it, WHY, and WHAT evidence supports it.", "Asking these three questions protects you from making decisions based on lies or incomplete information.", "Health messages that use facts and data are more credible, but emotional messages often spread faster.", "Understanding HOW messages work helps you make better decisions about what to believe."], "vocabulary": [], "reflection": ["Which marketing tactic do you think is hardest for young people to resist? Why?"], "practiceAtHome": ["Test It Out! Practice using the 3-Question Check. Think of a health claim you've heard recently (about substances, fitness, mental health, or anything else). Write it down and answer the three questions. Health claim I've heard: [write it]. 1. WHO made this claim? 2. WHY did they share it? 3. WHAT evidence supports it? Is this claim trustworthy? (Circle one): Yes / Maybe / No"]}, {"id": 24, "module": "M06", "title": "Standing Strong -- Refusal Skills for Real Situations", "learning": ["Students can name five refusal strategies and identify three types of peer pressure (direct, indirect, internal).", "Students feel confident that they can refuse substances even when facing persistent pressure, and believe that saying no is a sign of strength.", "Students demonstrate at least two refusal strategies through role-play practice with a partner."], "keyConcepts": [{"heading": "Three Types of Peer Pressure", "body": "Peer pressure isn't always someone standing in front of you and pushing. It can be subtle -- what you see around you -- or even come from inside your own mind. Recognizing the type of pressure helps you choose the right response."}, {"heading": "1. Direct Pressure", "body": "Someone directly offers you something or pushes you to do it. Example: 'Come on, just try it. One sip won't hurt.' The pressure is clear and in your face."}, {"heading": "2. Indirect Pressure", "body": "No one says anything directly, but you feel pressure from what you see around you. Example: everyone at a gathering is drinking, and no one offers you anything, but you feel like you should drink too to fit in. The pressure comes from the situation, not from words."}, {"heading": "3. Internal Pressure", "body": "Pressure from your own thoughts. Example: 'Maybe I should try it so people think I'm cool,' or 'I'm so stressed -- maybe this would help me relax.' No one is pushing you except your own mind."}, {"heading": "The 5 Refusal Strategies", "body": "Use these strategies when someone pressures you to use substances. You can use one strategy or combine several."}, {"heading": "1. Say it straight", "body": "Be direct and clear -- no hesitation, no apology. Example phrase: 'No thanks, I don't drink.'"}, {"heading": "2. Give a reason", "body": "Offer a specific reason (real or made-up). Example phrase: 'I can't -- I have practice early tomorrow.'"}, {"heading": "3. Suggest an alternative", "body": "Redirect to a different activity or choice. Example phrase: 'Let's go play football instead.'"}, {"heading": "4. Reverse the pressure", "body": "Turn the question back on the person pressuring you. Example phrase: 'Why does it matter to you if I drink or not?'"}, {"heading": "5. Walk away", "body": "Remove yourself from the situation -- no explanation needed. Example phrase: 'I've got to go. See you later.'"}, {"heading": "Using Assertive Communication", "body": "Make eye contact. Keep your voice steady. Use 'I' statements -- 'I don't want to' rather than 'You shouldn't.' Keep your response short. You can always combine strategies. 'No' is a complete sentence."}, {"heading": "Key Messages for Refusal Under Pressure", "body": "In real life, people don't always accept your first 'no.' They might push harder -- and you can keep standing strong. Saying no gets easier with practice -- that's why we're rehearsing. Having more than one strategy gives you options depending on the situation. You never need to explain yourself to anyone -- 'No' is a complete sentence. Walking away is ALWAYS an option and is NEVER a sign of weakness."}, {"heading": "If I Feel Pressure Rising", "body": "I will use my emotional regulation skills from Module 1 (deep breathing, counting to 10) to stay calm and think clearly."}, {"heading": "If Someone Won't Accept My 'No'", "body": "I will repeat my refusal using a different strategy, or I will walk away. Walking away is always an option and is never a sign of weakness."}], "remember": ["Saying no to substances is a skill that can be learned and strengthened through practice.", "There are multiple ways to say no -- you don't have to use the same strategy every time.", "You can combine strategies -- give a reason AND walk away, say it straight AND suggest an alternative.", "Saying no is a skill. Like any skill -- playing football, solving a math problem, cooking -- it gets easier with practice.", "You don't need to justify your decision to anyone. 'No' is a complete sentence.", "Walking away is always an option -- it's not weakness, it's wisdom."], "vocabulary": [], "reflection": ["Which round was hardest? Why?", "Which strategies felt most natural to you?", "How did it feel when you successfully refused, even under pressure?", "Did anyone find themselves combining strategies -- like giving a reason and then walking away?", "In one word, how do you feel after practicing refusal skills today?"], "practiceAtHome": ["My Personal Plan (from Pocket Card): My go-to strategy: [fill in]. My go-to phrase: [fill in]. If I feel pressure rising: I will use my emotional regulation skills from Module 1 (deep breathing, counting to 10) to stay calm and think clearly. If someone won't accept my 'no': I will repeat my refusal using a different strategy, or I will walk away. Walking away is always an option and is never a sign of weakness."]}, {"id": 25, "module": "M06", "title": "My Strengths, My Choices", "learning": ["Students can identify at least three personal strengths that support healthy decision-making and describe how peer advocacy can influence substance use norms.", "Students feel confident in their ability to resist substance use pressure and believe they can positively influence their peers' health choices.", "Students create a personal substance-free action plan identifying their strengths, one trusted adult, and two healthy alternative activities."], "keyConcepts": [{"heading": "My Strengths Shield -- Section 1", "body": "Everyone has strengths -- things you're good at, values you hold, people who support you, and moments when you've done the right thing. These strengths are your ARMOR for making healthy choices. Fill in each section of your shield below."}, {"heading": "Top-left: Something I'm good at", "body": "This is a skill, talent, or ability. It could be schoolwork, sports, cooking, fixing things, taking care of siblings, art, music -- anything you do well."}, {"heading": "Top-right: Something I value", "body": "What matters most to you? Family? Education? Health? Faith? Sports? Being a good friend? Honesty? Your future?"}, {"heading": "Bottom-left: Someone who supports me", "body": "This is a trusted adult or friend who cares about you and wants you to succeed. It could be a parent, grandparent, teacher, coach, pastor, older sibling, or friend."}, {"heading": "Bottom-right: A time I stood up for what was right", "body": "Think of a moment -- even a small one -- when you did something you believed was right, even if it was hard."}, {"heading": "Key Messages -- My Strengths Inventory", "body": "Your strengths are not just abstract ideas -- they are practical tools for making healthy choices. Knowing your strengths makes it EASIER to say no because you know what you're protecting. Everyone has strengths, even if they don't always recognize them."}, {"heading": "Health Advocate Challenge -- Key Messages", "body": "You don't have to wait for adults to spread health messages -- YOU can be the advocate. The most powerful health messages come from peers who understand each other's reality. Creating a health message reinforces your own knowledge and commitment."}, {"heading": "Example Health Messages", "body": "'Your brain is still growing until age 25. Why let alcohol slow it down?' // '67 out of 100 TCC students don't vape. You're not the odd one out for saying no.' // 'Companies spend millions to convince you to try their product. Don't give them what they want -- your health.'"}, {"heading": "My Substance-Free Action Plan -- Section 2", "body": "Now it's time to make a plan -- YOUR plan -- for staying substance-free and supporting your health. Fill in each item below."}, {"heading": "1. My top refusal strategy (from Session 24)", "body": "Choose ONE: Simple Refusal, Explanation, Repeated Refusal, Reverse the Pressure, Walk Away/Suggest an Alternative."}, {"heading": "2. My go-to refusal phrase", "body": "Write the exact words you would say."}, {"heading": "3. My trusted adult", "body": "This is someone you can talk to if you need help or support."}, {"heading": "4. Two healthy activities I enjoy instead", "body": "What do you do for fun? What makes you feel good?"}, {"heading": "5. One strength that helps me make good choices", "body": "Pull this from your Strengths Shield above."}, {"heading": "6. My personal commitment", "body": "Finish this sentence honestly: 'I commit to _______________________________________________ because _______________________________________________.''"}, {"heading": "Keep This Toolkit", "body": "This plan is yours. You can: Fold it up and keep it in your pocket or bag; Tape it inside your notebook; Take it home and put it somewhere you'll see it; Update it anytime as you grow and learn. This plan is not a promise that nothing hard will ever happen -- it's a reminder of what you know, what you value, who supports you, and what you've committed to. In a moment when you're not sure what to do, that reminder can make all the difference."}, {"heading": "Module Closing -- What We Learned", "body": "In Session 22, we learned how substances like alcohol, vaping, and cannabis affect the developing brain -- especially the prefrontal cortex, which controls decision-making, impulse control, and planning. We also learned that MOST TCC students are making healthy choices -- you are not the odd one out if you say no. In Session 23, we learned to see through the marketing tricks that companies use to target young people. We built a 3-Question Check for evaluating health claims: Is it truthful? Does it have a clear purpose? Does it use evidence? In Session 24, we identified three types of peer pressure -- direct, indirect, and individual -- and we practiced five refusal strategies through role-play: Simple Refusal, Explanation, Repeated Refusal, Reverse the Pressure, and Walk Away or Suggest an Alternative. And today, in Session 25, we identified our personal strengths through the Strengths Shield, created health advocacy messages for our peers, and built a personal action plan for staying substance-free. You now have knowledge, critical thinking tools, refusal skills, and a personal plan. That is a powerful combination."}], "remember": ["Your strengths are real. They matter. And they are tools you can use to make healthy choices, including saying no to substances.", "A plan is not a promise that nothing hard will ever happen -- it's a reminder of what you already know and who can help.", "Having a plan BEFORE you face pressure makes it easier to respond in the moment.", "You can update this plan anytime as you grow and learn.", "If you ever need to talk to someone about anything we discussed in this module, [facilitator/counsellor name] is available. You don't have to go through anything alone.", "The skills you've practiced in this module don't exist in isolation. The emotional regulation techniques you learned in Module 1, the assertive communication skills from Module 4, and the mental health awareness and self-care practices from Module 5 all work together. You are building a complete toolkit for a healthy life."], "vocabulary": [], "reflection": ["What is ONE thing from these four sessions that you will carry with you? It could be a fact, a strategy, a feeling, or a commitment.", "Which student-created health messages were most convincing? What made them effective?", "What would you want your younger sibling or a friend to know about substances?", "What's one marketing trick you want people to watch out for?"], "practiceAtHome": ["Complete your Strengths Shield: (1) Something I'm good at, (2) Something I value, (3) Someone who supports me, (4) A time I stood up for what was right.", "Complete your Substance-Free Action Plan: (1) My top refusal strategy, (2) My go-to refusal phrase, (3) My trusted adult, (4) Two healthy activities I enjoy instead, (5) One strength that helps me make good choices, (6) My personal commitment: 'I commit to ___ because ___.'", "Share one strength you have with a family member or close friend that helps you make healthy choices."]}, {"id": 26, "module": "M07", "title": "Our Environment, Our Health -- How Environmental Conditions Affect Us", "learning": ["Students can define environmental health and identify at least three environmental hazards relevant to Toledo District (agricultural chemicals, water quality issues, hurricane debris).", "Students believe that environmental conditions directly affect their personal health and that understanding environmental risks is empowering.", "Students can identify the exposure route (inhalation, ingestion, skin contact) for a given environmental hazard scenario."], "keyConcepts": [{"heading": "What Is Environmental Health?", "body": "Environmental health is the study of how things in our environment affect people's health. This includes the air we breathe, the water we drink, the food we eat, the land we walk on, and even the weather."}, {"heading": "Toxicity", "body": "Toxicity means how harmful something is. Some things in our environment are more harmful than others, and the amount of exposure matters too. Toxicity is about understanding that not all environmental exposures are equal. Some things are more dangerous than others, and knowing which ones are most toxic helps us protect ourselves."}, {"heading": "Exposure -- Three Routes", "body": "Exposure is how hazards actually get into our bodies. There are three routes of exposure: Route number one: inhalation -- breathing in. Hazards enter your body through your nose and mouth and go into your lungs. Route number two: ingestion -- swallowing. Hazards enter your body through your mouth and go into your stomach and digestive system. Route number three: dermal contact -- through the skin. Hazards enter your body through your skin, especially if you have cuts or if the substance is very strong."}, {"heading": "Vulnerability -- Who Is Most at Risk", "body": "Not everyone is equally affected by environmental hazards. Some people are more vulnerable. Children are more vulnerable because their bodies are still developing. They breathe faster, they put things in their mouths, they play on the ground near chemicals. Pregnant women are more vulnerable because hazards can affect their baby. Elderly people are more vulnerable because their bodies may not be as strong at fighting off illness. And outdoor workers -- farmers, fishers, construction workers -- are more vulnerable because they spend more time exposed to sun, chemicals, and weather."}, {"heading": "Environmental Justice", "body": "Environmental justice means that not everyone faces the same environmental risks -- and that is not fair. Environmental justice means recognising that some communities bear more environmental risk than others, and working to change that. It means that everyone deserves clean air, clean water, and a safe place to live -- no matter where they are from or how much money they have."}, {"heading": "Environmental Hazards in Toledo District", "body": "Many health problems start with environmental conditions. People in Toledo District face specific environmental health challenges: pesticide spray on farms (inhalation, skin contact), untreated drinking water (ingestion), smoke from milpa burning (inhalation), mould after flooding (inhalation, skin contact), and chemical handling without gloves (skin contact). Once you can identify the hazard and the exposure route, you have already taken the first step toward protecting yourself and others. You cannot solve a problem you cannot name."}], "remember": ["Environmental health is the study of how things in our environment affect people's health.", "Toxicity means how harmful a substance is -- some things are more toxic than others.", "Exposure is when a hazard comes into contact with your body.", "The three exposure routes are: breathing in (inhalation), swallowing (ingestion), and skin contact (dermal).", "Some people face greater risk from environmental hazards: children, pregnant women, outdoor workers, elderly people.", "Environmental justice is the idea that everyone deserves a healthy environment, regardless of where they live or how much money they have.", "Environmental health is not an abstract topic from a textbook. It is about our neighbours, our families, and ourselves.", "Climate change is not an abstract idea for people in Toledo District. It is something you live with."], "vocabulary": [{"term": "Environmental health", "definition": "The study of how things in our environment affect people's health"}, {"term": "Toxicity", "definition": "How harmful a substance is -- some things are more toxic than others"}, {"term": "Exposure", "definition": "When a hazard comes into contact with your body"}, {"term": "Exposure route", "definition": "The way a hazard enters your body: breathing, swallowing, or skin contact"}, {"term": "Inhalation", "definition": "One of the three routes of exposure. Hazards enter the body through the nose and mouth and into the lungs. Smoke from milpa burning and pesticide drift are common inhalation hazards in Toledo District."}, {"term": "Ingestion", "definition": "One of the three routes of exposure. Hazards enter the body through the mouth and into the digestive system. Drinking contaminated creek water is a common ingestion hazard in Toledo District."}, {"term": "Dermal contact (skin contact)", "definition": "One of the three routes of exposure. Hazards enter the body through the skin, particularly through the hands, arms, or feet. Pesticide handling without gloves and wading through floodwater are common examples in Toledo District."}, {"term": "Vulnerability", "definition": "The degree to which a person is susceptible to harm from an environmental hazard. Children, pregnant women, elderly people, and outdoor workers are generally more vulnerable to environmental health risks."}, {"term": "Environmental justice", "definition": "The principle that all people deserve equal protection from environmental hazards, regardless of race, income, or location. Environmental injustice occurs when some communities bear a disproportionate burden of environmental risk."}, {"term": "Milpa", "definition": "A traditional agricultural practice in Mesoamerica involving slash-and-burn clearing of forest to create farmland. While culturally significant, the burning phase produces smoke that can affect air quality and respiratory health."}], "reflection": ["Were any of these connections between environmental conditions and health effects new to you?", "Which environmental condition do you think affects the most people in your community?", "Which of the four concepts (toxicity, exposure, vulnerability, environmental justice) was newest to you?", "Can you think of an example of environmental injustice in your own community?", "Which scenario felt most familiar to your own experience?", "Were there any scenarios where you were unsure about the exposure route? What made it tricky?", "What is one new thing you learned today that you did not know before?", "Think about YOUR environment -- your home, your school, your community. What is one environmental condition near you that could affect health?"], "practiceAtHome": ["Walk around your home or neighbourhood. Can you spot one environmental hazard? Talk with a family member about it: What is the hazard? How might it affect health? What could be done about it?"]}, {"id": 27, "module": "M07", "title": "Climate, Health, and Our Community -- Tracing the Pathways", "learning": ["Students can trace a complete climate-health pathway (climate driver --> environmental condition --> environmental hazard --> health outcome) for at least one Toledo District scenario.", "Students appreciate that climate-health connections are complex systems with multiple interconnected parts, not simple cause-and-effect chains.", "Students construct a visual climate-health pathway model for a local scenario and identify at least one cross-connection between pathways."], "keyConcepts": [{"heading": "The Four-Step Climate-Health Pathway Model", "body": "Climate change does not cause health problems directly -- it sets off a chain of events through the environment. The four steps are: Step 1: Climate Driver -- the change in climate (for example, more intense rainfall, higher temperatures, or stronger hurricanes). Step 2: Environmental Condition -- what happens in the environment because of that climate driver. Step 3: Environmental Hazard -- the specific danger that appears; the water, air, or land becomes harmful in some way. Step 4: Health Outcome -- what happens to people's health as a result of the hazard. Understanding this chain is powerful -- because it shows us where we can break the chain."}, {"heading": "Example Pathway -- Flooding in Toledo District", "body": "Climate Driver: Heavier rainfall (more intense due to climate change). Environmental Condition: Flooding in low-lying areas of Toledo. Environmental Hazards: (a) Contaminated water -- sewage mixes with floodwater; (b) Standing water -- mosquito breeding grounds; (c) Mould and debris in damaged homes. Health Outcomes: (a) Waterborne illness (diarrhoea, leptospirosis); (b) Dengue fever; (c) Respiratory problems, injuries. Notice: one climate driver can lead to multiple hazards and multiple health outcomes."}, {"heading": "Toledo District Climate Scenarios", "body": "Our community faces multiple climate-health pathways at once: (1) Stronger hurricanes -- flooding, storm surge, destruction -- contaminated water, standing water, mould -- waterborne illness, dengue, injuries, mental health impacts. (2) Longer, hotter dry seasons -- sustained high temperatures -- heat exposure, poor air quality, reduced water -- heatstroke, dehydration, kidney problems, respiratory illness. (3) More frequent agricultural burning due to drought -- smoke and ash in the air -- particulate matter inhaled, ash in water -- respiratory problems, eye irritation, water contamination. (4) Less rain during the growing season -- low water levels, crop failure -- reduced clean water, food insecurity -- dehydration, malnutrition, waterborne illness, mental health impacts."}, {"heading": "Cross-Connections Between Pathways", "body": "The pathways are connected -- they form a map, not four separate chains. Flooding (hurricanes) and drought both affect water quality: too much water contaminates it; too little water concentrates pollutants. Agricultural burning and heat both affect air quality and respiratory health. Hurricanes and drought can both lead to food insecurity. Heat and drought both increase risk of dehydration. Multiple pathways -- hurricanes, heat, drought -- lead to mental health impacts."}, {"heading": "Complex Systems and Systems Thinking", "body": "A complex system has many parts, many connections, and changes spread through the system -- one cause leads to many effects, and changing one part affects many other parts. Within our big climate-health system, there are smaller sub-systems: a water system, an air quality system, and a food system. Systems thinking means looking at how all the parts are connected, instead of just looking at one part at a time. In a complex system, one action can have both positive and negative effects. For example, milpa burning creates smoke that harms lungs, AND it creates fertile soil that feeds families. A simple 'burning is bad' or 'burning is good' answer misses the full picture. Systems thinking helps us find the best places to take action -- the places where one intervention can improve multiple parts of the system at once."}, {"heading": "Connection to Your Own Health", "body": "In Module Five, we talked about the relationship between mental health and physical health -- how they form a system. Today, we are seeing an even bigger system. Our climate, our environment, and our health are all connected. The stress of a hurricane affects mental health. Poor air quality from burning affects physical health. Crop failure from drought affects nutrition, which affects both physical and mental health. Understanding these connections does not have to be frightening. It is actually empowering -- because the more we understand the system, the better we can protect ourselves and our community."}], "remember": ["Climate change does not cause health problems directly -- it sets off a chain of events through the environment.", "The four steps are: climate driver --> environmental condition --> environmental hazard --> health outcome.", "One climate driver can lead to multiple hazards and multiple health outcomes.", "Toledo District faces multiple climate-health pathways at once: hurricanes, heat, agricultural burning, and drought.", "Different pathways are connected -- flooding and drought both affect water quality; burning and heat both affect air.", "A complex system has many parts, many connections, and changes spread through the system.", "Systems thinking means looking at how all the parts are connected, instead of just one part at a time.", "In a complex system, one action can have both positive and negative effects.", "Understanding the system helps us find the best places to take action."], "vocabulary": [{"term": "Climate driver", "definition": "A change in climate conditions (e.g., heavier rainfall, longer droughts, stronger hurricanes)"}, {"term": "Environmental condition", "definition": "What happens in the environment as a result of the climate driver (e.g., flooding, water shortage)"}, {"term": "Environmental hazard", "definition": "The specific thing that directly threatens health (e.g., contaminated water, mosquitoes, mould)"}, {"term": "Health outcome", "definition": "How people's health is affected (e.g., illness, injury, mental health effects)"}, {"term": "Climate-health pathway", "definition": "A step-by-step model showing how a climate driver leads to a health outcome through environmental conditions and environmental hazards. The four steps are: climate driver --> environmental condition --> environmental hazard --> health outcome."}, {"term": "Complex system", "definition": "A system with many interconnected parts, where changes in one part affect many other parts. Climate, environment, and health form a complex system. Contrast with a simple system, which has one cause and one effect."}, {"term": "Cross-connection", "definition": "A link between two or more pathways in a climate-health map, showing that different climate events can produce related environmental hazards or health outcomes. For example, both flooding and drought affect water quality."}, {"term": "Systems thinking", "definition": "An approach to understanding complex problems by looking at how all the parts are connected, rather than examining each part in isolation. Systems thinking recognises that changing one part of a system affects many other parts, and that systems often have both intended and unintended consequences."}, {"term": "Sub-system", "definition": "A smaller system that exists within a larger system. For example, within the climate-health system of Toledo District, there are sub-systems related to water, air quality, and food production."}, {"term": "Milpa", "definition": "A traditional Maya agricultural system in which forest or bush is cut and burned to clear land for planting crops (primarily corn, beans, and squash). The burning releases nutrients into the soil but also produces smoke that affects air quality. Milpa has been practised in the Toledo District and across Mesoamerica for thousands of years."}, {"term": "Particulate matter", "definition": "Tiny particles of solid or liquid matter suspended in the air. Produced by burning (including milpa burning), vehicle exhaust, and industrial processes. When inhaled, particulate matter can penetrate deep into the lungs and cause respiratory problems."}, {"term": "Leptospirosis", "definition": "A bacterial disease spread through contact with water contaminated by animal urine. Common after flooding events. Symptoms include high fever, headache, muscle pain, and in severe cases, organ damage. Sometimes called 'lepto' in Belize."}], "reflection": ["Can you think of other health problems that might come from flooding that we did not include?", "At which point in the chain could someone intervene to prevent the health outcome?", "Which health outcome appeared in the most pathways?", "What surprised you about the connections between groups' pathways?", "Were there any hazards that you had not thought of before today?", "Is the climate-health system simple or complex? Why?", "Name one smaller system you can see within the bigger climate-health system.", "Why is it important to understand the whole system, not just one piece?", "Can you think of a time when fixing one problem created a new problem?", "Name one cross-connection you noticed on the map -- one place where two different pathways are linked."], "practiceAtHome": ["Ask a family member or elder: 'What changes have you noticed in the weather or environment over your lifetime?' Write down what they say and try to trace a pathway from the change they describe to a health effect."]}, {"id": 28, "module": "M07", "title": "Pollution, Food Chains, and Environmental Justice", "learning": ["Students can define bioaccumulation and explain how pollutants concentrate as they move up the food chain; students can define environmental justice and give at least one example of unequal environmental risk.", "Students believe that everyone deserves a healthy environment regardless of where they live, what language they speak, or how much money they have; students recognise that health warnings must be designed for diverse audiences.", "Students design a universal warning label that communicates an environmental hazard without relying on text; students identify at least one health co-benefit of reducing pollution."], "keyConcepts": [{"heading": "Bioaccumulation -- How Pollution Builds Up in the Food Chain", "body": "Pollution enters water systems from many sources -- agricultural runoff, industrial waste, improper garbage disposal, and more. Chemicals from farms can wash into rivers during heavy rain. Mercury from mining and industrial processes can end up in the ocean. These chemicals do not just disappear. They get absorbed by tiny organisms, and then something very interesting -- and very dangerous -- happens. Pollutants build up in living organisms as they move up the food chain. This process is called BIOACCUMULATION. Bio means 'life.' Accumulation means 'building up.' Bioaccumulation is the process by which pollutants build up in living organisms as they move up the food chain. The higher you are in the food chain, the more concentrated the pollution becomes."}, {"heading": "Our Belizean Marine Food Chain", "body": "In Belize, many families depend on fishing. The reef, the rivers, the sea -- they provide food for our communities. In Toledo District, families fish in Port Honduras Marine Reserve, along the coast, and in rivers. Fish is a main source of protein for many people. The food chain has four levels: Level 1 -- Plankton (tiny organisms at the base); Level 2 -- Small fish (sardines, anchovies); Level 3 -- Medium fish (snapper, jack); Level 4 -- Top predators (barracuda, humans who eat fish). There are many plankton, fewer small fish, even fewer medium fish, and very few top predators -- it is shaped like a pyramid. Plankton started with 2-3 pollution tokens each. By the time pollution reaches the top predator, there are 36-54 tokens in one organism. The family did not pour chemicals into the water. They just caught and ate a fish. But that fish had been accumulating pollution through the entire food chain."}, {"heading": "Warning Labels That Work for Everyone", "body": "In the 1970s, the country of Iraq needed wheat to feed its people. They imported wheat seeds from other countries. But these seeds had been treated with a mercury-based fungicide -- a chemical meant to protect the seeds from mould. The seeds were NOT meant to be eaten. The problem was the warning labels. The labels were written in English and Spanish -- languages that most Iraqi farmers could not read. The seeds arrived in colourful bags, and the farmers -- who were hungry and did not understand the warnings -- used the seeds to make bread. Thousands of people were poisoned. Many died. And it happened because a warning label failed. In Belize, we have English, Kriol, Spanish, Q'eqchi', Mopan Maya, and Garifuna speakers -- all in one country. If you needed to warn everyone about a hazard, you could not write it in just one language. The alternative is to design a label that does not need words at all -- using only symbols, colours, and pictures."}, {"heading": "Health Co-Benefits of Reducing Pollution", "body": "A health co-benefit is when one action to help the environment also helps people's health at the same time. For example, if Toledo District reduced the amount of pesticides used on farms: less chemical exposure for farm workers; cleaner water in rivers and wells; safer fish to eat; healthier soil for growing food; fewer respiratory problems from chemical spraying; healthier children in farming communities. Reducing pesticides helps the soil AND reduces cancer risk for workers. Cleaning up a river helps the fish AND gives communities safer drinking water. One action, multiple benefits."}, {"heading": "Environmental Justice", "body": "Environmental justice means that everyone -- regardless of where they live, what language they speak, or how much money they have -- deserves equal protection from environmental hazards. The people who grow the food and live next to the farms face far greater risks than the people who eat the fruit. The farm workers breathe in the chemicals. Their children play in soil that has been sprayed. Their water sources run through treated fields. But they are often the people with the least power to change the situation. That is an environmental justice issue. The Iraq wheat story was also an environmental justice issue. The farmers were poisoned because the people who designed the labels did not think about their needs. When we design warnings that everyone can understand, when we reduce pollution, and when we demand equal protection for all communities -- we are practicing environmental justice."}], "remember": ["Pollutants concentrate as they move up the food chain; this process is called bioaccumulation.", "The higher an organism is in the food chain, the more pollution it accumulates in its body.", "Fishing communities like those in Toledo District are directly affected by water pollution through the food they eat.", "Health warnings must be designed for ALL audiences, regardless of language or literacy level.", "Everyone deserves equal protection from environmental hazards -- that is environmental justice.", "Reducing pollution has co-benefits for both the environment and human health.", "A health co-benefit is when one action to help the environment also helps people's health at the same time.", "Understanding the problem is the first step toward solving it."], "vocabulary": [{"term": "Bioaccumulation", "definition": "The process by which pollutants (such as mercury, pesticides, or industrial chemicals) build up in the tissues of living organisms as they move up the food chain. Organisms at higher levels of the food chain accumulate greater concentrations of pollutants because they consume many organisms from lower levels, each of which contains its own accumulated pollutants."}, {"term": "Food chain", "definition": "A sequence of organisms in which each organism feeds on the one below it. Energy and nutrients move up the food chain from producers (plants, plankton) to primary consumers (small herbivores) to secondary consumers (predators) to top predators. Pollutants also move up the food chain, becoming more concentrated at each level."}, {"term": "Top predator", "definition": "An organism at the highest level of a food chain, with no natural predators of its own. In marine ecosystems, top predators include large fish such as barracuda, sharks, and tuna. Humans who eat fish also function as top predators. Because of bioaccumulation, top predators contain the highest concentrations of pollutants in the food chain."}, {"term": "Environmental justice", "definition": "The principle that all people -- regardless of race, ethnicity, language, income, or geographic location -- deserve equal protection from environmental hazards and equal access to a healthy environment. Environmental injustice occurs when certain communities (often low-income, rural, or indigenous communities) bear a disproportionate burden of environmental pollution and its health consequences."}, {"term": "Health co-benefit", "definition": "Positive health outcomes that result from actions taken to protect the environment. For example, reducing pesticide use on farms (an environmental action) also reduces chemical exposure for farm workers (a health benefit). Co-benefits occur when one action produces benefits in multiple domains simultaneously."}, {"term": "Universal warning label", "definition": "A warning designed to communicate danger to anyone, regardless of language or literacy. Uses symbols, colours, and pictures rather than words."}, {"term": "Mercury", "definition": "A toxic heavy metal that can enter water systems through mining, industrial processes, and atmospheric deposition. Mercury bioaccumulates in fish and shellfish, making it especially dangerous for communities that rely on seafood as a primary food source. Long-term mercury exposure can damage the nervous system, kidneys, and developing brains of children."}, {"term": "Pesticide", "definition": "A chemical substance used to kill or control insects, weeds, fungi, or other organisms that damage crops. While pesticides can increase agricultural productivity, they can also contaminate water sources, harm non-target organisms, and pose health risks to farm workers and nearby communities. Common pesticides used in Belize include those applied to citrus and banana crops."}, {"term": "Pollutant", "definition": "A substance introduced into the environment that has harmful or undesirable effects. Pollutants can be chemical (pesticides, mercury, industrial waste), biological (bacteria, viruses from sewage), or physical (heat, noise). Pollutants enter ecosystems through agricultural runoff, industrial discharge, improper waste disposal, and atmospheric deposition."}], "reflection": ["What happened to the amount of pollution as we went up the food chain?", "Why do top predators have the most pollution even though they did not directly contact the polluted water?", "In Toledo District, which communities might be most affected by bioaccumulation? Why?", "Why is it important that warning labels work for everyone, not just people who can read?", "Who in Belize faces the greatest environmental health risks, and why?", "What is one health co-benefit of reducing pollution in Toledo District?", "How does the concept of environmental justice connect to the simulation we did earlier?", "My observation: As you move UP the food chain, the amount of pollution _________________.", "Why this matters for Toledo District: Many families in our community depend on fishing for food and income. If pollution enters the water near the reef, rivers, or coast, it does not just stay in the water -- it _________________________________."], "practiceAtHome": ["Look at warning labels on products in your home (cleaning supplies, pesticides, medicines). Can you find one that uses symbols? Show a family member your universal warning label from today and ask: 'Can you tell what this label is warning about?'"]}, {"id": 29, "module": "M07", "title": "Resilience and Action -- Protecting Our Community", "learning": ["Students can distinguish between personal adaptation strategies and community-level adaptation strategies for at least one environmental health challenge; students can name at least two community resources relevant to environmental health in Toledo District.", "Students feel confident that they have the knowledge and personal strengths to contribute to their community's environmental health and climate resilience; students believe that young people can make a meaningful difference.", "Students evaluate the pros and cons of at least one adaptation strategy; students develop a simple, actionable community resilience plan for a specific Toledo District environmental health challenge."], "keyConcepts": [{"heading": "Your Environmental Strengths", "body": "You are not helpless in the face of environmental challenges. You have knowledge. You have skills. And you have people around you who care. That is what resilience looks like. It is not about having all the answers. It is about having the tools and the connections to respond. And you have those. Over the past six modules, you have built an amazing set of skills. In Module One, you learned to notice and regulate your emotions -- deep breathing, body scans, grounding techniques. In Module Five, you learned about the mind-body connection, how to manage stress, and how to seek help from trusted adults and community resources. In this module, you have learned about environmental health, climate-health pathways, bioaccumulation, and environmental justice. These are skills for environmental resilience."}, {"heading": "Adaptation -- Personal and Community Strategies", "body": "Adaptation means adjusting to environmental challenges that are already happening -- it is not about waiting for someone else to fix things. Some strategies require individual action, others require collective action -- both are important and both are within reach. PERSONAL strategies = things individuals or families can do (for example: boiling drinking water; wearing protective equipment on farms; having an emergency kit for hurricane season). COMMUNITY strategies = things that require collective effort or government support (for example: testing water sources in villages; planting mangroves for coastal protection; creating community early warning systems). Environmental health challenges cannot be solved by individuals alone, and they cannot be solved by governments alone. We need both."}, {"heading": "Toledo District Environmental Health Challenges", "body": "Four real challenges face Toledo District right now: (1) Hurricane Preparedness -- how do we protect health before, during, and after hurricane season? Think about physical safety, clean water, disease prevention, and mental health. (2) Water Quality -- how do we ensure safe drinking water in rural Toledo communities? Think about contamination sources, testing, treatment, and who is most vulnerable. (3) Pesticide Safety -- how do we reduce health risks from agricultural chemicals on farms? Think about workers, families, children, and the surrounding environment. (4) Heat and Sun Protection -- how do we protect outdoor workers and students from heat-related illness? Think about hydration, shade, scheduling, and warning signs."}, {"heading": "Our Community Resilience Plan -- Five Parts", "body": "A good action plan starts with understanding the issue, identifying who is affected, and taking one concrete first step. Young people have the power to take meaningful action on environmental health issues -- you do not need to wait for permission or for someone else to start. Working together as a community is more powerful than working alone. The five-part plan: (1) THE ISSUE: What is the environmental health challenge? (2) WHO IS AFFECTED: Who in Toledo District is most vulnerable? (3) WHAT WE CAN DO: What is one realistic action that students at TCC could take? (4) WHO CAN HELP: What community resources, organisations, or people could support this action? (5) FIRST STEP: What is the very first thing we would need to do to start?"}, {"heading": "Community Resources in Toledo District", "body": "TIDE (Toledo Institute for Development and Environment) -- environmental conservation, community education, marine protection -- Punta Gorda office. Ministry of Health (Toledo District) -- public health services, water quality, disease prevention -- district hospital, Punta Gorda. Red Cross Belize -- disaster preparedness, emergency response -- local chapter. Village health workers -- primary health care in rural communities -- through village council. TCC teachers and counsellor -- education, support, school-based initiatives -- at school. Local radio stations -- public awareness, community announcements -- WAVE Radio, Love FM."}, {"heading": "Module M07 Review -- What We Learned Across All Four Sessions", "body": "Session 26: Environmental health is the connection between our environment and our health. Environmental hazards in Toledo District: contaminated water, pesticide exposure, hurricane damage, poor air quality from burning. Exposure routes: what we breathe, drink, eat, and touch. Session 27: Climate-health pathways trace how a climate driver leads through a chain of events to a health outcome. These pathways are complex, with many connections and feedback loops. Understanding the pathway helps us find the best places to intervene. Session 28: Bioaccumulation -- pollutants build up in food chains, concentrating at the top. Warning labels must communicate environmental health risks to diverse audiences. Environmental justice -- the communities that contribute least to pollution often suffer the most from it. Session 29: Our personal strengths make us capable of taking action. Adaptation strategies exist at both personal and community levels. Community resilience plans turn knowledge into action."}], "remember": ["Adaptation means adjusting to environmental challenges that are already happening -- it is not about waiting for someone else to fix things.", "Some strategies require individual action, others require collective action -- both are important and both are within reach.", "Evaluating pros and cons helps us choose the best strategies for our specific context.", "Young people have the power to take meaningful action on environmental health issues -- you do not need to wait for permission or for someone else to start.", "A good action plan starts with understanding the issue, identifying who is affected, and taking one concrete first step.", "Working together as a community is more powerful than working alone.", "You have knowledge. You have skills. And you have people around you who care. That is what resilience looks like.", "The skills you used today -- identifying a problem, evaluating strategies, identifying resources, and planning action -- are skills you will use for the rest of your lives.", "The skills you have learned are yours to keep. No one can take them away. Use them."], "vocabulary": [{"term": "Adaptation", "definition": "Adjustments in behaviour, systems, or infrastructure in response to environmental changes that are already occurring or expected. Adaptation reduces vulnerability and increases resilience. Example: building hurricane shelters, installing water filters, planting shade trees."}, {"term": "Personal adaptation strategy", "definition": "An adaptation strategy that an individual or family can implement on their own -- such as boiling water, wearing protective equipment, creating an emergency kit, or staying hydrated during heat waves."}, {"term": "Community-level adaptation strategy", "definition": "An adaptation strategy that requires collective, institutional, or governmental action -- such as building infrastructure, creating policies, or organising community programmes. Cannot be accomplished by a single individual or family."}, {"term": "Resilience", "definition": "The capacity of individuals, communities, or systems to prepare for, respond to, and recover from environmental challenges, hazards, or shocks. Resilience is built on knowledge, skills, social connections, and material resources."}, {"term": "Self-efficacy", "definition": "The belief in one's ability to succeed in specific situations or accomplish a task. In environmental health, self-efficacy refers to the confidence that one has the knowledge, skills, and connections to contribute to community health and environmental protection."}, {"term": "Environmental health", "definition": "The branch of public health that studies how the environment -- air, water, soil, food, built surroundings -- affects human health and well-being. Introduced in Session 26."}, {"term": "Climate-health pathway", "definition": "A chain of events linking a climate driver (such as rising temperatures or increased rainfall) through environmental and social changes to a specific health outcome. Introduced in Session 27."}, {"term": "Bioaccumulation", "definition": "The process by which pollutants build up in the tissues of living organisms over time, often concentrating at higher levels of the food chain. Introduced in Session 28."}, {"term": "Environmental justice", "definition": "The principle that all people, regardless of race, income, or location, have the right to a healthy environment. Environmental injustice occurs when some communities bear a disproportionate burden of pollution or environmental hazards. Introduced in Session 28."}, {"term": "TIDE (Toledo Institute for Development and Environment)", "definition": "A community-based organisation in Toledo District, Belize, focused on conservation, sustainable development, and community empowerment. A key local resource for environmental health action."}, {"term": "Exposure route", "definition": "The pathway by which an environmental hazard enters the human body. The four main routes are inhalation (breathing), ingestion (eating or drinking), dermal absorption (through the skin), and direct contact (e.g., eyes, wounds). Introduced in Session 26."}], "reflection": ["What is one thing you have done -- or your family has done -- to protect yourselves from an environmental hazard?", "One skill I have that helps me respond to environmental challenges is...", "One thing I now know about environmental health that I did not know before this module is...", "One person in my community I could work with to address an environmental health issue is...", "Before this module, how did you think about the environment? And now? What has changed?", "Is this fair that some people breathe in more chemicals than others just because of where they live?", "What might make a chosen adaptation strategy hard to implement?", "What would happen if you did nothing?", "Could a community action continue after you graduate?", "What do you think of this plan? What would you add or change? Would you be willing to help? (for family take-home conversation)"], "practiceAtHome": ["Share your Community Resilience Plan with a family member. Ask them: 'What do you think of this plan?' 'What would you add or change?' 'Would you be willing to help?'", "My Commitment: I, _________________________, commit to taking this one action to protect my community's environmental health: _________________________"]}, {"id": 30, "module": "Conclusion", "title": "Looking Back, Looking Forward", "learning": ["Look back across all seven modules to recall and celebrate what was learned.", "Acknowledge your growth and commitment over 30 sessions.", "Identify skills to keep practising, support people you can turn to, and personal commitments you carry beyond the program."], "keyConcepts": [{"heading": "My THRIVE-Belize Passport -- Key Takeaways", "body": "Write one key takeaway from each module -- one thing you learned or one skill you gained:\nM01: Communication and Emotional Regulation\nM02: Gender Norms, Masculinities, and Boys' Health\nM03: Sexual and Reproductive Health\nM04: Healthy Relationships and Assertiveness\nM05: Mental and Physical Health\nM06: Substance Use and Refusal Skills\nM07: Environmental Health and Climate Resilience"}, {"heading": "My Forward-Looking Commitments", "body": "One skill I will keep practising:\n\nOne person I can talk to if I need support:\n\nSomething I am proud of from this program:"}, {"heading": "My Support Resources", "body": "These resources are available to you after the program ends:\nSchool counsellor -- available at TCC during school hours\nTrusted teacher\nFamily member or trusted adult\nMinistry of Health (Toledo District) -- District hospital, Punta Gorda\nBelize National Crisis Hotline -- Available for mental health support\nRed Cross Belize -- Emergency and disaster support"}, {"heading": "Booster Session Reminder", "body": "We will meet again in _______ weeks for a final skills review session (Session 31). Date: _______________"}], "remember": ["The skills you have learned are yours. No one can take them away.", "You carry them with you -- in how you breathe when you are angry, in how you speak up when something is wrong, in how you ask for help when you need it, in how you treat the people around you.", "These commitments are not promises you will be graded on. They are intentions. If you practise your skill once this week, that is a success. If you talk to your support person once this month, that is a success. Small steps count.", "Your passport is your personal record of this program. Keep it somewhere safe.", "Your completion card is yours. Take it home. Put it somewhere you will see it. The skill you chose, the person you named, the thing you are proud of -- those are real. They do not disappear because the program ends.", "The program ending does not mean support ends. The school counsellor remains available."], "vocabulary": [{"term": "Man Box", "definition": "The set of rigid rules that society puts on boys and men -- things like 'do not cry,' 'be tough,' 'do not show emotions,' 'be in control.' It is harmful because it stops boys from being fully human -- from feeling, asking for help, and building real connections."}, {"term": "FRIES", "definition": "The five elements of consent: Freely given, Reversible, Informed, Enthusiastic, Specific. Consent is not just about saying yes -- it is about all five of those elements being present."}, {"term": "R.A.I.N.", "definition": "A coping tool: Recognize what you are feeling. Allow it to be there without pushing it away. Investigate where you feel it in your body and what it needs. Nurture yourself with kindness."}], "reflection": ["Something I am proud of from this program is: ______________________________________________", "For each module, what is one thing you learned or one skill you gained?", "Which one skill matters most to you? Which one do you want to keep using?", "Who is one person you can talk to if you need support?", "Think about a moment in this program when you surprised yourself.", "Is there something you can do now that you could not do before Session 1?", "Was there a session that changed how you think about something?"], "practiceAtHome": ["Keep your THRIVE-Belize Passport somewhere safe and bring it to the booster session.", "Keep your completion card somewhere you will see it.", "Practise the skill you chose at least once this week.", "Talk to your support person at least once this month.", "Use your support resources list if you need help after the program ends."]}, {"id": 31, "module": "Booster", "title": "Skills Review and Renewal", "learning": ["Discover which THRIVE-Belize skills you have used in daily life since the program ended.", "Practise the three most protective and practical skills: calming and grounding, assertive refusal, and help-seeking.", "Renew your personal commitment to one skill and one support person, so you leave with a concrete plan for the months ahead."], "keyConcepts": [{"heading": "Ground Rules (reaffirmed for Session 31)", "body": "Respect each other's words and silence.\nListen when others speak.\nYou can always choose not to share -- no penalty for passing.\nWhat is shared here stays here, unless someone is in danger.\nUse kind language.\nParticipate with an open mind."}, {"heading": "Skills Inventory -- Have You Been Using Your Skills?", "body": "Skill one: Used a calming technique -- deep breathing, muscle relaxation, or 5-4-3-2-1 grounding -- when you felt stressed, angry, or overwhelmed.\nSkill two: Used an 'I feel... when... because...' statement to express your feelings to someone without blaming them.\nSkill three: Said no to something you did not want to do -- peer pressure, substance offer, or any situation where you stood your ground.\nSkill four: Recognised a thinking error -- like catastrophising, mind reading, or all-or-nothing thinking -- and challenged it with a more balanced thought.\nSkill five: Recognised a warning sign in a relationship -- yours or a friend's -- and either took action or supported someone.\nSkill six: Asked someone for help -- a trusted adult, a friend, or a service -- when you were going through a difficult time.\nSkill seven: Did something to take care of your mental or physical health -- something from your self-care plan, or something you learned in the program."}, {"heading": "Greatest Hit 1: Box Breathing", "body": "Breathe in a box pattern: breathe in for four counts, hold for four counts, breathe out for four counts, hold for four counts.\nThis technique is free. It requires nothing. You can do it anywhere: before a test, during an argument, when you cannot sleep, when you feel overwhelmed, or when something triggers you."}, {"heading": "Greatest Hit 1: 5-4-3-2-1 Grounding", "body": "Five things you can see. Look around the room. Name five things you can see -- silently, in your head.\nFour things you can feel physically. What is touching your body right now? Your feet on the floor, your hands on the desk, the chair against your back, the air on your skin.\nThree things you can hear. Listen. What sounds are around you?\nTwo things you can smell. Take a breath through your nose. What do you notice?\nOne thing you can taste. Maybe the taste of your last meal, or just the taste of your own mouth.\nThis technique brings your mind back to the present when your thoughts are racing or you feel overwhelmed."}, {"heading": "Greatest Hit 2: 'I' Statement Formula", "body": "I feel __________ when __________ because __________\nThis lets you express how you feel without blaming or attacking. For example: 'I feel uncomfortable when you pressure me because I have already said no.'"}, {"heading": "Greatest Hit 2: Five Refusal Strategies", "body": "1. Say it straight -- 'No thanks, I don't drink.'\n2. Give a reason -- 'I can't -- I have practice early tomorrow.'\n3. Suggest an alternative -- 'Let's go play football instead.'\n4. Reverse the pressure -- 'Why does it matter to you if I drink?'\n5. Walk away -- 'I've got to go. See you later.'\nIn a real situation, you might need to use two or three of them in a row if the pressure does not stop."}, {"heading": "Greatest Hit 3: The Three Rs Test", "body": "Is the problem affecting my...\nR -- Relationships? (family, friends, partner)\nR -- Responsibilities? (school, chores, work)\nR -- Recreation? (things I enjoy, sleep, energy)\n\nIf YES to any R -- Talk to a trusted adult.\nIf a problem is affecting your relationships, your responsibilities, or your recreation -- or more than one -- that is a signal that you need to talk to someone. Not because you are weak, but because the problem is bigger than one person should handle alone."}, {"heading": "Greatest Hit 3: Conversation Starters", "body": "1. 'I have been feeling ___ and I need someone to talk to.'\n2. 'Something has been bothering me and I don't know what to do.'\n3. 'I am worried about a friend because ___. Can you help?'\n4. 'I don't feel like myself and I think I might need some help.'"}, {"heading": "Commitment Renewal", "body": "1. Look at the skill you chose in Session 30.\n   -- Have you been practising it? Do you want to keep it or choose a new one?\n\n2. Look at the support person you named.\n   -- Are they still your go-to person? Update if needed.\n\n3. Write one sentence: 'In the next three months, I will ___________.\n   Be specific. Not 'I will be better' -- but something like:\n   'I will use Box Breathing before every test' or\n   'I will talk to my aunt when I feel overwhelmed.'"}, {"heading": "Closing Affirmation", "body": "I have the skills to take care of myself and my community."}], "remember": ["These two techniques -- Box Breathing and 5-4-3-2-1 Grounding -- are free. They require nothing. You can do them anywhere: before a test, during an argument, when you cannot sleep, when you feel overwhelmed, or when something triggers you. They are yours for life.", "Keep your toolkit card somewhere you will see it -- in your notebook, on your wall, in your pocket. The more you practise, the faster these techniques work.", "Your 'no' does not need an explanation. 'No' is a complete sentence. But if you want to give a reason or suggest an alternative, those strategies are there for you.", "Saying no is a skill that gets stronger every time you use it. The first time is always the hardest. But the more you practise -- here and in real life -- the more natural it becomes.", "Knowing who to talk to is step one. Knowing what to say is step two.", "Saying the words out loud -- even in practice -- makes it easier to say them when it matters.", "Over 31 sessions, you have learned to name your emotions, calm your body, speak up for yourselves, question unfair rules, understand your health, protect your relationships, refuse what harms you, seek help when you need it, and care for your community and your environment. Those skills do not expire. They do not disappear because the program is over. They are part of you now."], "vocabulary": [{"term": "Calming and Grounding", "definition": "Techniques -- like Box Breathing and 5-4-3-2-1 Grounding -- that calm your body and bring your mind back to the present. The foundation for every other skill: if you cannot calm your body, you cannot think clearly, you cannot communicate assertively, and you cannot make good decisions."}, {"term": "Assertive Refusal", "definition": "The ability to say no clearly and calmly when you are being pressured. Applies to peer pressure, substance offers, relationship pressure, and any situation where someone is pushing you to do something you do not want to do."}, {"term": "The Three Rs Test", "definition": "A simple way to decide whether a problem is serious enough to seek adult support: Is the problem affecting your Relationships, your Responsibilities, or your Recreation? If yes to any R -- talk to a trusted adult."}, {"term": "Trusted Adult Map", "definition": "A personal record of trusted people in three categories -- Personal, School, and Community -- who you can turn to for support. Should have at least one name in each circle."}, {"term": "Escalation (in refusal)", "definition": "When the person pressuring you pushes back after your first refusal. Requires using a different refusal strategy the second time -- staying calm, using a steady voice, making eye contact."}], "reflection": ["Think honestly: have I used this skill since the program ended? Not 'did I learn it' -- but 'did I actually use it in my real life?'", "Share one skill you used and briefly describe the situation -- just one or two sentences.", "How does your body feel right now compared to two minutes ago? (after Box Breathing)", "How did saying no feel? Was it easier or harder than you expected?", "Think about the past weeks. Has anything in your life affected one of the Three Rs? You do not need to answer out loud. Just notice.", "Is your trusted adult map still accurate? A lot can change in several weeks. Maybe a teacher moved. Maybe you got closer to a new adult. Maybe someone you trusted let you down.", "Look at the skill you chose in Session 30. Have you been practising it? Do you want to keep it or choose a new one?", "Look at the support person you named. Are they still your go-to person?"], "practiceAtHome": ["Keep your toolkit card somewhere you will see it -- in your notebook, on your wall, in your pocket. The more you practise, the faster these techniques work.", "Keep your Pocket Card with you. It is a reminder that you have the tools.", "Write and keep your renewed commitment: 'In the next three months, I will ___________.' Be specific.", "If a problem is affecting any of the Three Rs, talk to your trusted adult.", "Practise the conversation starters out loud -- saying the words out loud makes it easier to say them when it matters."]}], "glossary": [{"term": "Emotional vocabulary", "definition": "The words we use to name and describe emotions.", "module": "M01", "session": 2}, {"term": "Pleasant", "definition": "An emotion that feels good.", "module": "M01", "session": 2}, {"term": "Unpleasant", "definition": "An emotion that feels uncomfortable or bad.", "module": "M01", "session": 2}, {"term": "Activating", "definition": "Emotions that give us energy and make us want to move or do something.", "module": "M01", "session": 2}, {"term": "Deactivating", "definition": "Emotions that take away our energy and make us feel calm or tired.", "module": "M01", "session": 2}, {"term": "Body-emotion connection", "definition": "The way different emotions show up as physical sensations in different parts of your body.", "module": "M01", "session": 2}, {"term": "Self-awareness", "definition": "Noticing and understanding your own feelings and reactions.", "module": "M01", "session": 2}, {"term": "Emotion regulation", "definition": "The ability to manage and respond to strong emotions in helpful ways.", "module": "M01", "session": 3}, {"term": "Deep breathing", "definition": "A strategy of breathing slowly and deliberately to slow the heart rate and relax the body.", "module": "M01", "session": 3}, {"term": "Progressive Muscle Relaxation", "definition": "A strategy of tensing and then releasing different muscle groups to release physical tension.", "module": "M01", "session": 3}, {"term": "Grounding", "definition": "A strategy of focusing on the present moment using the five senses to interrupt overwhelming thoughts or emotions.", "module": "M01", "session": 3}, {"term": "Nonverbal communication", "definition": "Communicating without words -- through body language, facial expressions, gestures, posture, and tone of voice.", "module": "M01", "session": 4}, {"term": "Active listening", "definition": "Paying full attention to the speaker, understanding what they say, and responding to show you heard them.", "module": "M01", "session": 4}, {"term": "Passive communication", "definition": "Saying nothing and keeping feelings inside, which allows problems to continue.", "module": "M01", "session": 4}, {"term": "Aggressive communication", "definition": "Attacking or blaming the other person, which increases conflict.", "module": "M01", "session": 4}, {"term": "Assertive communication", "definition": "Expressing your feelings honestly and respectfully -- it respects both people.", "module": "M01", "session": 4}, {"term": "'I' statement", "definition": "A formula for expressing feelings without blaming: 'I feel ___ when ___ because ___.' It is assertive communication.", "module": "M01", "session": 4}, {"term": "SOLER", "definition": "A framework for active listening: Sit facing the speaker, Open posture, Lean slightly forward, Eye contact (culturally appropriate), Relax and don't interrupt.", "module": "M01", "session": 4}, {"term": "Personal strength", "definition": "Something you're good at, a positive quality you have, or a skill you bring to challenges.", "module": "M01", "session": 5}, {"term": "Thoughts-Feelings-Actions Triangle", "definition": "A model showing that thoughts, feelings, and actions are all connected and influence each other. Changing any one of the three can affect the other two.", "module": "M01", "session": 5}, {"term": "Thinking error", "definition": "An automatic, unhelpful thought pattern that is not completely accurate. Common examples: all-or-nothing thinking, mind reading, catastrophizing, and personalizing.", "module": "M01", "session": 5}, {"term": "All-or-nothing thinking", "definition": "Seeing things as completely good or completely bad, with no middle ground.", "module": "M01", "session": 5}, {"term": "Mind reading", "definition": "Assuming you know what someone else is thinking without evidence.", "module": "M01", "session": 5}, {"term": "Catastrophizing", "definition": "Expecting the worst possible outcome.", "module": "M01", "session": 5}, {"term": "Personalizing", "definition": "Blaming yourself for things that aren't entirely your fault.", "module": "M01", "session": 5}, {"term": "Cognitive restructuring", "definition": "The process of catching an unhelpful thought, checking if it is accurate, and choosing a more balanced thought.", "module": "M01", "session": 5}, {"term": "Catch It, Check It, Change It", "definition": "A three-step strategy: (1) notice the unhelpful thought, (2) ask whether it is realistic and helpful, (3) choose a more balanced thought.", "module": "M01", "session": 5}, {"term": "Sex", "definition": "Biological -- what your body is born with. The traits that ONLY belong to one side (e.g., can become pregnant, has a deeper voice at puberty).", "module": "M02", "session": 6}, {"term": "Gender", "definition": "Social -- the rules and expectations society teaches us about how boys and girls should act. If gender is learned, it means it can be questioned. It means it can be changed.", "module": "M02", "session": 6}, {"term": "Man Box", "definition": "The set of rigid expectations that society places on boys and men about how they should act, feel, and behave. Messages like 'be tough,' 'do not cry,' and 'do not ask for help.'", "module": "M02", "session": 7}, {"term": "Mask", "definition": "The face you show to the world -- the emotions you let others see (OUTSIDE). The emotions you keep hidden -- the ones you feel but do not show (INSIDE).", "module": "M02", "session": 7}, {"term": "Health Support Network", "definition": "The people and places in your life that you can count on when you need help with a health concern -- physical, mental, or emotional. Inner Circle: people you trust most (could talk to about anything). Middle Circle: helpful adults who could help even if you do not know them well. Outer Circle: services and places you could go to for help.", "module": "M02", "session": 8}, {"term": "'I feel...I need...' statement", "definition": "A format from Module 1 for asking for help: 'I feel ________ and I have been experiencing ________. I need ________.' Example: 'I feel stressed and I have been having headaches for two weeks. I need someone to listen and help me figure out what to do.'", "module": "M02", "session": 8}, {"term": "Privilege", "definition": "Advantages and freedoms that come from gender norms rather than from being earned. These are not earned -- they come from the same gender norms we have been studying. And just like those norms, they can be changed.", "module": "M02", "session": 9}, {"term": "Power OVER", "definition": "A way of using power where one person gives orders and the other has no choice. One wins, one loses. (Harmful.)", "module": "M02", "session": 9}, {"term": "Power WITH", "definition": "A way of using power where both people discuss and both have a voice. Both benefit. (Healthy.) Using the active listening skills from Module 1, you can share power by listening to others, respecting their choices, and speaking up when someone is being treated unfairly.", "module": "M02", "session": 9}, {"term": "Gender Equity Pledge", "definition": "A personal commitment to step outside the Man Box: one norm you will challenge, one way you will support a friend, and one health-positive action you commit to. This is your commitment to yourself. You do not need anyone's permission to be true to who you are.", "module": "M02", "session": 9}, {"term": "Puberty", "definition": "When the body changes from a child's body to a teenager's and eventually an adult's body. These changes are caused by chemicals in our body called hormones.", "module": "M03", "session": 10}, {"term": "Hormones", "definition": "Chemicals in our body that cause puberty changes.", "module": "M03", "session": 10}, {"term": "Physical changes", "definition": "Things that happen to your body during puberty. Examples: body hair, growth spurts, voice changes, acne, menstruation, wet dreams, body odor.", "module": "M03", "session": 10}, {"term": "Emotional changes", "definition": "New feelings or moods you experience during puberty. Examples: mood swings, new attractions, feeling self-conscious, wanting more independence.", "module": "M03", "session": 10}, {"term": "Social changes", "definition": "How other people treat you differently as you grow up. Examples: more responsibility, people judge your appearance, treated more like an adult, peer pressure.", "module": "M03", "session": 10}, {"term": "Self-talk", "definition": "The conversation you have with yourself inside your head. It can be positive or negative, and it makes a big difference to how you feel.", "module": "M03", "session": 10}, {"term": "Consent", "definition": "Freely agreeing to something. It is given without pressure, fear, or force. It can be changed at any time.", "module": "M03", "session": 11}, {"term": "Bodily autonomy", "definition": "Your right to decide what happens to your own body.", "module": "M03", "session": 11}, {"term": "FRIES", "definition": "An acronym for the five elements of valid consent: Freely given, Reversible, Informed, Enthusiastic, Specific.", "module": "M03", "session": 11}, {"term": "Boundary", "definition": "A limit that protects your physical, emotional, and digital safety.", "module": "M03", "session": 11}, {"term": "Coercion", "definition": "Using pressure, threats, or guilt to make someone do something they would not freely choose.", "module": "M03", "session": 11}, {"term": "Menstruation", "definition": "When the uterine lining is shed each month if the egg is not fertilized. Also called a period. A normal, healthy sign that the reproductive system is working as it should.", "module": "M03", "session": 12}, {"term": "Ovulation", "definition": "When an egg is released from one of the ovaries. Happens roughly once a month.", "module": "M03", "session": 12}, {"term": "STI (sexually transmitted infection)", "definition": "An infection passed from one person to another through sexual contact.", "module": "M03", "session": 12}, {"term": "Abstinence", "definition": "Choosing not to have sex. The only method that is 100% effective at preventing both pregnancy and STIs.", "module": "M03", "session": 12}, {"term": "Contraception", "definition": "Methods used to prevent pregnancy. Sometimes called family planning.", "module": "M03", "session": 12}, {"term": "Condom", "definition": "A barrier method that protects against both pregnancy and STIs when used correctly every time.", "module": "M03", "session": 12}, {"term": "Decision-making process", "definition": "A structured set of steps for making good choices: Define the problem, Identify options, Consider consequences, Consider values, Consider how it affects others, Choose the best option, Evaluate.", "module": "M03", "session": 13}, {"term": "Consequences", "definition": "What happens as a result of a decision -- can be positive or negative, short-term or long-term.", "module": "M03", "session": 13}, {"term": "Values", "definition": "What matters to you -- the principles and beliefs that guide your choices.", "module": "M03", "session": 13}, {"term": "Negotiate", "definition": "A pressure-response strategy: finding a compromise. 'I am not comfortable with that, but how about this instead?'", "module": "M03", "session": 13}, {"term": "Delay", "definition": "A pressure-response strategy: buying time. 'I am not ready right now. Let me think about it.'", "module": "M03", "session": 13}, {"term": "Refuse", "definition": "A pressure-response strategy: saying no clearly and firmly. 'No. I have made my decision.' Repeat if needed.", "module": "M03", "session": 13}, {"term": "Leave", "definition": "A pressure-response strategy: removing yourself from the situation if someone does not respect your answer. Tell a trusted adult.", "module": "M03", "session": 13}, {"term": "Self-efficacy", "definition": "The belief that you have the ability to make healthy choices and handle difficult situations.", "module": "M03", "session": 13}, {"term": "Honest communication", "definition": "Saying what you really think and feel, without lying or hiding.", "module": "M04", "session": 14}, {"term": "Healthy boundaries", "definition": "Knowing your limits and respecting other people's limits.", "module": "M04", "session": 14}, {"term": "Independence", "definition": "Being able to have your own friends, hobbies, and time to yourself, even when you are in a close relationship.", "module": "M04", "session": 14}, {"term": "Gaslighting", "definition": "When someone makes you doubt your own feelings or memory -- for example, telling you that you are 'too sensitive' when you express that something hurt you.", "module": "M04", "session": 14}, {"term": "Isolation", "definition": "When someone tries to keep you away from your friends or family.", "module": "M04", "session": 14}, {"term": "Controlling behaviour", "definition": "When someone tries to tell you what to wear, who to talk to, or what to do.", "module": "M04", "session": 14}, {"term": "Manipulation", "definition": "Using unfair or dishonest methods to get what you want from someone.", "module": "M04", "session": 14}, {"term": "Trust", "definition": "Believing in the honesty and reliability of another person.", "module": "M04", "session": 14}, {"term": "Respect", "definition": "Treating others the way they deserve to be treated -- valuing their feelings, limits, and choices.", "module": "M04", "session": 14}, {"term": "Passive communication", "definition": "Staying quiet, not speaking up for yourself, and often not getting what you need.", "module": "M04", "session": 15}, {"term": "Aggressive communication", "definition": "Attacking, threatening, or putting the other person down to get what you want.", "module": "M04", "session": 15}, {"term": "Assertive communication", "definition": "Ask
