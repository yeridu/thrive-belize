passed from one person to another through sexual contact."}, {"term": "Abstinence", "definition": "Choosing not to have sex. The only method that is 100% effective at preventing both pregnancy and STIs."}, {"term": "Contraception", "definition": "Methods used to prevent pregnancy. Sometimes called family planning."}, {"term": "Condom", "definition": "A barrier method that protects against both pregnancy and STIs when used correctly every time."}], "reflection": ["Why do you think it is important to use the correct names for body parts?", "Were any of these facts new to you?", "Were any of these answers surprising to you?", "Why do you think myths about STIs are so common?", "Why is it important to get tested even if you do not feel sick?", "Why do you think some people do not use protection even when they know about it?", "Why is it important that both partners share responsibility for prevention?", "Where in your community can you go for confidential health information?"], "practiceAtHome": ["If you would like, have a conversation with a trusted adult about one thing you learned today about reproductive health.", "Take-Home Challenge (optional): Talk to a trusted adult (parent, older sibling, aunt, uncle) about one fact you learned today. You might be surprised -- they may have questions too!"]}, {"id": 13, "module": "M03", "title": "Choosing My Path", "learning": ["Describe a structured decision-making process (at least 5 of 7 steps) and name at least three strategies for dealing with pressure (negotiate, delay, refuse, leave).", "Feel confident that they already have personal strengths that will help them make healthy choices, and believe that resisting pressure is a sign of strength -- not weakness.", "Apply the decision-making framework to an SRH-related scenario, and demonstrate at least one refusal strategy through role play."], "keyConcepts": [{"heading": "Start With What You've Got -- Your Strengths", "body": "You already have strengths that help you make good decisions. Recognizing your strengths builds confidence. Everyone has different strengths -- and all of them matter. The skills you have learned in M01, M02, and M03 add to your strengths. Write your strengths here -- skills, qualities, and things you are good at. Add skills from the THRIVE program: From M01: I can manage my emotions / I can use 'I' statements / I can listen actively. From M02: I can recognize gender pressure / I know about the Man Box. From M03: I understand consent / I know how to protect my health / I can make good decisions / I can deal with pressure."}, {"heading": "The 7-Step Decision-Making Process", "body": "Use these steps whenever you face an important decision -- about relationships, health, school, or anything else. Good decisions follow a process -- they are not just impulses. Every decision has consequences -- some positive, some negative. Considering your values and how your decision affects others leads to better choices. Decision-making skills apply to ALL areas of life, including sexual health."}, {"heading": "7-Step Decision-Making -- The Steps", "body": "Step 1 -- Define the problem: What decision do I need to make? (Example: 'Should I go to Marcus's house?'). Step 2 -- Identify options: What are my choices? (Example: Go, don't go, suggest meeting somewhere else). Step 3 -- Consider consequences: What could happen with each choice? (Example: Positive: spend time together. Negative: risky situation.). Step 4 -- Consider values: What matters to me? (Example: 'I value my safety and my future.'). Step 5 -- Consider others: How will this affect people I care about? (Example: 'My parents would worry.'). Step 6 -- Choose: Pick the best option. (Example: 'I will suggest we meet at the park instead.'). Step 7 -- Evaluate: Did it work? What would I do differently? (Example: 'Yes, we had fun and I felt safe.')."}, {"heading": "Four Ways to Deal With Pressure", "body": "When someone is pressuring you to do something you do not want to do, you have four strategies. Pressure can come from peers, partners, media, or even yourself. Using these strategies protects your health and your boundaries. Resisting pressure is a sign of STRENGTH -- not weakness. NEGOTIATE: 'I am not comfortable with that, but how about this instead?' DELAY: 'I am not ready right now. Let me think about it.' REFUSE: 'No. I have made my decision.' (Say it clearly. Repeat if needed.) LEAVE: If they do not respect your answer, walk away. Tell a trusted adult. Key message: 'Saying no is a sign of STRENGTH, not weakness.'"}, {"heading": "My Commitment", "body": "Write one commitment -- one thing you will do to protect your health or your boundaries. It could be: 'I will use positive self-talk,' 'I will practice saying no,' 'I will learn more about STIs,' or 'I will talk to a trusted adult if I need help.' This is just for you -- you do not need to share it."}], "remember": ["You already have strengths that help you make good decisions.", "Good decisions follow a process -- they are not just impulses.", "Every decision has consequences -- some positive, some negative.", "Considering your values and how your decision affects others leads to better choices.", "When someone pressures you, you have four strategies: negotiate, delay, refuse, leave.", "Resisting pressure is a sign of strength -- not weakness.", "If someone does not respect your 'no,' that tells you something about THEM, not about you.", "If someone does not respect your answer, walk away and tell a trusted adult."], "vocabulary": [{"term": "Decision-making process", "definition": "A structured set of steps for making good choices: Define the problem, Identify options, Consider consequences, Consider values, Consider how it affects others, Choose the best option, Evaluate."}, {"term": "Consequences", "definition": "What happens as a result of a decision -- can be positive or negative, short-term or long-term."}, {"term": "Values", "definition": "What matters to you -- the principles and beliefs that guide your choices."}, {"term": "Negotiate", "definition": "A pressure-response strategy: finding a compromise. 'I am not comfortable with that, but how about this instead?'"}, {"term": "Delay", "definition": "A pressure-response strategy: buying time. 'I am not ready right now. Let me think about it.'"}, {"term": "Refuse", "definition": "A pressure-response strategy: saying no clearly and firmly. 'No. I have made my decision.' Repeat if needed."}, {"term": "Leave", "definition": "A pressure-response strategy: removing yourself from the situation if someone does not respect your answer. Tell a trusted adult."}, {"term": "Self-efficacy", "definition": "The belief that you have the ability to make healthy choices and handle difficult situations."}], "reflection": ["Was there a step in the process that you think is the most important? Which one and why?", "Can you think of a time when thinking through consequences BEFORE acting would have helped?", "Which strategy do you think would be hardest to use in real life? Why?", "What would you do if someone kept pressuring you even after you said no?", "Which strategy felt most natural to you? Which was hardest?"], "practiceAtHome": ["Practice one refusal strategy this week in a low-stakes situation -- for example, saying 'no thank you' firmly when someone offers you something you do not want. You can also try the 7-step decision-making process for one decision in your life, big or small.", "Take-Home Challenge (optional): This week, use the 7-step decision-making process for one decision in your life (big or small). Write about it on the back of this sheet: What was the decision? What steps did you follow? What did you choose, and why? How did it turn out? You can also practice one refusal strategy in a low-stakes situation -- for example, saying 'no thank you' firmly when someone offers you something you do not want."]}, {"id": 14, "module": "M04", "title": "What Makes Relationships Work?", "learning": ["Students will identify at least 5 characteristics of healthy relationships and 5 warning signs of unhealthy relationships across all relationship types.", "Students will value honest communication, respect, and healthy boundaries as essential to all positive relationships.", "Students will apply critical thinking to evaluate relationship scenarios using healthy/unhealthy criteria."], "keyConcepts": [{"heading": "What Love Looks, Sounds, and Feels Like to Me", "body": "Think about love and positive relationships using your five senses. What does love look, sound, feel, taste, and smell like? Write your thoughts below.\n\nLove LOOKS like...\nLove SOUNDS like...\nLove FEELS like...\nLove TASTES like...\nLove SMELLS like..."}, {"heading": "Top 5 Qualities I Want in My Relationships", "body": "Choose 5 characteristics of healthy relationships from the class brainstorm (or use your own words). These are qualities you value and want to see in all your relationships."}, {"heading": "Top 5 Warning Signs I'll Watch For", "body": "Choose 5 warning signs of unhealthy relationships from the class brainstorm (or use your own words). These are behaviours that tell you a relationship may not be good for you."}, {"heading": "Using This Card", "body": "You can use this card anytime you want to think about a relationship in your life. Ask yourself:\nDoes this relationship have the qualities I value? (Check your \"Top 5 Qualities\" list.)\nAre there any warning signs in this relationship? (Check your \"Top 5 Warning Signs\" list.)\nDo I feel safe, respected, and supported in this relationship?\n\nIf you see warning signs, you have options:\nTalk to the person using an \"I\" statement (e.g., \"I feel hurt when...\")\nSet a boundary (e.g., \"I need time to myself\")\nTalk to a trusted adult for advice\nWalk away from the relationship if it is not safe"}, {"heading": "Healthy vs. Unhealthy Relationship Qualities (from class brainstorm)", "body": "Healthy relationships are built on trust, respect, honest communication, healthy boundaries, independence, patience, and support.\n\nUnhealthy relationships involve dishonesty, jealousy, isolation, manipulation, controlling behaviour, gaslighting, and disrespect.\n\nThese qualities apply to ALL types of relationships: friendships, family, romantic, and relationships with teachers or mentors.\n\nWe can choose to cultivate healthy behaviours in our own relationships."}, {"heading": "Key Vocabulary Explained", "body": "Honest communication means saying what you really think and feel, without lying or hiding. Remember the 'I' statements we practiced in Module 1? That is an example of honest communication.\n\nHealthy boundaries means knowing your limits and respecting other people's limits. For example, if someone says 'I need time to study,' that is setting a boundary.\n\nIndependence means you can have your own friends, hobbies, and time to yourself, even when you are in a close relationship.\n\nGaslighting is when someone makes you doubt your own feelings or memory. For example, if you say 'That hurt my feelings,' and they say 'You are being too sensitive, I was just joking,' that is gaslighting. They are making you feel like your feelings are not valid.\n\nIsolation means someone tries to keep you away from your friends or family.\n\nControlling behaviour means someone tries to tell you what to wear, who to talk to, or what to do. In a healthy relationship, you make your own choices."}, {"heading": "Relationship Scenarios -- Healthy or Not?", "body": "Scenario 1: 'Saturday Plans'\nJordan wants to hang out with friends on Saturday afternoon. But Sam insists that Jordan spend the whole weekend together, just the two of them. Sam says, 'If you really cared about me, you would choose me over your friends.'\nVerdict: Unhealthy -- isolation and controlling behaviour.\n\nScenario 2: 'The Social Media Check'\nKai gets upset when Reina likes someone else's photo online. Kai says, 'Why are you liking their pictures? Do you have feelings for them?' Reina feels like they are being watched all the time.\nVerdict: Unhealthy -- jealousy and controlling behaviour.\n\nScenario 3: 'Setting Boundaries'\nJordan tells Sam, 'I need time to study tonight. Let's talk tomorrow after my exam.' Sam replies, 'OK, good luck on your exam. I will text you tomorrow.'\nVerdict: Healthy -- Jordan set a boundary, and Sam respected it.\n\nScenario 4: 'What's So Funny?'\nReina tells Kai, 'When you made that joke about my accent in front of your friends, it hurt my feelings.' Kai replies, 'You are being too sensitive. It was just a joke. Everyone was laughing.'\nVerdict: Unhealthy -- gaslighting and disrespect.\n\nScenario 5: 'Honest Talk'\nSam tells Jordan, 'I was wrong about what I said yesterday. I am sorry. I should not have spoken to you that way.'\nVerdict: Healthy -- honest communication and respect."}, {"heading": "Need Help?", "body": "If you are in a relationship that makes you feel unsafe, scared, or disrespected, talk to a trusted adult right away. You can speak with:\nYour school counselor\nA teacher you trust\nA parent, guardian, or family member\nA community leader or mentor\n\nYou deserve to be in relationships that are healthy, safe, and respectful."}], "remember": ["Healthy relationships are built on trust, respect, honest communication, healthy boundaries, independence, patience, and support.", "Unhealthy relationships involve dishonesty, jealousy, isolation, manipulation, controlling behaviour, gaslighting, and disrespect.", "These qualities apply to ALL relationships, not just romantic ones -- friendships, family relationships, and relationships with teachers or mentors.", "You can use your Relationship Qualities Card to evaluate any relationship in your life.", "If you see warning signs, you can talk to the person using an 'I' statement, set a boundary, talk to a trusted adult, or walk away.", "You deserve to be in relationships that are healthy, safe, and respectful."], "vocabulary": [{"term": "Honest communication", "definition": "Saying what you really think and feel, without lying or hiding."}, {"term": "Healthy boundaries", "definition": "Knowing your limits and respecting other people's limits."}, {"term": "Independence", "definition": "Being able to have your own friends, hobbies, and time to yourself, even when you are in a close relationship."}, {"term": "Gaslighting", "definition": "When someone makes you doubt your own feelings or memory -- for example, telling you that you are 'too sensitive' when you express that something hurt you."}, {"term": "Isolation", "definition": "When someone tries to keep you away from your friends or family."}, {"term": "Controlling behaviour", "definition": "When someone tries to tell you what to wear, who to talk to, or what to do."}, {"term": "Manipulation", "definition": "Using unfair or dishonest methods to get what you want from someone."}, {"term": "Trust", "definition": "Believing in the honesty and reliability of another person."}, {"term": "Respect", "definition": "Treating others the way they deserve to be treated -- valuing their feelings, limits, and choices."}], "reflection": ["Which of the 5 healthy qualities is MOST important to you? Why?", "Have you ever experienced one of the warning signs in a relationship? What did you do, or what could you do next time?", "Who is someone in your life who shows the healthy qualities you value? What do they do that makes you feel safe and respected?", "Why do you think honest communication is so important in all relationships?", "Can a relationship have SOME healthy qualities and SOME unhealthy ones? What should you do in that situation?", "Who can you talk to if you notice warning signs in a relationship?", "Which scenario was easiest to identify as healthy or unhealthy? Why?"], "practiceAtHome": ["Share this card with a trusted adult at home (parent, guardian, older sibling, aunt, uncle, or family friend). Ask them: 'What qualities do YOU value in relationships?' and 'What does love look, sound, or feel like to you?' Write their answers below if you want to.", "Share your sensory reflections ('What does love look/sound/feel like to you?') with a trusted adult at home and ask: 'What does love look/sound/feel like to you?' This extends a conversation about healthy relationships across generations (optional)."]}, {"id": 15, "module": "M04", "title": "Speaking Up: Assertiveness and Refusal", "learning": ["Students can define and distinguish between passive, aggressive, and assertive communication styles.", "Students can name the four rights of refusal.", "Students understand that assertive communication maximizes both personal needs and relationship respect.", "Students believe they have the right to say no without guilt.", "Students value assertiveness as a tool for maintaining healthy relationships.", "Students can demonstrate an assertive response in a role-play scenario.", "Students can apply 'I' statements from M01 in an assertive communication context.", "Students can verbally refuse unwanted pressure using one of the four refusal rights."], "keyConcepts": [{"heading": "About This Toolkit", "body": "Welcome to your Session 15 Student Toolkit. Today you learned about the three communication styles (passive, aggressive, assertive) and the four rights of refusal. This toolkit is your personal reference guide and practice space. You can keep it in your notebook, take it home, and come back to it whenever you need a reminder about how to communicate assertively.\n\nRemember: assertiveness is a SKILL, not a personality trait. That means everyone can learn it and get better with practice."}, {"heading": "PASSIVE Communication", "body": "What it means: Staying quiet, not speaking up for yourself, and often not getting what you need.\nExample: Someone cuts in front of you in line. You say nothing and feel frustrated inside.\nHow it sounds: \"It's fine, whatever.\" / \"I don't care.\" (when you actually do care)\nResult: You avoid conflict, but you don't solve the problem. You may feel resentful, ignored, or disrespected."}, {"heading": "AGGRESSIVE Communication", "body": "What it means: Attacking, threatening, or putting the other person down to get what you want.\nExample: Someone cuts in front of you in line. You yell, \"Get to the back, you idiot!\" or push them.\nHow it sounds: Insults, threats, raised voice, blaming language.\nResult: You might feel powerful in the moment, but you damage the relationship and risk escalation or retaliation."}, {"heading": "ASSERTIVE Communication", "body": "What it means: Asking for what you want or need in an honest, respectful way -- without putting yourself or the other person down.\nExample: Someone cuts in front of you in line. You say calmly and clearly, \"Excuse me, I was in line before you. Please go to the back.\"\nHow it sounds: Calm, firm, clear. Uses \"I\" statements (from Module 1): \"I feel ___ when ___ because ___.\"\nResult: You give yourself the best chance of getting what you need while keeping the other person's dignity intact. Even if the other person doesn't respond perfectly, YOU have communicated with respect and integrity."}, {"heading": "Why Assertive is Best", "body": "Assertive communication is NOT the same as aggressive communication. It's not about being loud, dominating, or winning. It's about respecting yourself AND respecting others. It's the communication style that builds and maintains healthy relationships.\n\nRemember:\n- Assertiveness respects BOTH people (you and them).\n- Assertiveness uses the \"I\" statements you learned in Module 1.\n- Assertiveness is a skill you can practice and improve."}, {"heading": "My Four Refusal Rights", "body": "You have the right to say NO in any situation where you feel uncomfortable, unsafe, or simply don't want to do something. Here are your four rights:\n\n1. The Right to Say How You Feel\nYou can express your feelings honestly. If you're uncomfortable, scared, confused, or not interested, you can say that out loud.\nExample: \"I feel uncomfortable with this.\"\n\n2. The Right to Say No Without Feeling Guilty\nYou don't have to say yes just to make someone else happy. Saying no does not make you rude, mean, or a bad friend/partner. It makes you assertive and self-respecting.\nExample: \"No thanks, I'm not interested.\" (No apology needed.)\n\n3. The Right to Act in Your Own Best Interest\nYou can do what's best for YOU, even if someone else wants something different. Your needs matter.\nExample: \"I need to study tonight, so I can't hang out.\"\n\n4. The Right to Change Your Mind\nEven if you said yes before, you can say no now. Consent and choice are ongoing. You are allowed to change your mind at any time.\nExample: \"I know I said yes earlier, but I've changed my mind. I don't want to do this anymore.\"\n\nRemember:\n- These rights apply to EVERYONE -- regardless of age, gender, or relationship status.\n- If someone doesn't respect your no, that's THEIR problem, not yours.\n- A real friend or partner will respect your boundaries."}, {"heading": "Stop-Think-Talk-Listen Framework", "body": "When emotions are high, the healthiest thing to do is:\nSTOP -- pause before you react.\nTHINK -- ask yourself, 'What do I really need here? What's the respectful way to say it?'\nTALK -- use assertive communication to express your need.\nLISTEN -- give the other person space to respond.\n\nThis framework connects to the 'I' statements you learned in Module 1: 'I feel ___ when ___ because ___.' Today, we are building on that foundation with assertiveness."}, {"heading": "Practice Zone -- Scenarios", "body": "Scenario 1: Friend Pressure\nA friend asks to copy your homework because they didn't do it. You want to say no because you worked hard on it and copying is against the rules.\nWhat would you say assertively?\n\nScenario 2: Romantic Partner Pressure\nYour partner wants to spend all their free time with you and gets upset when you want to hang out with other friends. You feel like you're losing your independence.\nWhat would you say assertively?\n\nScenario 3: Peer Pressure\nAt a party, someone offers you alcohol or a cigarette. You don't want it, but they keep insisting and saying, 'Everyone else is doing it.'\nWhat would you say assertively?\n\nTips for Writing Your Assertive Response:\n- Use \"I\" statements: \"I feel...\", \"I don't want to...\", \"I need...\"\n- Be direct and clear: \"No thanks.\" / \"I'm not comfortable with that.\"\n- You don't need to over-explain or apologize.\n- Stay calm and firm in tone (even if you're writing, imagine saying it with a steady voice)."}, {"heading": "A Final Note", "body": "Assertiveness takes practice. It might feel awkward or uncomfortable at first, especially if you're used to staying quiet (passive) or lashing out (aggressive). That's okay. Every time you practice -- even in your head or on paper -- you're building the skill. Be patient with yourself. You're learning to respect yourself AND others, and that's one of the most important skills you'll ever have.\n\nKeep this toolkit somewhere safe. Come back to it whenever you need a reminder of your rights and your voice.\n\nYou've got this."}, {"heading": "Need Help?", "body": "If you're in a situation where you feel unsafe saying no, or where you're experiencing pressure you can't handle alone, please reach out for help. You can talk to:\n- Your THRIVE facilitator\n- A trusted teacher or counselor at TCC\n- A family member or trusted adult\n- The TCC guidance office\n\nYou are not alone. Asking for help is a sign of strength, not weakness."}], "remember": ["There are three main communication styles: PASSIVE (silent), AGGRESSIVE (attacking), and ASSERTIVE (honest + respectful).", "Assertive communication is the best option for getting your needs met while maintaining healthy relationships.", "You have FOUR RIGHTS OF REFUSAL: (1) say how you feel, (2) say no without guilt, (3) act in your own best interest, (4) change your mind.", "Assertiveness is a SKILL you can practice and improve over time.", "Refusal skills protect your boundaries, your consent, and your well-being."], "vocabulary": [{"term": "Passive communication", "definition": "Staying quiet, not speaking up for yourself, and often not getting what you need."}, {"term": "Aggressive communication", "definition": "Attacking, threatening, or putting the other person down to get what you want."}, {"term": "Assertive communication", "definition": "Asking for what you want or need in an honest, respectful way -- without putting yourself or the other person down."}, {"term": "Refusal skills", "definition": "A form of assertive communication that protects your boundaries and consent by helping you say no clearly and confidently."}, {"term": "\"I\" statements", "definition": "A communication tool from Module 1: 'I feel ___ when ___ because ___.' Used to express feelings honestly without blaming the other person."}], "reflection": ["How did it feel to say no out loud (during role-play)?", "Was it hard? Why?", "What makes saying no easier or harder?", "What situation did you use assertive communication in this week?", "What exactly did you say?", "How did the other person react?", "How did YOU feel afterward?", "Would you do anything differently next time?"], "practiceAtHome": ["OPTIONAL Take-Home Challenge: This week, practice using one assertive response in a real-life situation. It can be something small, like: asking a friend to return something they borrowed; telling a sibling to stop teasing you; saying no to something you don't want to do. Reflect afterward: What situation did you use assertive communication in? What exactly did you say? How did the other person react? How did YOU feel afterward? Would you do anything differently next time?"]}, {"id": 16, "module": "M04", "title": "Recognizing Warning Signs", "learning": ["Students can name at least 5 warning signs of an unhealthy or abusive relationship.", "Students can describe the three phases of the abuse cycle (tension building, explosion, honeymoon).", "Students can identify at least 2 trusted resources for help with relationship safety concerns.", "Students believe that controlling and possessive behaviours are warning signs, not expressions of love.", "Students believe that even one incident of abuse is too many and no one deserves to be hurt.", "Students value the importance of supporting friends who may be in unsafe relationships.", "Students demonstrate the ability to identify warning signs in fictional relationship scenarios.", "Students can articulate what they would say to help a friend who is experiencing unhealthy relationship behaviours.", "Students know how to access help resources if they or someone they know needs support."], "keyConcepts": [{"heading": "Healthy or Unhealthy? -- Quick Reference Statements", "body": "Trusting your partner even when you are not together. -- HEALTHY: Trust is a foundation of good relationships.\n\nDemanding your partner give you their phone password. -- UNHEALTHY: Your partner has a right to privacy.\n\nGiving your partner time and space when they are upset. -- HEALTHY: Everyone needs space sometimes. Respecting that is healthy.\n\nBoth partners having time for their own friends and activities. -- HEALTHY: In healthy relationships, you don't lose yourself -- you keep your own identity and friendships.\n\nPressuring your partner to share private photos. -- UNHEALTHY: Pressure around anything intimate is a red flag.\n\nChecking your partner's phone without permission. -- UNHEALTHY: This shows a lack of trust and respect for boundaries.\n\nFeeling safe enough to share your worries with your partner. -- HEALTHY: Safety and openness are signs of a good relationship.\n\nThreatening to break up every time there is a disagreement. -- UNHEALTHY: This is a form of emotional manipulation -- using fear to control someone."}, {"heading": "The Cycle of Abuse -- Three Phases", "body": "Phase 1: TENSION BUILDING\nThe abuser becomes irritable, critical, and jealous. They snap at their partner over small things. The partner tries to keep the peace and feels like they are walking on eggshells.\n\nPhase 2: EXPLOSION\nThe abuse actually happens. It could be physical (hitting, pushing, grabbing), emotional or verbal (screaming, calling names, threatening), or destruction of property.\n\nPhase 3: HONEYMOON\nAfter the explosion, the abuser apologises. They say 'I'm so sorry, I didn't mean it, it will never happen again.' They may bring gifts or be extra loving.\n\nCYCLE REPEATS -- and often gets worse. The tension building phase gets longer. The explosions get worse. The honeymoon phase gets shorter and shorter. Eventually, the honeymoon may disappear completely.\n\nIMPORTANT: Even ONE incident of abuse is too many. If someone hits you, threatens you, or hurts you even once, that is not okay. You do not have to wait for the cycle to repeat. You deserve to be safe."}, {"heading": "Jealousy Is Not Love", "body": "One dangerous idea is that jealousy means love -- 'If he's jealous, it means he cares.' NO. Jealousy is not love. Excessive jealousy is a warning sign. Controlling your partner is not love -- it's abuse."}, {"heading": "Why People Stay -- The Honeymoon Phase", "body": "The honeymoon phase gives false hope. People stay because they believe the person will change. But the cycle always repeats."}, {"heading": "10 Warning Signs of an Unhealthy Relationship (Warning Signs Quick-Reference Card)", "body": "1. Your partner checks your phone, email, or social media without permission.\n2. Your partner tells you who you can and cannot spend time with.\n3. Your partner puts you down or makes fun of you in front of others.\n4. Your partner has an explosive temper -- you feel afraid of their reaction.\n5. Your partner pressures you to do things you are not comfortable with.\n6. Your partner blames you for their behaviour (\"You made me angry\").\n7. Your partner threatens to hurt themselves if you try to leave.\n8. Your partner is extremely jealous and accuses you of cheating without reason.\n9. Your partner controls your appearance or what you wear.\n10. Your partner apologises but the same behaviour keeps happening."}, {"heading": "What To Do If You See Warning Signs", "body": "If you see these warning signs in your relationship or in a friend's relationship:\n\n1. TRUST YOUR FEELINGS. If something feels wrong, it probably is.\n\n2. TALK TO SOMEONE YOU TRUST. School counsellor, parent, family member, teacher, or friend.\n\n3. KNOW YOUR RESOURCES. You are not alone. Help is available.\n\nREMEMBER: You deserve to feel SAFE and RESPECTED in ALL your relationships.\n\nAsking for help is a sign of STRENGTH, not weakness."}, {"heading": "How to Help a Friend", "body": "If you see these signs in someone else's relationship -- or if a friend tells you about them -- you can help by:\n1. Listening without judgment.\n2. Believing them. Don't say 'Are you sure?' or 'Maybe you're overreacting.'\n3. Helping them find a trusted adult -- a school counsellor, a parent, a family member, or one of the resources listed.\n\nYou don't have to fix the problem yourself. But you can be a good friend by supporting them and helping them get help."}, {"heading": "Scenario Practice -- Warning Signs in Action", "body": "Scenario 1: Kendra and Jamal have been together for 6 months. Lately, Jamal has been checking Kendra's phone every day. He gets angry if she talks to other boys, even her male cousins. He says, 'If you loved me, you wouldn't talk to them.' Kendra feels like she has to ask permission before doing anything.\nWarning signs: checking phone (#1), controlling who she talks to (#2), jealousy (#8).\n\nScenario 2: Tanya and Michael have been dating for 3 months. At first, Michael was sweet. But now he makes fun of Tanya's weight in front of their friends. He calls her 'lazy' and says she's lucky he's with her. When Tanya gets upset, Michael says, 'I'm just joking. You're too sensitive.'\nWarning signs: public humiliation (#3), blame (#6).\n\nScenario 3: Luis and Sofia have been together for a year. Sofia loves her friends, but Luis says she spends too much time with them. He says, 'It's either me or them.' Sofia has stopped seeing her friends to avoid fighting with Luis. She feels alone.\nWarning signs: isolation/controlling friendships (#2).\n\nScenario 4: Andre and Mia have been dating for 4 months. Andre has a bad temper. Last week, he punched a wall because Mia was late to meet him. He didn't hit Mia, but she felt scared. Andre apologised and said it won't happen again. But Mia still feels nervous around him.\nWarning signs: explosive temper (#4), apology without change (#10).\n\nScenario 5: Carmen and Deon have been together for 8 months. Deon tells Carmen what to wear. He says, 'That skirt is too short. Change it.' Carmen used to love choosing her own outfits, but now she dresses to keep Deon happy.\nWarning signs: controlling appearance (#9).\n\nScenario 6: Rosa and Kevin have been dating for 5 months. Kevin keeps pressuring Rosa to send him private photos. Rosa says no, but Kevin says, 'If you really loved me, you would.' Rosa feels guilty, like she's being a bad girlfriend.\nWarning signs: pressure (#5), emotional manipulation.\n\nScenario 7: Hannah and Troy have been together for 7 months. Troy always blames Hannah when he gets angry. Last night, he yelled at her and said, 'You made me do this. If you weren't so annoying, I wouldn't have to yell.' Hannah feels like everything is her fault.\nWarning signs: blame (#6).\n\nScenario 8: Nina and Ethan have been dating for 10 months. Every time Nina tries to talk about breaking up, Ethan says, 'If you leave me, I'll hurt myself. I can't live without you.' Nina feels trapped. She doesn't want to be responsible if something happens to Ethan.\nWarning signs: threats to hurt self (#7)."}, {"heading": "Help Resources", "body": "School Counsellor: [Name], [Office Location]\nWomen's Department: [Phone Number]\nNational Committee for Families and Children: [Contact Information]\nBelize Police Domestic Violence Unit: 911 or [Local Station Number]\nTHRIVE Facilitator: Available before/after class"}], "remember": ["Healthy relationships involve trust, respect, and space to be yourself.", "Unhealthy relationships involve control, pressure, and fear.", "The cycle of abuse has three phases: tension building, explosion, honeymoon -- and it repeats, often getting worse.", "The honeymoon phase (apologies, promises, gifts) is why people stay -- but the cycle does not stop.", "Jealousy is NOT love. Excessive jealousy and possessiveness are warning signs.", "Even ONE incident of abuse is too many. No one deserves to be hurt.", "There are 10 warning signs of an unhealthy relationship -- you have them on your card.", "If a relationship makes you feel afraid, controlled, or small, that is not love. That is a warning sign.", "You have the right to get help. Asking for help is a sign of strength, not weakness.", "You deserve to feel safe and respected in ALL your relationships."], "vocabulary": [{"term": "Tension building", "definition": "Phase 1 of the abuse cycle: the abuser becomes irritable, critical, and jealous; the partner feels like they are walking on eggshells."}, {"term": "Explosion", "definition": "Phase 2 of the abuse cycle: the abuse actually happens -- physical, emotional, or verbal harm."}, {"term": "Honeymoon phase", "definition": "Phase 3 of the abuse cycle: the abuser apologises, makes promises, and may give gifts; the partner believes things will change."}, {"term": "Cycle of abuse", "definition": "A pattern of abuse that repeats: tension building, explosion, honeymoon, repeat -- usually getting worse over time."}, {"term": "Red flag", "definition": "A warning sign that tells you a relationship may be unhealthy or dangerous."}, {"term": "Emotional manipulation", "definition": "Using feelings or fear to control another person, for example, threatening to hurt oneself if a partner tries to leave."}, {"term": "Public humiliation", "definition": "Putting someone down or making fun of them in front of others. This is a form of emotional abuse."}], "reflection": ["Were any of the healthy/unhealthy scenarios harder to judge than others? Why?", "What's the difference between one mistake and a pattern of behaviour?", "Why do you think the honeymoon phase gets shorter over time?", "What would you say to a friend who says, 'But they apologised and promised to change'?", "How does understanding this cycle help you protect yourself or others?", "Which warning sign do you think is hardest to recognize? Why?", "What would you say to a friend who says, 'But I love them, so I should stay and help them change'?", "Why is it important to talk to a trusted adult instead of trying to fix the situation yourself?"], "practiceAtHome": ["Keep your Warning Signs card somewhere safe. If you ever need it, it will be there. You can also share this information with friends who might need it.", "Optional private journal reflection: Think of a relationship you've seen in real life, on TV, or in a story. What made it healthy or unhealthy? What would you have done differently if you were one of the characters? (Do not turn this in -- it is for you only.)", "Optional private reflection: If you were advising a friend caught in this cycle, what would you say? What resources would you tell them about? (Do not turn this in -- it is for you only.)"]}, {"id": 17, "module": "M04", "title": "My Relationship Vision", "learning": ["Students can identify specific rights they hold in all relationships (friendships, family, romantic).", "Students can distinguish healthy relationship elements from unhealthy ones using learned vocabulary and warning signs.", "Students can articulate what assertive communication looks like in relationship conflict scenarios.", "Students believe they deserve relationships that are safe, respectful, and free from violence.", "Students value their own boundaries and recognize their right to set and enforce them.", "Students feel confident they can identify and respond to relationship warning signs.", "Students use assertive communication strategies when facing relationship challenges.", "Students apply the 'Four Rights of Saying No' when pressured in relationships.", "Students seek help from trusted adults or resources when they observe relationship warning signs."], "keyConcepts": [{"heading": "Module 04 Journey -- What We Have Covered", "body": "Session 14: Healthy vs. unhealthy relationship vocabulary (trust, respect, equality, control, jealousy, isolation, gaslighting, etc.)\n\nSession 15: Three communication styles (passive, aggressive, assertive); refusal skills; the Four Rights of Saying No.\n\nSession 16: The cycle of abuse (tension building, explosion, honeymoon); 10 warning signs; where to get help.\n\nSession 17: Applying all of this -- solving relationship challenges, creating your personal Relationship Bill of Rights, and visualizing the healthy relationships you want and deserve."}, {"heading": "Create-a-Scenario Challenge -- Instructions", "body": "In your small groups, you will create a fictional relationship scenario -- a short story about two people who are facing a challenge or conflict in their relationship. This can be any type of relationship: friends, family members, boyfriend and girlfriend, classmates, anyone.\n\nRules: it must be fictional, and it must NOT be based on real people in this school or this class.\n\nExample: Jordan and Reina have been best friends since Form 1. Jordan starts hanging out with a new group of friends and stops inviting Reina to do things. When Reina asks about it, Jordan says, 'You are too clingy. I need space.' Reina feels hurt and confused."}, {"heading": "Solving Relationship Challenges -- Discussion Questions to Apply", "body": "For each scenario, ask:\n1. What parts of this relationship are healthy? What parts are unhealthy?\n2. Using what we learned about assertive communication (Session 15), what could the character say?\n3. Using the warning signs (Session 16), are there any red flags here?\n4. What advice would you give?\n\nRemember: 'I' statements from Module 01 are a key tool. Example: 'I feel ___ when ___ because ___.' Connect your advice to specific module content."}, {"heading": "Backup Scenarios for Practice", "body": "Backup Scenario 1: Friendship Conflict\n'Maya and Jamal have been close friends for two years. Recently, Jamal started making fun of Maya in front of other classmates, calling her 'slow' when she does not understand something in class. When Maya tells Jamal it hurts her feelings, Jamal says, 'I am just joking. You are too sensitive.'\n\nBackup Scenario 2: Family Relationship\n'Carla is 15 years old. Her older brother checks her phone every night and gets angry if she has been texting boys. He says he is 'protecting' her, but Carla feels like she has no privacy. When she asks him to stop, he says, 'You should be grateful I care about you.'\n\nBackup Scenario 3: Romantic Relationship\n'Ty and Keisha have been dating for three months. Lately, Ty has been texting Keisha constantly, asking where she is and who she is with. If Keisha does not respond within a few minutes, Ty gets upset and accuses her of ignoring him. Keisha feels stressed and does not know what to do.'"}, {"heading": "My Relationship Bill of Rights -- Instructions", "body": "This handout has two sides:\nFRONT (this side): Your Relationship Bill of Rights -- read the 7 printed rights, add your own personal rights, and sign your commitment.\nBACK (flip over): Your Healthy Relationship Vision -- draw or write what your ideal healthy relationship looks like.\n\nKeep this handout somewhere safe. It is yours. Look at it whenever you need a reminder of what you deserve.\n\nA Bill of Rights is a list of things you are entitled to -- things that no one can take away from you. These are YOUR rights in ALL your relationships: friendships, family, romantic relationships, and more."}, {"heading": "The 7 Core Rights (My Relationship Bill of Rights)", "body": "Read each right carefully. Check the box next to each one.\n\n1. I have the right to privacy -- online and offline.\n2. I have the right to feel safe and respected in all my relationships.\n3. I have the right to decide who I spend time with.\n4. I have the right to say no at any time -- without guilt.\n5. I have the right to keep my friends, family, and interests.\n6. I have the right to end a relationship that does not feel healthy.\n7. I have the right to live free from violence and abuse."}, {"heading": "My Personal Rights (add your own)", "body": "Now add your own rights -- things that are important to YOU in your relationships. What do you need to feel safe, happy, and respected? Write at least one, up to three.\n\n8. I have the right to: _______________________________________________________________\n9. I have the right to: _______________________________________________________________\n10. I have the right to: _______________________________________________________________"}, {"heading": "My Commitment", "body": "By signing below, I am saying: I believe I deserve these rights, and I will stand up for them.\n\nSignature: ____________________________________________\nDate: ____________________"}, {"heading": "My Healthy Relationship Vision -- Instructions", "body": "Use this space to draw or write what your ideal healthy relationship looks like. This can be a friendship, family relationship, or romantic relationship. There is no wrong way to do this -- make it meaningful to YOU.\n\nThink about:\n- What does a healthy relationship look, sound, and feel like?\n- What words describe your ideal relationship? (trust, respect, honesty, kindness, fun, etc.)\n- How do you want to feel in your relationships? (safe, valued, heard, supported, etc.)\n- What do people in healthy relationships do? (listen, communicate, support each other, etc.)\n\nYou can:\n- Draw pictures or symbols\n- Write words or phrases\n- Create a list\n- Make a collage of ideas\n- Do a combination of all of the above\n\nThis is your vision. Make it yours."}, {"heading": "Need Support?", "body": "If you or someone you know is in an unhealthy or abusive relationship, help is available:\n- School counsellor at Toledo Community College\n- Women's Department -- Free counseling and support services\n- National Committee for Families and Children (NCFC) -- Hotline: 0-800-777-HOPE (4673)\n- Trusted adult -- Teacher, family member, coach, or mentor\n\nRemember: Asking for help is a sign of strength, not weakness.\n\nRemember: You deserve relationships that make you feel safe, respected, and valued.\n\nYou are not alone."}], "remember": ["You have rights in all your relationships -- these rights are not negotiable.", "Your personal boundaries and needs matter; you have the right to define and enforce them.", "Knowing your rights helps you recognize when they are being violated and take action.", "You can use everything you have learned -- vocabulary, assertive communication, warning signs -- to solve relationship problems.", "Many relationship challenges can be addressed through assertive communication and boundary-setting.", "Recognizing warning signs early helps you protect yourself and others.", "You have the power to create relationships that match your vision.", "You are not alone -- support is always available.", "Change takes time, and every small step matters."], "vocabulary": [{"term": "Bill of Rights", "definition": "A list of things you are entitled to -- things that no one can take away from you. In Belize, the Constitution includes a Bill of Rights protecting citizens. Your personal Relationship Bill of Rights lists the rights you hold in all your relationships."}, {"term": "Self-efficacy", "definition": "Belief in your own ability to accomplish something. In this session, it means believing you can build and maintain healthy relationships."}, {"term": "Relationship vision", "definition": "A personal picture -- in words, drawings, or symbols -- of what your ideal healthy relationship looks, sounds, and feels like."}, {"term": "Personal commitment", "definition": "A promise you make to yourself -- in this session, signing your name to say 'I believe I deserve these rights, and I will stand up for them.'"}], "reflection": ["Think back to Session 14, when we started this module. What is one thing you have learned or one way you have changed since then?", "Which of the seven printed rights feels most important to you right now? Why?", "Was it easy or difficult to think of your own personal rights? Why?", "How does it feel to sign your name to this commitment?", "What does your healthy relationship vision include?", "How does this vision connect to your Bill of Rights?", "What is one thing you can do this week to move toward this vision?", "Think of one thing you will do differently because of what you have learned in this module -- silently, just for yourself."], "practiceAtHome": ["Keep your Toolkit 17 handout and reflect on it at home.", "Optional: Share your Bill of Rights or vision with a trusted family member or friend.", "Optional: Add to your vision over time as you learn more about yourself."]}, {"id": 18, "module": "M05", "title": "The Mind-Body Connection", "learning": ["Students can define well-being as having physical, emotional, social, and intellectual dimensions and explain how mental and physical health are connected.", "Students believe that paying attention to their body is a practical way to care for their mental health.", "Students demonstrate a guided body scan and mindful breathing practice, noticing and naming at least one body sensation."], "keyConcepts": [{"heading": "What Is Well-Being?", "body": "Well-being means feeling good and functioning well across four areas of your life:\n- Physical: Getting enough sleep, eating well, exercising, drinking water\n- Emotional: Feeling happy, managing stress, expressing your feelings\n- Social: Having friends you trust, feeling connected, helping others\n- Intellectual / Creative: Learning new things, being curious, creating something\n\nRemember: Your mental health and physical health are connected. What happens in your body affects your mind. What happens in your mind affects your body."}, {"heading": "The Body Scan", "body": "A body scan is a way of paying attention to the sensations in your body, one area at a time. It helps you notice how you are feeling before your emotions get too big.\n\nHow to Do a Body Scan (1-2 minutes):\n1. Sit comfortably. Feet on the floor. Hands in your lap.\n2. Close your eyes or look at a spot on the floor.\n3. Start at your feet. Notice any sensations: warmth, coolness, pressure.\n4. Move to your legs. Heavy? Light? Tingling?\n5. Move to your stomach and chest. Tight? Calm? Butterflies?\n6. Move to your shoulders. Tense? Try squeezing them up toward your ears, then releasing.\n7. Move to your hands and arms. Any tingling or warmth?\n8. Move to your face. Jaw clenched? Forehead tight? Let it soften.\n9. Take one deep breath. Open your eyes."}, {"heading": "Mindful Breathing", "body": "Mindful breathing is not about changing your breath. It is about noticing it.\n\nHow to Practise (1 minute):\n1. Sit comfortably and close your eyes or soften your gaze.\n2. Breathe normally. Do not try to change anything.\n3. Notice where you feel the breath most: nose, chest, or belly.\n4. Keep your attention there.\n5. When your mind wanders (it will!), gently bring it back. No frustration.\n6. After one minute, take a deep breath and open your eyes.\n\nYour breath is an anchor. Like a boat anchor keeps a boat from drifting, your breath keeps your attention steady."}], "remember": ["Well-being is not just the absence of illness; it means feeling good, functioning well, and caring for yourself across multiple areas of life.", "Everyone experiences ups and downs in their well-being. This is normal.", "Physical health and mental health are deeply connected: what happens in your body affects your mind, and what happens in your mind affects your body.", "A body scan is a way of paying attention to the sensations in your body, one area at a time.", "Body sensations are like signals: they tell you something about how you are feeling, even before you have words for it.", "There is no right or wrong way to feel during a body scan. Whatever you notice is information.", "Mindful breathing is not about controlling your breath; it is about noticing it.", "Your breath is an anchor: something you can always return to when your mind is busy or your emotions are strong.", "You already know how to breathe. Mindful breathing simply means paying attention while you do it."], "vocabulary": [{"term": "Well-being", "definition": "Feeling good and functioning well across four areas of life: physical, emotional, social, and intellectual/creative."}, {"term": "Body scan", "definition": "A way of paying attention to the sensations in your body, one area at a time, to help you notice how you are feeling."}, {"term": "Mindful breathing", "definition": "A practice of noticing your breath as it comes in and goes out, without trying to change it -- using the breath as an anchor for attention."}, {"term": "Anchor", "definition": "Something you can always return to when your mind is busy or your emotions are strong. In mindful breathing, your breath is your anchor."}, {"term": "Mind-body connection", "definition": "The deep link between mental health and physical health -- what happens in your body affects your mind, and what happens in your mind affects your body."}], "reflection": ["What sensations did you notice during the body scan?", "Was it easy or difficult to keep your attention on one body part at a time? Why?", "How might paying attention to your body help you understand your emotions?", "Where in your body did you feel the breath most?", "How many times did your mind wander? What brought it back?", "What is one thing you learned today that you did not know before?", "Which practice, the body scan or the breathing, felt more natural to you?"], "practiceAtHome": ["Do a one-minute body scan before bed tonight.", "Try one minute of mindful breathing when you wake up tomorrow.", "Ask a family member: 'What does well-being mean to you?'"]}, {"id": 19, "module": "M05", "title": "Stress and Coping Strategies", "learning": ["Students can identify personal and external sources of stress, explain the 90-second emotion concept, and describe the steps of R.A.I.N. and S.T.O.P.", "Students feel confident that stress is manageable using structured techniques and that difficult emotions are temporary.", "Students practise the R.A.I.N. or S.T.O.P. technique in a guided exercise and identify which coping strategy they prefer."], "keyConcepts": [{"heading": "The 90-Second Rule", "body": "Scientists have discovered that the chemical surge of an emotion in your brain lasts only about 90 seconds. After that, the physical feeling fades. What keeps emotions going longer is your thoughts -- replaying the situation, worrying about what happens next. The tools below help you ride the 90-second wave instead of getting pulled under."}, {"heading": "R.A.I.N. -- For When You Have a Few Minutes", "body": "Use R.A.I.N. when you are feeling a strong emotion and have some time to sit with it.\n\nR -- Recognize: Name what you are feeling. Example: 'I am feeling frustrated.'\nA -- Allow: Let the feeling be there. Do not push it away. Example: 'It is okay to feel this.'\nI -- Investigate: Notice where you feel it in your body. Example: 'My chest is tight. My jaw is clenched.'\nN -- Non-identify: Remind yourself: the feeling is not who you are. Example: 'I am not my frustration. It will pass.'"}, {"heading": "S.T.O.P. -- For When You Need to Act Fast", "body": "Use S.T.O.P. when you are in the middle of a situation and feel yourself about to react.\n\nS -- Stop: Freeze. Pause whatever you are doing.\nT -- Take a breath: One deep breath in and out.\nO -- Observe: What am I feeling? What is happening in my body?\nP -- Proceed: Choose how to respond instead of just reacting."}, {"heading": "My Full Coping Toolkit", "body": "Circle or star the strategies that feel most natural to you:\n\nDeep breathing -- Anytime you need to calm down -- Learned in M01, Session 3\nProgressive muscle relaxation -- When your body is tense -- Learned in M01, Session 3\n5-4-3-2-1 grounding -- When your mind is racing -- Learned in M01, Session 3 and M05, Session 19\nBody scan -- When you want to check in with your body -- Learned in M05, Session 18\nMindful breathing -- When you want to be present -- Learned in M05, Session 18\nCatch-Check-Change -- When you have an unhelpful thought -- Learned in M01, Session 5\nR.A.I.N. -- When you have time to sit with a big emotion -- Learned in M05, Session 19\nS.T.O.P. -- When you need a quick reset before reacting -- Learned in M05, Session 19\n\nMy top 3 strategies: (write them here)"}], "remember": ["Stress is a normal part of life. Everyone experiences it.", "Stress affects your body: headaches, tight muscles, trouble sleeping, stomach problems. This is the mind-body connection.", "Stress comes from both personal situations (exams, arguments) and bigger forces (poverty, family challenges, community pressures). Understanding the source helps you choose the right coping strategy.", "Emotions are 'energy in motion.' The biological surge of an emotion lasts roughly 90 seconds. It is our thoughts that keep it going longer.", "R.A.I.N. helps you work through a difficult emotion rather than fighting it or being overwhelmed by it.", "S.T.O.P. is a quick in-the-moment reset when you feel yourself about to react.", "You do not need to choose one or the other. R.A.I.N. is for when you have a few minutes to sit with an emotion. S.T.O.P. is for when you need to act fast.", "Grounding works by pulling your attention out of your worried thoughts and into what is happening right now.", "The more you practise, the faster grounding works when you really need it."], "vocabulary": [{"term": "Stress", "definition": "A normal physical and emotional response to pressure from personal situations (exams, arguments) or bigger forces (poverty, family challenges, community pressures)."}, {"term": "R.A.I.N.", "definition": "A four-step technique for working through a difficult emotion: Recognize, Allow, Investigate, Non-identify."}, {"term": "S.T.O.P.", "definition": "A four-step quick reset technique for when you feel yourself about to react: Stop, Take a breath, Observe, Proceed."}, {"term": "90-second rule", "definition": "The scientific finding that the chemical surge of an emotion in your brain lasts only about 90 seconds; it is thoughts that keep the emotion going longer."}, {"term": "Non-identify", "definition": "The N step in R.A.I.N.: reminding yourself that you are not your emotion -- you are a person having an emotion, and it will pass."}, {"term": "Grounding", "definition": "A technique (like 5-4-3-2-1) that pulls your attention out of worried thoughts and into the present moment using your five senses."}, {"term": "Coping toolkit", "definition": "A personal collection of strategies you can draw on when stress or big emotions arise."}], "reflection": ["Were you surprised by anything on the board?", "How does stress show up in your body?", "What is something helpful you already do when difficult feelings come up?", "Which tool do you think you are more likely to try: R.A.I.N. or S.T.O.P.? Why?"], "practiceAtHome": ["Use R.A.I.N. the next time you feel frustrated or upset.", "Use S.T.O.P. before you react in a stressful moment.", "Teach a family member what R.A.I.N. or S.T.O.P. stands for.", "The next time you feel a strong emotion this week, try using either R.A.I.N. or S.T.O.P. Notice what happens. You do not need to write anything down. Just notice."]}, {"id": 20, "module": "M05", "title": "Breaking Mental Health Stigma", "learning": ["Students can identify at least three observable signs that a friend may be struggling with their mental health, and explain what stigma is and how it affects help-seeking.", "Students believe that mental health challenges are common, not shameful, and that supporting a friend who is struggling is an act of strength.", "Students demonstrate supportive language they would use with a friend who is struggling, and identify at least one personal action to reduce mental health stigma."], "keyConcepts": [{"heading": "Signs a Friend Might Be Struggling", "body": "You do not need to be a doctor to notice when someone is going through a hard time. Look for changes in how they usually act:\n\nMood changes: Seems sad all the time, gets angry easily, cries a lot, stops laughing\nSocial changes: Stops hanging out with friends, sits alone, avoids group activities\nEnergy/body changes: Always tired, not eating, sleeping too much or too little\nBehaviour changes: Grades drop, stops doing things they used to enjoy, takes big risks\nWhat they say: 'Nobody cares,' 'What's the point,' talks about wanting to disappear\n\nRemember: Noticing signs is not about diagnosing. It is about caring enough to pay attention."}, {"heading": "Myths vs Facts", "body": "Myth: 'People with mental health problems are dangerous.'\nFact: People with mental health challenges are more likely to be hurt than to hurt others.\n\nMyth: 'Mental health problems are a sign of weakness.'\nFact: Mental health challenges can affect anyone. Asking for help takes courage.\n\nMyth: 'Young people do not get real mental health problems.'\nFact: Half of all mental health conditions begin by age 14.\n\nMyth: 'Talking about it makes it worse.'\nFact: Talking about mental health in safe settings reduces stigma and helps people get support.\n\nMyth: 'You can just snap out of it.'\nFact: Mental health conditions involve real changes in how the brain works. You cannot just 'will' them away."}, {"heading": "What a Supportive Friend Says", "body": "If a friend tells you they are struggling, here are things you can say:\n- 'I am glad you told me. That took courage.'\n- 'Everyone needs someone to talk to. It does not mean you are weak.'\n- 'Your mental health is just as important as your physical health.'\n- 'I am here for you. And there are adults who can help too.'\n- 'You are not alone in this.'\n\nWhat NOT to say:\n- 'Just get over it.' (This is a myth!)\n- 'It is not that bad.'\n- 'Other people have it worse.'\n\nImportant: If a friend tells you something that makes you worried about their safety -- like they want to hurt themselves -- tell a trusted adult. Being a good friend sometimes means getting help, even if your friend asks you not to."}, {"heading": "Box Breathing", "body": "Box breathing has four equal sides, just like a box. Use it anytime you need to calm down.\n\nBreathe in for a count of 3.\nHold for a count of 3.\nBreathe out for a count of 3.\nHold for a count of 3.\nRepeat 3-5 times."}], "remember": ["Mental health challenges often show up in changes you can see: changes in behaviour, mood, energy, or social patterns.", "Noticing these signs is not about diagnosing someone. It is about caring enough to pay attention.", "Everyone goes through tough times. Recognising the signs is the first step to being a good friend.", "Stigma means negative attitudes, beliefs, or stereotypes about a group of people. When it comes to mental health, stigma makes people feel ashamed and stops them from getting help.", "Many beliefs about mental health are myths, not facts. Examining what we believe is the first step to reducing stigma.", "Stigma is not always intentional. It can come from culture, generation, or simply not knowing enough. That is why education matters.", "You do not need to be a counsellor to help a friend. Sometimes just listening and saying the right thing makes all the difference.", "Supporting a friend does not mean fixing their problems. It means being present, listening, and helping them find adult support when needed."], "vocabulary": [{"term": "Stigma", "definition": "Negative beliefs or stereotypes about a group of people that lead to shame, silence, or unfair treatment. Mental health stigma stops people from asking for help."}, {"term": "Box breathing", "definition": "A breathing technique with four equal parts -- breathe in for 3, hold for 3, breathe out for 3, hold for 3 -- used to calm anxiety."}, {"term": "Mental health literacy", "definition": "Knowledge and understanding of mental health challenges, including how to recognise signs and how to seek or offer support."}], "reflection": ["What is one myth about mental health that you have heard in your community?", "What would you be afraid to ask about mental health? Why?", "What is one action you could take to reduce stigma in your school or community?", "Which myth surprised you the most? Why?", "Where do you think these myths come from?", "What felt easy about being a supportive friend? What felt hard?", "Why is it important to involve a trusted adult if a friend is in danger?"], "practiceAtHome": ["Correct one mental health myth the next time you hear it.", "Ask someone you care about how they are really doing and listen without judging.", "Teach a family member what stigma means and why it matters.", "Think about one person in your life you have not checked in on recently. Find a moment to ask them how they are doing and really listen.", "Teach a family member one supportive sentence from today's lesson. Explain when they might use it.", "The next time you hear someone say something stigmatising about mental health, try gently correcting the myth with a fact from today's session."]}, {"id": 21, "module": "M05", "title": "Help-Seeking and Self-Care", "learning": ["Students can apply the 'Three Rs' test (Relationships, Responsibilities, Recreation) to decide when a situation requires adult help, and identify at least three trusted adults or community resources they can turn to.", "Students believe that asking for help is a sign of strength and that self-care is a personal responsibility they can take action on.", "Students create a personalised self-care plan covering physical, emotional, social, and intellectual/creative well-being, and write at least one conversation starter for seeking help from a trusted adult."], "keyConcepts": [{"heading": "Friendly Wishes (Self-Compassion)", "body": "When you need to be kind to yourself, close your eyes and repeat:\n'May I be happy.'\n'May I be peaceful.'\n'May I be safe.'\n\nYou deserve kindness from yourself just as much as from anyone else."}, {"heading": "The Three Rs: When to Ask for Help", "body": "Ask yourself: Is the problem affecting my...\n\nRelationships -- Am I pulling away from friends or fighting with family? (Example: Avoiding people, feeling alone, constant arguments)\nResponsibilities -- Are my grades dropping? Am I missing school or not doing what I need to do? (Example: Failing classes, skipping school, not doing chores)\nRecreation -- Have I stopped enjoying things I used to love? (Example: No interest in sports, music, hobbies, or hanging out)\n\nIf the answer is YES to one or more -- Talk to a trusted adult.\nAsking for help is a sign of strength, not weakness."}, {"heading": "Conversation Starters", "body": "Not sure what to say? Try one of these:\n- 'I have been feeling _________ lately and I need someone to talk to.'\n- 'Something has been bothering me and I do not know what to do.'\n- 'I am worried about a friend because _________. Can you help?'\n- 'I do not feel like myself and I think I might need some help.'\n\nYou only need two things: What you feel + What you need."}, {"heading": "My Trusted Adult Map", "body": "Write the names of people you trust in each circle:\n\nPersonal (family, family friends):\n- _______________________________\n- _______________________________\n- _______________________________\n\nSchool (teachers, counsellors, coaches):\n- _______________________________\n- _______________________________\n- _______________________________\n\nCommunity (religious leaders, health workers, youth leaders):\n- _______________________________\n- _______________________________\n- _______________________________\n\nSchool counsellor: _______________________________"}, {"heading": "My Self-Care Plan", "body": "Fill in at least two actions for each area:\n\nPhysical:\n1. __________________________\n2. __________________________\n3. __________________________\n\nEmotional:\n1. __________________________\n2. __________________________\n3. __________________________\n\nSocial:\n1. __________________________\n2. __________________________\n3. __________________________\n\nIntellectual / Creative:\n1. __________________________\n2. __________________________\n3. __________________________\n\nIdeas to get you started:\nPhysical: Walk to school, drink more water, stretch before bed, play football, go swimming\nEmotional: Body scan before sleep, use R.A.I.N. when upset, write in a journal, box breathing\nSocial: Eat lunch with a friend, check in on someone, play dominoes, visit family\nIntellectual/Creative: Read for fun, draw or paint, learn a new recipe, write a poem, learn a song"}, {"heading": "My Full Coping Toolkit (Complete)", "body": "All the strategies you have learned across M01 and M05:\n\nDeep breathing -- Anytime you need to calm down -- M01, Session 3\nProgressive muscle relaxation -- When your body is tense -- M01, Session 3\n5-4-3-2-1 grounding -- When your mind is racing -- M01, Session 3 and M05, Session 19\nCatch-Check-Change -- When you have an unhelpful thought -- M01, Session 5\nBody scan -- When you want to check in with your body -- M05, Session 18\nMindful breathing -- When you want to be present -- M05, Session 18\nR.A.I.N. -- When you have time to sit with a big emotion -- M05, Session 19\nS.T.O.P. -- When you need a quick reset before reacting -- M05, Session 19\nBox breathing -- When you need to calm anxiety -- M05, Session 20\nFriendly Wishes -- When you need to be kind to yourself -- M05, Session 21"}], "remember": ["Some problems are too big to handle alone. That is not a failure; it is a fact of life.", "The Three Rs test helps you decide when to seek help: when a problem is affecting your Relationships, your Responsibilities, or your Recreation.", "Knowing how to start the conversation is half the battle. Having the right words ready makes it easier.", "A trusted adult is someone who makes you feel safe through their words or actions, and someone you would feel comfortable having a sensitive conversation with.", "Your support network should include more than one person, because different people can help with different things.", "If your network feels small right now, that is okay. The school counsellor is always a starting point, and you can grow your network over time.", "Self-care is not selfish. It is how you keep your well-being strong so you can handle whatever life throws at you.", "A good self-care plan covers four areas: physical, emotional, social, and intellectual/creative.", "The best self-care plan is one you will actually use. Choose activities that are realistic, free or low-cost, and enjoyable.", "Asking for help is a sign of strength, not weakness."], "vocabulary": [{"term": "Three Rs test", "definition": "A simple decision tool for knowing when to seek help: ask whether a problem is affecting your Relationships, your Responsibilities, or your Recreation."}, {"term": "Trusted adult", "definition": "Someone who makes you feel safe through their words or actions, and someone you would feel comfortable having a sensitive conversation with."}, {"term": "Self-care plan", "definition": "A personal plan with specific, achievable actions across four domains -- physical, emotional, social, and intellectual/creative -- to maintain well-being."}, {"term": "Friendly Wishes", "definition": "A self-compassion practice of silently repeating kind wishes to yourself ('May I be happy. May I be peaceful. May I be safe.') to build kindness toward yourself."}, {"term": "Self-compassion", "definition": "Being kind to yourself in the same way you would be kind to a good friend."}, {"term": "Support network", "definition": "A set of trusted people across personal, school, and community categories who you can turn to for help in different situations."}, {"term": "Recreation", "definition": "The things you do for fun -- sports, music, hanging out with friends, cooking, drawing, or whatever makes you feel good."}], "reflection": ["What is one thing from this module that you will remember or use?", "Is there anything you feel differently about now compared to when we started?"], "practiceAtHome": ["Try one activity from each quadrant of your self-care plan this week. Put a check mark next to each one you complete. Bring your plan to the next session to show your progress.", "Use a conversation starter to check in with someone you trust.", "Practise Friendly Wishes for two minutes before bed.", "Share your self-care plan with a family member and ask them to make one too.", "Write one conversation starter on a small piece of paper and keep it in your pocket or notebook. Having the words ready makes it easier to use them when you need to.", "Share your trusted adult map with a family member. Ask them who they would add. Keep the map somewhere you can find it easily."]}, {"id": 22, "module": "M06", "title": "Substances in Our World -- Facts, Myths, and Our Bodies", "learning": ["Students can identify at least three harmful effects of alcohol, vaping, and other common substances on the adolescent brain and body.", "Students believe that substance use during adolescence carries real health risks and that most of their peers do not regularly use substances.", "Students can explain to a peer how substance use affects the developing brain using at least one specific fact."], "keyConcepts": [{"heading": "The Developing Brain", "body": "Your brain is still building itself until you are about 25 years old. The most important parts -- the ones that help you make decisions, remember what you learn, and feel motivated -- are still under construction during your teenage years."}, {"heading": "Prefrontal Cortex (front)", "body": "Decision-making, Planning, Impulse control. This is your decision-making center. It helps you plan, control your impulses, and think about consequences."}, {"heading": "Hippocampus (middle)", "body": "Memory and Learning. This is your memory and learning center. It helps you remember what you study and learn new information."}, {"heading": "Reward System (deep in the brain)", "body": "Pleasure, Motivation, Habit formation. This is your pleasure and motivation center. It helps you feel good when you accomplish something or spend time with friends."}, {"heading": "How Alcohol Affects Your Brain", "body": "Shrinks the hippocampus (memory problems); Slows the prefrontal cortex (poor decisions); Disrupts sleep (can't focus, mood problems). One fact to share: 'Drinking alcohol as a teenager can literally shrink the part of your brain responsible for memory and learning.'"}, {"heading": "How Vaping/Nicotine Affects Your Brain", "body": "Hijacks the reward system (addiction); Reduces concentration and focus; Increases anxiety. One fact to share: 'Nicotine rewires your brain so you need it just to feel normal. It also makes it harder to concentrate in class.'"}, {"heading": "How Cannabis Affects Your Brain", "body": "Impairs the hippocampus (memory and learning problems); Affects the prefrontal cortex (low motivation, poor planning); Can trigger anxiety and paranoia. One fact to share: 'Cannabis makes it hard to remember things and hard to care about your goals. It can also cause anxiety and paranoia.'"}, {"heading": "Did You Know? The Truth About Substance Use at TCC", "body": "Most of your peers are making healthy choices. Here are the real numbers: 67 out of 100 TCC students do NOT vape; 76 out of 100 TCC students do NOT use alcohol; 77 out of 100 TCC students have NOT witnessed binge drinking at home. What does this mean? You are NOT alone in choosing not to use substances. Most students at TCC are making the same healthy choice you are."}, {"heading": "Key Message", "body": "'Your brain is still building itself until you're about 25. Using substances during this time is like pouring sand into an engine that's still being assembled. It causes damage that can last a lifetime.'"}], "remember": ["Your brain is still developing until around age 25.", "Substance use during adolescence can cause lasting harm to memory, decision-making, and emotional regulation.", "Understanding how substances affect the brain empowers you to make informed choices.", "Most TCC students do NOT use substances.", "People often overestimate how many of their peers use substances.", "You are not alone in choosing not to use substances."], "vocabulary": [{"term": "Adolescent Brain Development", "definition": "The process by which the brain matures from childhood through the mid-20s. The prefrontal cortex (responsible for decision-making and impulse control) is one of the last areas to fully develop."}, {"term": "False Consensus Effect", "definition": "A cognitive bias in which people overestimate the extent to which their beliefs, behaviors, and attitudes are shared by others."}, {"term": "Hippocampus", "definition": "A brain structure involved in memory formation and learning."}, {"term": "Nicotine", "definition": "A highly addictive chemical found in tobacco and most vaping products. It affects the brain's reward system."}, {"term": "Positive Norms", "definition": "Accurate data about healthy behaviors that are more common than people assume. Sharing positive norms can reduce risky behavior by correcting misperceptions."}, {"term": "Prefrontal Cortex", "definition": "The front part of the brain responsible for decision-making, planning, impulse control, and reasoning."}, {"term": "Reward System", "definition": "A network of brain structures that control motivation, pleasure, and reinforcement learning. Substances like nicotine, alcohol, and cannabis hijack this system."}, {"term": "Substance Use", "definition": "The use of alcohol, tobacco (including vaping), cannabis, or other drugs. 'Substance use' is preferred over 'drug use' to reduce stigma and encompass a wide range of substances."}], "reflection": ["Which brain area do you think is most important to protect? Why?", "How does knowing these facts change the way you think about substance use?", "What would you say to a friend who believes 'everyone uses substances'?", "Which statement surprised you the most?", "Where do you think myths about substances come from?", "Why is it important to know what's really happening, rather than what we think is happening?", "How might knowing these facts help you when you're in a situation where substances are offered?"], "practiceAtHome": ["One Thing I Want to Remember from Today: Write one fact, one feeling, or one commitment from today's session."]}, {"id": 23, "module": "M06", "title": "Seeing Through the Smoke -- How Substances Are Marketed to Us", "learning": ["Students can identify at least three marketing tactics used by substance companies to target young people and explain why evaluating health information sources matters.", "Students feel more skeptical about substance-related claims in advertising and social media and believe they can think critically about health messages.", "Students demonstrate the ability to evaluate a health claim about substances by asking who created it, why, and whether the source is trustworthy."], "keyConcepts": [{"heading": "What You Learned Today", "body": "In Session 23, you learned how substance companies use marketing tricks to make their products look fun, safe, and cool -- even when they're not. You also learned how to check if health information is trustworthy. This toolkit is yours to keep. Use it whenever you see an ad, hear a health claim, or wonder if something is true."}, {"heading": "The 4 Marketing Tactics Companies Use", "body": "Substance companies (alcohol, vapes, energy drinks, etc.) use these tactics to target young people. Watch out for them!"}, {"heading": "1. Social Media Targeting", "body": "Ads based on what you like, search for, or talk about online. They feel personal, but they're designed to sell."}, {"heading": "2. Influencer Partnerships", "body": "Popular people (athletes, musicians, influencers) get paid to promote products. It feels like a recommendation from someone you trust, but it's really an ad."}, {"heading": "3. Lifestyle Branding", "body": "Ads that show people having fun at parties, beaches, or events. They're selling a feeling (fun, coolness, fitting in), not just the product."}, {"heading": "4. Flavour and Design Appeal", "body": "Candy-like flavours (mango, strawberry), bright colours, cartoons, or sleek designs that make products look harmless and attractive."}, {"heading": "Remember", "body": "If a company is spending money to convince you, ask yourself: Who benefits?"}, {"heading": "The 3-Question Check", "body": "Use these questions to figure out if health information is trustworthy."}, {"heading": "1. WHO made this claim?", "body": "A doctor or health organization? (More trustworthy). A company selling a product? (Less trustworthy). A friend sharing their opinion? (May be honest, but not always accurate)."}, {"heading": "2. WHY did they share it?", "body": "To inform and protect your health? (Good reason). To sell you something or make money? (Red flag). To scare you or get attention? (Be cautious)."}, {"heading": "3. WHAT evidence supports it?", "body": "Medical research or scientific studies? (Strong evidence). Personal opinion or experience? (Weak evidence). Nothing -- just a claim? (Not trustworthy)."}
