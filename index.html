ing for what you want or need in an honest, respectful way -- without putting yourself or the other person down.", "module": "M04", "session": 15}, {"term": "Refusal skills", "definition": "A form of assertive communication that protects your boundaries and consent by helping you say no clearly and confidently.", "module": "M04", "session": 15}, {"term": "\"I\" statements", "definition": "A communication tool from Module 1: 'I feel ___ when ___ because ___.' Used to express feelings honestly without blaming the other person.", "module": "M04", "session": 15}, {"term": "Tension building", "definition": "Phase 1 of the abuse cycle: the abuser becomes irritable, critical, and jealous; the partner feels like they are walking on eggshells.", "module": "M04", "session": 16}, {"term": "Explosion", "definition": "Phase 2 of the abuse cycle: the abuse actually happens -- physical, emotional, or verbal harm.", "module": "M04", "session": 16}, {"term": "Honeymoon phase", "definition": "Phase 3 of the abuse cycle: the abuser apologises, makes promises, and may give gifts; the partner believes things will change.", "module": "M04", "session": 16}, {"term": "Cycle of abuse", "definition": "A pattern of abuse that repeats: tension building, explosion, honeymoon, repeat -- usually getting worse over time.", "module": "M04", "session": 16}, {"term": "Red flag", "definition": "A warning sign that tells you a relationship may be unhealthy or dangerous.", "module": "M04", "session": 16}, {"term": "Emotional manipulation", "definition": "Using feelings or fear to control another person, for example, threatening to hurt oneself if a partner tries to leave.", "module": "M04", "session": 16}, {"term": "Public humiliation", "definition": "Putting someone down or making fun of them in front of others. This is a form of emotional abuse.", "module": "M04", "session": 16}, {"term": "Bill of Rights", "definition": "A list of things you are entitled to -- things that no one can take away from you. In Belize, the Constitution includes a Bill of Rights protecting citizens. Your personal Relationship Bill of Rights lists the rights you hold in all your relationships.", "module": "M04", "session": 17}, {"term": "Self-efficacy", "definition": "Belief in your own ability to accomplish something. In this session, it means believing you can build and maintain healthy relationships.", "module": "M04", "session": 17}, {"term": "Relationship vision", "definition": "A personal picture -- in words, drawings, or symbols -- of what your ideal healthy relationship looks, sounds, and feels like.", "module": "M04", "session": 17}, {"term": "Personal commitment", "definition": "A promise you make to yourself -- in this session, signing your name to say 'I believe I deserve these rights, and I will stand up for them.'", "module": "M04", "session": 17}, {"term": "Well-being", "definition": "Feeling good and functioning well across four areas of life: physical, emotional, social, and intellectual/creative.", "module": "M05", "session": 18}, {"term": "Body scan", "definition": "A way of paying attention to the sensations in your body, one area at a time, to help you notice how you are feeling.", "module": "M05", "session": 18}, {"term": "Mindful breathing", "definition": "A practice of noticing your breath as it comes in and goes out, without trying to change it -- using the breath as an anchor for attention.", "module": "M05", "session": 18}, {"term": "Anchor", "definition": "Something you can always return to when your mind is busy or your emotions are strong. In mindful breathing, your breath is your anchor.", "module": "M05", "session": 18}, {"term": "Mind-body connection", "definition": "The deep link between mental health and physical health -- what happens in your body affects your mind, and what happens in your mind affects your body.", "module": "M05", "session": 18}, {"term": "Stress", "definition": "A normal physical and emotional response to pressure from personal situations (exams, arguments) or bigger forces (poverty, family challenges, community pressures).", "module": "M05", "session": 19}, {"term": "R.A.I.N.", "definition": "A four-step technique for working through a difficult emotion: Recognize, Allow, Investigate, Non-identify.", "module": "M05", "session": 19}, {"term": "S.T.O.P.", "definition": "A four-step quick reset technique for when you feel yourself about to react: Stop, Take a breath, Observe, Proceed.", "module": "M05", "session": 19}, {"term": "90-second rule", "definition": "The scientific finding that the chemical surge of an emotion in your brain lasts only about 90 seconds; it is thoughts that keep the emotion going longer.", "module": "M05", "session": 19}, {"term": "Non-identify", "definition": "The N step in R.A.I.N.: reminding yourself that you are not your emotion -- you are a person having an emotion, and it will pass.", "module": "M05", "session": 19}, {"term": "Grounding", "definition": "A technique (like 5-4-3-2-1) that pulls your attention out of worried thoughts and into the present moment using your five senses.", "module": "M05", "session": 19}, {"term": "Coping toolkit", "definition": "A personal collection of strategies you can draw on when stress or big emotions arise.", "module": "M05", "session": 19}, {"term": "Stigma", "definition": "Negative beliefs or stereotypes about a group of people that lead to shame, silence, or unfair treatment. Mental health stigma stops people from asking for help.", "module": "M05", "session": 20}, {"term": "Box breathing", "definition": "A breathing technique with four equal parts -- breathe in for 3, hold for 3, breathe out for 3, hold for 3 -- used to calm anxiety.", "module": "M05", "session": 20}, {"term": "Mental health literacy", "definition": "Knowledge and understanding of mental health challenges, including how to recognise signs and how to seek or offer support.", "module": "M05", "session": 20}, {"term": "Three Rs test", "definition": "A simple decision tool for knowing when to seek help: ask whether a problem is affecting your Relationships, your Responsibilities, or your Recreation.", "module": "M05", "session": 21}, {"term": "Trusted adult", "definition": "Someone who makes you feel safe through their words or actions, and someone you would feel comfortable having a sensitive conversation with.", "module": "M05", "session": 21}, {"term": "Self-care plan", "definition": "A personal plan with specific, achievable actions across four domains -- physical, emotional, social, and intellectual/creative -- to maintain well-being.", "module": "M05", "session": 21}, {"term": "Friendly Wishes", "definition": "A self-compassion practice of silently repeating kind wishes to yourself ('May I be happy. May I be peaceful. May I be safe.') to build kindness toward yourself.", "module": "M05", "session": 21}, {"term": "Self-compassion", "definition": "Being kind to yourself in the same way you would be kind to a good friend.", "module": "M05", "session": 21}, {"term": "Support network", "definition": "A set of trusted people across personal, school, and community categories who you can turn to for help in different situations.", "module": "M05", "session": 21}, {"term": "Recreation", "definition": "The things you do for fun -- sports, music, hanging out with friends, cooking, drawing, or whatever makes you feel good.", "module": "M05", "session": 21}, {"term": "Adolescent Brain Development", "definition": "The process by which the brain matures from childhood through the mid-20s. The prefrontal cortex (responsible for decision-making and impulse control) is one of the last areas to fully develop.", "module": "M06", "session": 22}, {"term": "False Consensus Effect", "definition": "A cognitive bias in which people overestimate the extent to which their beliefs, behaviors, and attitudes are shared by others.", "module": "M06", "session": 22}, {"term": "Hippocampus", "definition": "A brain structure involved in memory formation and learning.", "module": "M06", "session": 22}, {"term": "Nicotine", "definition": "A highly addictive chemical found in tobacco and most vaping products. It affects the brain's reward system.", "module": "M06", "session": 22}, {"term": "Positive Norms", "definition": "Accurate data about healthy behaviors that are more common than people assume. Sharing positive norms can reduce risky behavior by correcting misperceptions.", "module": "M06", "session": 22}, {"term": "Prefrontal Cortex", "definition": "The front part of the brain responsible for decision-making, planning, impulse control, and reasoning.", "module": "M06", "session": 22}, {"term": "Reward System", "definition": "A network of brain structures that control motivation, pleasure, and reinforcement learning. Substances like nicotine, alcohol, and cannabis hijack this system.", "module": "M06", "session": 22}, {"term": "Substance Use", "definition": "The use of alcohol, tobacco (including vaping), cannabis, or other drugs. 'Substance use' is preferred over 'drug use' to reduce stigma and encompass a wide range of substances.", "module": "M06", "session": 22}, {"term": "Environmental health", "definition": "The study of how things in our environment affect people's health", "module": "M07", "session": 26}, {"term": "Toxicity", "definition": "How harmful a substance is -- some things are more toxic than others", "module": "M07", "session": 26}, {"term": "Exposure", "definition": "When a hazard comes into contact with your body", "module": "M07", "session": 26}, {"term": "Exposure route", "definition": "The way a hazard enters your body: breathing, swallowing, or skin contact", "module": "M07", "session": 26}, {"term": "Inhalation", "definition": "One of the three routes of exposure. Hazards enter the body through the nose and mouth and into the lungs. Smoke from milpa burning and pesticide drift are common inhalation hazards in Toledo District.", "module": "M07", "session": 26}, {"term": "Ingestion", "definition": "One of the three routes of exposure. Hazards enter the body through the mouth and into the digestive system. Drinking contaminated creek water is a common ingestion hazard in Toledo District.", "module": "M07", "session": 26}, {"term": "Dermal contact (skin contact)", "definition": "One of the three routes of exposure. Hazards enter the body through the skin, particularly through the hands, arms, or feet. Pesticide handling without gloves and wading through floodwater are common examples in Toledo District.", "module": "M07", "session": 26}, {"term": "Vulnerability", "definition": "The degree to which a person is susceptible to harm from an environmental hazard. Children, pregnant women, elderly people, and outdoor workers are generally more vulnerable to environmental health risks.", "module": "M07", "session": 26}, {"term": "Environmental justice", "definition": "The principle that all people deserve equal protection from environmental hazards, regardless of race, income, or location. Environmental injustice occurs when some communities bear a disproportionate burden of environmental risk.", "module": "M07", "session": 26}, {"term": "Milpa", "definition": "A traditional agricultural practice in Mesoamerica involving slash-and-burn clearing of forest to create farmland. While culturally significant, the burning phase produces smoke that can affect air quality and respiratory health.", "module": "M07", "session": 26}, {"term": "Climate driver", "definition": "A change in climate conditions (e.g., heavier rainfall, longer droughts, stronger hurricanes)", "module": "M07", "session": 27}, {"term": "Environmental condition", "definition": "What happens in the environment as a result of the climate driver (e.g., flooding, water shortage)", "module": "M07", "session": 27}, {"term": "Environmental hazard", "definition": "The specific thing that directly threatens health (e.g., contaminated water, mosquitoes, mould)", "module": "M07", "session": 27}, {"term": "Health outcome", "definition": "How people's health is affected (e.g., illness, injury, mental health effects)", "module": "M07", "session": 27}, {"term": "Climate-health pathway", "definition": "A step-by-step model showing how a climate driver leads to a health outcome through environmental conditions and environmental hazards. The four steps are: climate driver --> environmental condition --> environmental hazard --> health outcome.", "module": "M07", "session": 27}, {"term": "Complex system", "definition": "A system with many interconnected parts, where changes in one part affect many other parts. Climate, environment, and health form a complex system. Contrast with a simple system, which has one cause and one effect.", "module": "M07", "session": 27}, {"term": "Cross-connection", "definition": "A link between two or more pathways in a climate-health map, showing that different climate events can produce related environmental hazards or health outcomes. For example, both flooding and drought affect water quality.", "module": "M07", "session": 27}, {"term": "Systems thinking", "definition": "An approach to understanding complex problems by looking at how all the parts are connected, rather than examining each part in isolation. Systems thinking recognises that changing one part of a system affects many other parts, and that systems often have both intended and unintended consequences.", "module": "M07", "session": 27}, {"term": "Sub-system", "definition": "A smaller system that exists within a larger system. For example, within the climate-health system of Toledo District, there are sub-systems related to water, air quality, and food production.", "module": "M07", "session": 27}, {"term": "Milpa", "definition": "A traditional Maya agricultural system in which forest or bush is cut and burned to clear land for planting crops (primarily corn, beans, and squash). The burning releases nutrients into the soil but also produces smoke that affects air quality. Milpa has been practised in the Toledo District and across Mesoamerica for thousands of years.", "module": "M07", "session": 27}, {"term": "Particulate matter", "definition": "Tiny particles of solid or liquid matter suspended in the air. Produced by burning (including milpa burning), vehicle exhaust, and industrial processes. When inhaled, particulate matter can penetrate deep into the lungs and cause respiratory problems.", "module": "M07", "session": 27}, {"term": "Leptospirosis", "definition": "A bacterial disease spread through contact with water contaminated by animal urine. Common after flooding events. Symptoms include high fever, headache, muscle pain, and in severe cases, organ damage. Sometimes called 'lepto' in Belize.", "module": "M07", "session": 27}, {"term": "Bioaccumulation", "definition": "The process by which pollutants (such as mercury, pesticides, or industrial chemicals) build up in the tissues of living organisms as they move up the food chain. Organisms at higher levels of the food chain accumulate greater concentrations of pollutants because they consume many organisms from lower levels, each of which contains its own accumulated pollutants.", "module": "M07", "session": 28}, {"term": "Food chain", "definition": "A sequence of organisms in which each organism feeds on the one below it. Energy and nutrients move up the food chain from producers (plants, plankton) to primary consumers (small herbivores) to secondary consumers (predators) to top predators. Pollutants also move up the food chain, becoming more concentrated at each level.", "module": "M07", "session": 28}, {"term": "Top predator", "definition": "An organism at the highest level of a food chain, with no natural predators of its own. In marine ecosystems, top predators include large fish such as barracuda, sharks, and tuna. Humans who eat fish also function as top predators. Because of bioaccumulation, top predators contain the highest concentrations of pollutants in the food chain.", "module": "M07", "session": 28}, {"term": "Environmental justice", "definition": "The principle that all people -- regardless of race, ethnicity, language, income, or geographic location -- deserve equal protection from environmental hazards and equal access to a healthy environment. Environmental injustice occurs when certain communities (often low-income, rural, or indigenous communities) bear a disproportionate burden of environmental pollution and its health consequences.", "module": "M07", "session": 28}, {"term": "Health co-benefit", "definition": "Positive health outcomes that result from actions taken to protect the environment. For example, reducing pesticide use on farms (an environmental action) also reduces chemical exposure for farm workers (a health benefit). Co-benefits occur when one action produces benefits in multiple domains simultaneously.", "module": "M07", "session": 28}, {"term": "Universal warning label", "definition": "A warning designed to communicate danger to anyone, regardless of language or literacy. Uses symbols, colours, and pictures rather than words.", "module": "M07", "session": 28}, {"term": "Mercury", "definition": "A toxic heavy metal that can enter water systems through mining, industrial processes, and atmospheric deposition. Mercury bioaccumulates in fish and shellfish, making it especially dangerous for communities that rely on seafood as a primary food source. Long-term mercury exposure can damage the nervous system, kidneys, and developing brains of children.", "module": "M07", "session": 28}, {"term": "Pesticide", "definition": "A chemical substance used to kill or control insects, weeds, fungi, or other organisms that damage crops. While pesticides can increase agricultural productivity, they can also contaminate water sources, harm non-target organisms, and pose health risks to farm workers and nearby communities. Common pesticides used in Belize include those applied to citrus and banana crops.", "module": "M07", "session": 28}, {"term": "Pollutant", "definition": "A substance introduced into the environment that has harmful or undesirable effects. Pollutants can be chemical (pesticides, mercury, industrial waste), biological (bacteria, viruses from sewage), or physical (heat, noise). Pollutants enter ecosystems through agricultural runoff, industrial discharge, improper waste disposal, and atmospheric deposition.", "module": "M07", "session": 28}, {"term": "Adaptation", "definition": "Adjustments in behaviour, systems, or infrastructure in response to environmental changes that are already occurring or expected. Adaptation reduces vulnerability and increases resilience. Example: building hurricane shelters, installing water filters, planting shade trees.", "module": "M07", "session": 29}, {"term": "Personal adaptation strategy", "definition": "An adaptation strategy that an individual or family can implement on their own -- such as boiling water, wearing protective equipment, creating an emergency kit, or staying hydrated during heat waves.", "module": "M07", "session": 29}, {"term": "Community-level adaptation strategy", "definition": "An adaptation strategy that requires collective, institutional, or governmental action -- such as building infrastructure, creating policies, or organising community programmes. Cannot be accomplished by a single individual or family.", "module": "M07", "session": 29}, {"term": "Resilience", "definition": "The capacity of individuals, communities, or systems to prepare for, respond to, and recover from environmental challenges, hazards, or shocks. Resilience is built on knowledge, skills, social connections, and material resources.", "module": "M07", "session": 29}, {"term": "Self-efficacy", "definition": "The belief in one's ability to succeed in specific situations or accomplish a task. In environmental health, self-efficacy refers to the confidence that one has the knowledge, skills, and connections to contribute to community health and environmental protection.", "module": "M07", "session": 29}, {"term": "Environmental health", "definition": "The branch of public health that studies how the environment -- air, water, soil, food, built surroundings -- affects human health and well-being. Introduced in Session 26.", "module": "M07", "session": 29}, {"term": "Climate-health pathway", "definition": "A chain of events linking a climate driver (such as rising temperatures or increased rainfall) through environmental and social changes to a specific health outcome. Introduced in Session 27.", "module": "M07", "session": 29}, {"term": "Bioaccumulation", "definition": "The process by which pollutants build up in the tissues of living organisms over time, often concentrating at higher levels of the food chain. Introduced in Session 28.", "module": "M07", "session": 29}, {"term": "Environmental justice", "definition": "The principle that all people, regardless of race, income, or location, have the right to a healthy environment. Environmental injustice occurs when some communities bear a disproportionate burden of pollution or environmental hazards. Introduced in Session 28.", "module": "M07", "session": 29}, {"term": "TIDE (Toledo Institute for Development and Environment)", "definition": "A community-based organisation in Toledo District, Belize, focused on conservation, sustainable development, and community empowerment. A key local resource for environmental health action.", "module": "M07", "session": 29}, {"term": "Exposure route", "definition": "The pathway by which an environmental hazard enters the human body. The four main routes are inhalation (breathing), ingestion (eating or drinking), dermal absorption (through the skin), and direct contact (e.g., eyes, wounds). Introduced in Session 26.", "module": "M07", "session": 29}, {"term": "Man Box", "definition": "The set of rigid rules that society puts on boys and men -- things like 'do not cry,' 'be tough,' 'do not show emotions,' 'be in control.' It is harmful because it stops boys from being fully human -- from feeling, asking for help, and building real connections.", "module": "Conclusion", "session": 30}, {"term": "FRIES", "definition": "The five elements of consent: Freely given, Reversible, Informed, Enthusiastic, Specific. Consent is not just about saying yes -- it is about all five of those elements being present.", "module": "Conclusion", "session": 30}, {"term": "R.A.I.N.", "definition": "A coping tool: Recognize what you are feeling. Allow it to be there without pushing it away. Investigate where you feel it in your body and what it needs. Nurture yourself with kindness.", "module": "Conclusion", "session": 30}, {"term": "Calming and Grounding", "definition": "Techniques -- like Box Breathing and 5-4-3-2-1 Grounding -- that calm your body and bring your mind back to the present. The foundation for every other skill: if you cannot calm your body, you cannot think clearly, you cannot communicate assertively, and you cannot make good decisions.", "module": "Booster", "session": 31}, {"term": "Assertive Refusal", "definition": "The ability to say no clearly and calmly when you are being pressured. Applies to peer pressure, substance offers, relationship pressure, and any situation where someone is pushing you to do something you do not want to do.", "module": "Booster", "session": 31}, {"term": "The Three Rs Test", "definition": "A simple way to decide whether a problem is serious enough to seek adult support: Is the problem affecting your Relationships, your Responsibilities, or your Recreation? If yes to any R -- talk to a trusted adult.", "module": "Booster", "session": 31}, {"term": "Trusted Adult Map", "definition": "A personal record of trusted people in three categories -- Personal, School, and Community -- who you can turn to for support. Should have at least one name in each circle.", "module": "Booster", "session": 31}, {"term": "Escalation (in refusal)", "definition": "When the person pressuring you pushes back after your first refusal. Requires using a different refusal strategy the second time -- staying calm, using a steady voice, making eye contact.", "module": "Booster", "session": 31}], "safe": {"ground_rules": ["Respect each other's words and silence.", "Listen when others speak; do not interrupt.", "You can always choose not to share -- no penalty for passing.", "What is shared here stays here, unless someone is in danger.", "Use kind language; no put-downs or judgments.", "Participate with an open mind.", "One person speaks at a time."], "is": ["A skills-based, active-learning program that uses games, role-plays, discussions, and creative tasks to build real-world competencies.", "A classroom-based curriculum delivered during regular school periods.", "A program led by trained facilitators who follow a structured session plan."], "is_not": ["It is not counselling, therapy, diagnosis, or mental health treatment.", "It is not a replacement for professional support. The program teaches skills and promotes well-being, but it does not provide clinical care."], "right_to_pass": "You always have the right to choose not to share. No one is ever forced to disclose personal information, and there is no penalty for passing.", "confidentiality": "What is shared in the room stays in the room -- unless someone is in danger. If someone is being hurt, is in danger, or might hurt themselves, a facilitator has a responsibility to get help. That is not breaking trust; that is keeping you safe.", "referral": "If you need to talk to someone one-on-one, you can reach the school counsellor at Toledo Community College.", "placeholder": "[TO BE COMPLETED BY THE THRIVE-BELIZE TEAM: verified school counsellor contact and national helpline numbers]"}, "diagrams": {"2": {"type": "feelings", "quadrants": [{"label": "Unpleasant + Activating", "ex": "angry, worried, frustrated, nervous, tense", "cls": "ua"}, {"label": "Pleasant + Activating", "ex": "excited, happy, joyful, energized, pr function esc(t){return String(t==null?'':t).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

function svg(name,cls){return '<svg class="'+(cls||'')+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+(P[name]||P.bulb)+'</svg>';}
function conceptIcon(h){h=(h||'').toLowerCase();
 if(/breath|box breathing|calm/.test(h))return 'wind';
 if(/listen|soler|hear/.test(h))return 'ear';
 if(/man box|the box/.test(h))return 'box';
 if(/brain|prefrontal|hippocampus|reward|mind/.test(h))return 'brain';
 if(/body|health|physical/.test(h))return 'pulse';
 if(/warning|danger|risk|pressure|red flag/.test(h))return 'warn';
 if(/relationship|respect|love|heart/.test(h))return 'heart';
 if(/refus|say no|stand|stop/.test(h))return 'hand';
 if(/environment|climate|food chain|pollution|leaf|nature/.test(h))return 'leaf';
 if(/right|i statement|assertive|speak/.test(h))return 'chat';
 if(/remember|key|goal|strength/.test(h))return 'star';
 return 'bulb';}

/* ---------- text chunking (layout only -- no wording change) ---------- */
function splitMarkers(t){
  var re=/(?=(?:Step \d+[:\-]|Level \d+ ?--|Strategy \d+[:\-]|Example \d+[:\-]|\([a-z]\) |\b\d+\. ))/g;
  var parts=t.split(re).map(function(x){return x.trim();}).filter(function(x){return x.length>2;});
  return parts.length>=2?parts:null;
}
function splitSentences(t){
  var marked=t.replace(/([.!?])\s+(?=[A-Z0-9'(])/g,'$1~|~');
  return marked.split('~|~').map(function(x){return x.trim();}).filter(function(x){return x.length>1;});
}
function chunk(t){
  t=String(t||'').trim();
  var m=splitMarkers(t);
  if(m)return '<ul>'+m.map(function(x){return '<li>'+esc(x)+'</li>';}).join('')+'</ul>';
  var s=splitSentences(t);
  if(s.length>=4)return '<ul>'+s.map(function(x){return '<li>'+esc(x)+'</li>';}).join('')+'</ul>';
  return s.map(function(x){return '<p>'+esc(x)+'</p>';}).join('');
}
function listUL(items){if(!items||!items.length)return '';return '<ul>'+items.map(function(t){return '<li>'+esc(t)+'</li>';}).join('')+'</ul>';}

/* ---------- passport (localStorage) ---------- */
var PKEY='thrive_passport_v1';
function loadP(){try{return JSON.parse(localStorage.getItem(PKEY))||{};}catch(e){return{};}}
function saveP(p){try{localStorage.setItem(PKEY,JSON.stringify(p));}catch(e){}}
function reviewedCount(){var p=loadP();return DATA.sessions.filter(function(s){return p.reviewed&&p.reviewed[s.id];}).length;}
function nextUnreviewed(){var p=loadP();for(var i=0;i<DATA.sessions.length;i++){var id=DATA.sessions[i].id;if(!(p.reviewed&&p.reviewed[id]))return id;}return 1;}

/* ---------- progress ring ---------- */
function ring(pct,size){size=size||86;var r=(size/2)-7,c=2*Math.PI*r,off=c*(1-pct/100);
 return '<svg class="ring" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" role="img" aria-label="'+pct+' percent reviewed">'+
  '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="7"/>'+
  '<circle cx="'+size/2+'" cy="'+size/2+'" r="'+r+'" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" transform="rotate(-90 '+size/2+' '+size/2+')"/>'+
  '<text x="50%" y="50%" text-anchor="middle" dy=".35em" fill="#fff" font-size="'+(size*0.26)+'" font-weight="800">'+pct+'%</text></svg>';
}

var main=document.getElementById('main');
var breathTimer=null;
function clearTimers(){if(breathTimer){clearInterval(breathTimer);breathTimer=null;}}
function setActive(tab){document.querySelectorAll('nav.bottom a').forEach(function(a){if(a.getAttribute('data-tab')===tab)a.setAttribute('aria-current','page');else a.removeAttribute('aria-current');});}
function done(){try{main.focus({preventScroll:true});}catch(e){main.focus();}window.scrollTo(0,0);}

/* ---------- HOME ---------- */
function viewHome(){
  setActive('home');
  var total=DATA.sessions.length,dn=reviewedCount(),pct=Math.round(dn/total*100);
  var p=loadP();
  var tiles=DATA.modules.map(function(m){
    var sn=m.ids.length,d=m.ids.filter(function(id){return p.reviewed&&p.reviewed[id];}).length;
    return '<a class="tile" href="#/module/'+encodeURIComponent(m.key)+'">'+
      '<span class="ico" style="background:linear-gradient(135deg,'+m.c1+','+m.c2+')">'+svg(m.icon)+'</span>'+
      '<div class="k">'+esc(m.key)+'</div><div class="t">'+esc(m.label)+'</div>'+
      '<div class="meta">'+sn+' session'+(sn>1?'s':'')+' &middot; '+d+'/'+sn+' reviewed</div>'+
      '<div class="bar"><i style="width:'+Math.round(d/sn*100)+'%;background:linear-gradient(90deg,'+m.c1+','+m.c2+')"></i></div></a>';
  }).join('');
  var nx=nextUnreviewed();
  main.innerHTML=
    '<section class="hero"><span class="blob b1"></span><span class="blob b2"></span>'+
      '<div class="hero-row"><div class="txt">'+
        '<h1>Hi'+(p.name?', '+esc(p.name):'')+'!</h1>'+
        '<p>Welcome to your life-skills companion. Review what you learned, look up words, and track your journey.</p>'+
        '<a class="btn-light" href="#/session/'+nx+'">'+svg('arrow')+(dn?'Keep going: Session '+nx:'Start: Session '+nx)+'</a>'+
      '</div>'+ring(pct,92)+'</div>'+
    '</section>'+
    '<h2><span class="ic">'+svg('book')+'</span>Explore the modules</h2>'+
    '<div class="tiles">'+tiles+'</div>'+
    '<div class="panel accent" style="margin-top:16px">'+svg('heart')+' <strong>Remember:</strong> this is a skills program, not counselling or therapy. Tap <strong>Get Help</strong> at the top any time.</div>';
  clearTimers();done();
}

/* ---------- MODULE ---------- */
function viewModule(key){
  setActive('home');var m=MOD[key];if(!m)return viewHome();var p=loadP();
  var cards=m.ids.map(function(id){var s=SESS[id];if(!s)return '';var rv=p.reviewed&&p.reviewed[id];
    return '<a class="scard" href="#/session/'+id+'">'+
      '<span class="num" style="background:linear-gradient(135deg,'+m.c1+','+m.c2+')">'+id+'</span>'+
      '<span><span class="t">'+esc(s.title)+'</span>'+(s.learning&&s.learning[0]?'<span class="s">'+esc(s.learning[0])+'</span>':'')+'</span>'+
      (rv?'<span class="chk" title="Reviewed">'+svg('chk')+'</span>':'')+'</a>';}).join('');
  main.innerHTML=
    '<a class="crumb" href="#/home">'+svg('back')+'Home</a>'+

/* ---------- diagrams ---------- */
function diagramHTML(id){
  var d=DATA.diagrams[String(id)];if(!d)return '';
  if(d.type==='feelings'){
    var byc={};d.quadrants.forEach(function(q){byc[q.cls]=q;});
    function cell(c){var q=byc[c];return '<div class="q '+c+'"><div class="ql">'+esc(q.label)+'</div><div class="qx">'+esc(q.ex)+'</div></div>';}
    return '<div class="diagram"><div class="dt">'+svg('target')+'The Feelings Map</div>'+
      '<div class="axisY">More energy (Activating)</div>'+
      '<div class="feel">'+cell('ua')+cell('pa')+cell('ud')+cell('pd')+'</div>'+
      '<div class="axis"><span>Unpleasant</span><span>Pleasant</span></div>'+
      '<div class="axisY">Less energy (Deactivating)</div>'+
      '<p class="muted" style="font-size:.84rem">Two questions place any feeling on the map: does it feel pleasant or unpleasant, and does it give or take energy?</p></div>';
  }
  if(d.type==='breathing'){
    return '<div class="diagram"><div class="dt">'+svg('wind')+'Box Breathing (4-4-4-4)</div>'+
      '<div class="breath" id="breath"><div class="box"><div class="ball s0" id="bball"></div></div>'+
      '<div class="phase" id="bphase">Tap start to breathe</div><div class="sub" id="bsub">Each step lasts 4 counts</div>'+
      '<button class="btn ghost" id="bbtn" aria-pressed="false">'+svg('wind')+'Start</button></div></div>';
  }
  if(d.type==='istatement'){
    var s=d.parts;
    return '<div class="diagram"><div class="dt">'+svg('chat')+'The "I" Statement Formula</div><div class="istate">'+
      '<div class="seg s1"><span class="lab" style="background:#0d9488">'+esc(s[0])+'</span><div class="blank">my feeling</div></div>'+
      '<div class="seg s2"><span class="lab" style="background:#4f46e5">'+esc(s[1])+'</span><div class="blank">what happened</div></div>'+
      '<div class="seg s3"><span class="lab" style="background:#db2777">'+esc(s[2])+'</span><div class="blank">why it matters</div></div>'+
      '</div><p class="muted" style="font-size:.84rem">Honest AND respectful: say how you feel without blaming.</p></div>';
  }
  if(d.type==='manbox'){
    return '<div class="diagram"><div class="dt">'+svg('box')+'Inside the Man Box</div><div class="mbox"><div class="lid">Messages society puts on boys</div>'+
      '<div class="tags">'+d.messages.map(function(t){return '<span class="tag">'+esc(t)+'</span>';}).join('')+'</div></div>'+
      '<p class="muted" style="font-size:.84rem">These are taught -- not rules of nature. Real strength is being true to yourself.</p></div>';
  }
  if(d.type==='pathway'){
    var nodes=d.steps.map(function(st,i){var h='<div class="node"><div class="n">Step '+(i+1)+': '+esc(st.n)+'</div><div class="d">'+esc(st.d)+'</div></div>';
      return h+(i<d.steps.length-1?'<div class="arr">'+svg('down')+'</div>':'');}).join('');
    return '<div class="diagram"><div class="dt">'+svg('leaf')+'The Climate-Health Pathway</div><div class="flow">'+nodes+'</div>'+
      '<p class="muted" style="font-size:.84rem">Climate change harms health through a chain -- and every link is a place we can break it.</p></div>';
  }
  if(d.type==='foodchain'){
    var sh=['#dff3e8','#bfe7d6','#9ed9c0','#f6c9bd'];
    var rows=d.levels.map(function(lv,i){return '<div class="lvl" style="background:'+sh[i]+'"><span class="n">'+esc(lv.n)+'</span> <span class="d">'+esc(lv.d)+'</span><span class="conc">pollution builds up '+(i===0?'(lowest)':i===3?'(highest)':'')+'</span></div>';}).join('');
    return '<div class="diagram"><div class="dt">'+svg('warn')+'Bioaccumulation in the Food Chain</div><div class="chain">'+rows+'</div>'+
      '<p class="muted" style="font-size:.84rem">Pollution concentrates as it moves up the chain -- most ends up in the top predators, including people who eat fish.</p></div>';
  }
  return '';
}
function wireDiagram(id){
  var d=DATA.diagrams[String(id)];if(!d||d.type!=='breathing')return;
  var box=document.getElementById('breath'),ball=document.getElementById('bball'),ph=document.getElementById('bphase'),sub=document.getElementById('bsub'),btn=document.getElementById('bbtn');
  if(!box)return;var steps=d.steps,i=0,running=false;
  function show(){ball.className='ball s'+i;ph.textContent=steps[i].k;sub.textContent=steps[i].s;}
  btn.addEventListener('click',function(){
    running=!running;btn.setAttribute('aria-pressed',running?'true':'false');
    if(running){box.classList.add('run');btn.innerHTML=''+'Pause';i=0;show();
      breathTimer=setInterval(function(){i=(i+1)%4;show();},3700);}
    else{clearTimers();box.classList.remove('run');btn.innerHTML='Start';ph.textContent='Paused';sub.textContent='Tap start to continue';}
  });
}

  var objs=(s.learning||[]).map(function(t){return '<span class="chip">'+svg('chk')+esc(t)+'</span>';}).join('');

    return '<button class="vcard" aria-expanded="false" data-flip>'+

  }).join('');
  var refl=(s.reflection||[]).map(function(q){return '<div class="reflect"><div class="q">'+svg('q')+'<span>'+esc(q)+'</span></div></div>';}).join('');
  var prac=(s.practiceAtHome||[]);
  var html=
    '<a class="crumb" href="#/module/'+encodeURIComponent(m.key)+'">'+svg('back')+esc(m.label||'Back')+'</a>'+
    '<section class="shero" style="background:linear-gradient(135deg,'+m.c1+','+m.c2+')">'+
      '<span class="pill">SESSION '+id+'</span>'+(m.label?'<div class="modname">'+esc(m.label)+'</div>':'')+
      '<h1>'+esc(s.title)+'</h1>'+(objs?'<div class="chips">'+objs+'</div>':'')+'</section>';
  var dia=diagramHTML(id);
  if(concepts){html+='<h2><span class="ic" style="background:'+m.c2+'">'+svg('bulb')+'</span>Key ideas</h2>'+dia+concepts;}
  else if(dia){html+=dia;}
  if((s.remember||[]).length){html+='<div class="remember"><div class="rh">'+svg('star')+'Key things to remember</div>'+listUL(s.remember)+'</div>';}
  if(vocab){html+='<h2><span class="ic" style="background:'+m.c2+'">'+svg('book')+'</span>Key words <span class="muted" style="font-weight:500;font-size:.8rem">(tap to show meaning)</span></h2><div class="vgrid">'+vocab+'</div>';}
  if(refl){html+='<h2><span class="ic" style="background:'+m.c2+'">'+svg('q')+'</span>Think about it</h2>'+refl;}
  if(prac.length){html+='<div class="practice"><div class="ph">'+svg('hand')+'Try it at home</div>'+listUL(prac)+'</div>';}
  html+='<div class="review"><input type="checkbox" id="rev" '+(rv?'checked':'')+'><label for="rev">Mark this session as reviewed <span class="muted">(saved only on this device)</span></label></div>'+
    '<div class="pn">'+(SESS[id-1]?'<a class="btn ghost" href="#/session/'+(id-1)+'">'+svg('back')+'Session '+(id-1)+'</a>':'')+
      (SESS[id+1]?'<a class="btn" href="#/session/'+(id+1)+'">Session '+(id+1)+' '+svg('arrow')+'</a>':'')+'</div>';
  main.innerHTML=html;
  clearTimers();wireDiagram(id);
  var cb=document.getElementById('rev');
  cb.addEventListener('change',function(){var pp=loadP();pp.reviewed=pp.reviewed||{};if(cb.checked)pp.reviewed[id]=true;else delete pp.reviewed[id];saveP(pp);});
  done();
}

/* flip-card delegation */
document.addEventListener('click',function(e){var b=e.target.closest&&e.target.closest('[data-flip]');if(b){var ex=b.getAttribute('aria-expanded')==='true';b.setAttribute('aria-expanded',ex?'false':'true');}});

/* ---------- GLOSSARY ---------- */
function viewGlossary(){
  setActive('glossary');
  var opts=DATA.modules.filter(function(m){return m.key.charAt(0)==='M';}).map(function(m){return '<option value="'+m.key+'">'+esc(m.key+' -- '+m.label)+'</option>';}).join('');
  main.innerHTML='<h1>Glossary</h1><p class="lede">Key words from across the program. Search or filter, then tap a word to jump to its session.</p>'+
    '<div class="field"><label for="gq">Search words</label><input class="search" id="gq" type="text" placeholder="Type a word..."></div>'+
    '<div class="field"><label for="gm">Module</label><select id="gm"><option value="">All modules</option>'+opts+'</select></div>'+
    '<div id="gres" style="margin-top:12px"></div>';
  function render(){var q=(document.getElementById('gq').value||'').toLowerCase(),fm=document.getElementById('gm').value;
    var items=DATA.glossary.filter(function(g){if(fm&&g.module!==fm)return false;if(q&&(g.term+' '+g.definition).toLowerCase().indexOf(q)<0)return false;return true;});
    var seen={},u=[];items.forEach(function(g){var k=(g.term+'|'+g.definition).toLowerCase();if(!seen[k]){seen[k]=1;u.push(g);}});
    u.sort(function(a,b){return a.term.toLowerCase()<b.term.toLowerCase()?-1:1;});
    var box=document.getElementById('gres');
    box.innerHTML=u.length?u.map(function(g){var m=MOD[g.module]||{c2:'#0f766e'};
      return '<div class="concept"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><h3 style="margin:0">'+esc(g.term)+'</h3>'+
        '<a href="#/session/'+g.session+'" style="font-size:.74rem;font-weight:800;color:#fff;background:'+m.c2+';border-radius:999px;padding:3px 10px;text-decoration:none">'+esc(g.module)+' &middot; S'+g.session+'</a></div><p style="margin:.3em 0 0">'+esc(g.definition)+'</p></div>';}).join(''):'<p class="empty">No words match your search.</p>';}
  document.getElementById('gq').addEventListener('input',render);document.getElementById('gm').addEventListener('change',render);
  render();clearTimers();done();
}

/* ---------- SEARCH ---------- */
function viewSearch(){
  setActive('search');
  main.innerHTML='<h1>Search</h1><p class="lede">Find sessions, key ideas, and words across the whole program.</p>'+
    '<div class="field"><label for="sq">Search</label><input class="search" id="sq" type="text" placeholder="Type at least 2 letters..." autocomplete="off"></div><div id="sres" style="margin-top:12px"></div>';
  function render(){var q=(document.getElementById('sq').value||'').trim().toLowerCase(),box=document.getElementById('sres');
    if(q.length<2){box.innerHTML='<p class="empty">Type at least 2 letters to search.</p>';return;}var out=[];
    DATA.sessions.forEach(function(s){var hay=[s.title].concat(s.learning||[],s.remember||[],s.reflection||[],s.practiceAtHome||[]);
      (s.keyConcepts||[]).forEach(function(c){hay.push(c.heading,c.body);});(s.vocabulary||[]).forEach(function(v){hay.push(v.term,v.definition);});
      var snip=null;for(var i=0;i<hay.length;i++){if(hay[i]&&hay[i].toLowerCase().indexOf(q)>=0){snip=hay[i];break;}}
      if(s.title.toLowerCase().indexOf(q)>=0||snip){var m=modOf(s.id)||{c1:'#0f766e',c2:'#0d9488'};
        out.push('<a class="scard" href="#/session/'+s.id+'"><span class="num" style="background:linear-gradient(135deg,'+m.c1+','+m.c2+')">'+s.id+'</span>'+
          '<span><span class="t">'+esc(s.title)+'</span>'+(snip?'<span class="s">'+esc(snip.length>120?snip.slice(0,120)+'...':snip)+'</span>':'')+'</span></a>');}});
    DATA.glossary.forEach(function(g){if((g.term+' '+g.definition).toLowerCase().indexOf(q)>=0){
      out.push('<a class="scard" href="#/session/'+g.session+'"><span class="num" style="background:linear-gradient(135deg,#0f766e,#0d9488)">'+svg('book')+'</span>'+
        '<span><span class="t">'+esc(g.term)+'</span><span class="s">'+esc(g.definition.length>120?g.definition.slice(0,120)+'...':g.definition)+'</span></span></a>');}});
    box.innerHTML=out.length?'<div class="scards">'+out.join('')+'</div>':'<p class="empty">Nothing found for "'+esc(q)+'".</p>';}
  document.getElementById('sq').addEventListener('input',render);render();clearTimers();done();
}

/* ---------- PASSPORT ---------- */
function viewPassport(){
  setActive('passport');var p=loadP();p.reviewed=p.reviewed||{};p.takeaways=p.takeaways||{};
  var total=DATA.sessions.length,dn=reviewedCount(),pct=Math.round(dn/total*100);
  var rows=DATA.modules.filter(function(m){return m.key.charAt(0)==='M';}).map(function(m){
    return '<div class="field"><label for="t_'+m.key+'">'+esc(m.key+' -- '+m.label)+': one thing I learned</label><textarea id="t_'+m.key+'" data-mod="'+m.key+'">'+esc(p.takeaways[m.key]||'')+'</textarea></div>';}).join('');
  main.innerHTML='<section class="shero" style="background:linear-gradient(135deg,#0ea5e9,#0284c7)"><div class="hero-row"><div class="txt"><h1>My Passport</h1><p class="modname">'+dn+' of '+total+' sessions reviewed</p></div>'+ring(pct,80)+'</div></section>'+
    '<div class="note">This is your private record. Everything here is saved <strong>only on this device</strong>, in this browser. It is never uploaded or shared. You do not have to use your real name, and you can clear it anytime.</div>'+
    '<div class="field"><label for="pname">My name (optional)</label><input type="text" id="pname" value="'+esc(p.name||'')+'" autocomplete="off"></div>'+
    '<div class="field"><label for="pgoal">My goal for this program</label><textarea id="pgoal">'+esc(p.goal||'')+'</textarea></div>'+
    '<h2><span class="ic" style="background:#0284c7">'+svg('star')+'</span>One thing I learned in each module</h2>'+rows+
    '<div class="pn" style="margin-top:16px"><button class="btn" id="psave">'+svg('chk')+'Save</button><button class="btn danger" id="pclear">Clear my data</button><span class="saved" id="psaved" role="status" aria-live="polite">Saved!</span></div>';
  document.getElementById('psave').addEventListener('click',function(){var pp=loadP();pp.reviewed=pp.reviewed||{};pp.takeaways=pp.takeaways||{};
    pp.name=document.getElementById('pname').value;pp.goal=document.getElementById('pgoal').value;
    document.querySelectorAll('textarea[data-mod]').forEach(function(t){pp.takeaways[t.getAttribute('data-mod')]=t.value;});saveP(pp);
    var b=document.getElementById('psaved');b.style.display='inline-block';setTimeout(function(){b.style.display='none';},1600);});
  document.getElementById('pclear').addEventListener('click',function(){if(window.confirm('Clear all of your Passport data on this device? This cannot be undone.')){try{localStorage.removeItem(PKEY);}catch(e){}viewPassport();}});
  clearTimers();done();
}

/* ---------- ABOUT + HELP ---------- */
function viewAbout(){setActive('about');var S=DATA.safe;
  main.innerHTML='<h1>Ground Rules</h1>'+
    '<div class="panel accent"><h3>Our ground rules</h3>'+listUL(S.ground_rules)+'</div>'+
    '<h2><span class="ic">'+svg('chk')+'</span>What THRIVE-Belize IS</h2><div class="panel">'+listUL(S.is)+'</div>'+
    '<h2><span class="ic" style="background:#b45309">'+svg('warn')+'</span>What it is NOT</h2><div class="panel">'+listUL(S.is_not)+'<p>This app is a review companion -- it is a skills program, not counselling or therapy.</p></div>'+
    '<a class="btn" href="#/help">'+svg('heart')+'Get Help</a>';
  clearTimers();done();}
function viewHelp(){setActive('');var S=DATA.safe;
  main.innerHTML='<section class="shero" style="background:linear-gradient(135deg,#ef6c57,#e1452d)"><span class="pill">YOU ARE NOT ALONE</span><h1>Get Help</h1></section>'+
    '<div class="panel accent"><h3>You always have the right to pass</h3><p>'+esc(S.right_to_pass)+'</p></div>'+
    '<div class="panel"><h3>Confidentiality -- with limits</h3><p>'+esc(S.confidentiality)+'</p></div>'+
    '<div class="panel"><h3>If you want to talk to someone</h3><p>'+esc(S.referral)+'</p><div class="note">'+esc(S.placeholder)+'</div></div>'+
    '<p class="lede">If you or someone else is in danger, tell a trusted adult or the school counsellor right away.</p>';
  clearTimers();done();}

/* ---------- router ---------- */
function router(){var h=location.hash||'#/home',pp=h.replace(/^#\//,'').split('/'),r=pp[0]||'home';
  if(r==='module')return viewModule(decodeURIComponent(pp[1]||''));
  if(r==='session')return viewSession(parseInt(pp[1],10));
  if(r==='glossary')return viewGlossary();
  if(r==='search')return viewSearch();
  if(r==='passport')return viewPassport();
  if(r==='about')return viewAbout();
  if(r==='help')return viewHelp();
  return viewHome();}
document.getElementById('helpBtn').addEventListener('click',function(){location.hash='#/help';});
window.addEventListener('hashchange',router);
router();
</script>
