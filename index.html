<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f766e">
<title>My THRIVE-Belize</title>
<style>
  :root{
    --bg:#eef2f1; --bg2:#e3eae8; --surface:#ffffff; --ink:#16302c; --muted:#5a6b66;
    --line:#e2e8e6; --brand:#0f766e; --brand2:#0d9488; --focus:#0b4f49;
    --good:#16a34a; --warn:#b45309; --radius:20px; --shadow:0 6px 22px rgba(20,48,44,.08);
    --shadow-h:0 14px 34px rgba(20,48,44,.16);
    --m1:#14b8a6; --m2:#3b82f6; --m3:#8b5cf6; --m4:#ec4899; --m5:#06b6d4; --m6:#f97316; --m7:#16a34a;
  }
  *{box-sizing:border-box}
  #main{scroll-margin-top:72px}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;color:var(--ink);
    background:
      radial-gradient(1200px 480px at 80% -10%, #d7efe9 0, rgba(215,239,233,0) 60%),
      radial-gradient(900px 420px at -10% 5%, #e7e0fb 0, rgba(231,224,251,0) 55%),
      var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Helvetica,Arial,sans-serif;
    font-size:17px;line-height:1.55;-webkit-font-smoothing:antialiased;
    padding-bottom:78px;
  }
  a{color:var(--brand)}
  .wrap{max-width:880px;margin:0 auto;padding:18px 16px 40px}
  .skip{position:absolute;left:-999px}
  .skip:focus{left:12px;top:12px;background:#fff;padding:10px 14px;border-radius:10px;z-index:80;border:2px solid var(--focus)}

  /* top bar */
  header.app{position:sticky;top:0;z-index:40;backdrop-filter:saturate(1.4) blur(8px);
    background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.78));
    border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:9px 14px}
  header.app .logo{width:34px;height:34px;border-radius:11px;display:grid;place-items:center;color:#fff;
    background:linear-gradient(135deg,var(--brand),#22a79b);flex:0 0 auto}
  header.app .brand{font-weight:800;letter-spacing:.2px;flex:1;min-width:0;font-size:1.04rem}
  header.app .brand small{display:block;font-weight:500;color:var(--muted);font-size:.7rem;letter-spacing:.3px}
  .help-btn{display:inline-flex;align-items:center;gap:7px;background:#fff;color:#9a3324;border:2px solid #f3c8bd;
    border-radius:999px;font-weight:800;padding:8px 13px;min-height:42px;cursor:pointer;font-size:.9rem}
  .help-btn:hover{background:#fff5f2}
  .help-btn svg{width:18px;height:18px}
  :focus-visible{outline:3px solid var(--focus);outline-offset:2px;border-radius:8px}

  /* bottom nav */
  nav.bottom{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;justify-content:space-around;
    background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border-top:1px solid var(--line);
    padding:6px max(8px,env(safe-area-inset-left)) calc(6px + env(safe-area-inset-bottom))}
  nav.bottom a{flex:1;text-decoration:none;color:var(--muted);font-size:.66rem;font-weight:700;
    display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border-radius:14px;min-height:54px;justify-content:center}
  nav.bottom a svg{width:22px;height:22px}
  nav.bottom a[aria-current="page"]{color:var(--brand)}
  nav.bottom a[aria-current="page"] .dot{opacity:1}
  nav.bottom .dot{width:5px;height:5px;border-radius:50%;background:var(--brand);opacity:0}

  h1{font-size:1.62rem;line-height:1.2;margin:.1em 0 .35em;letter-spacing:-.01em}
  h2{font-size:1.16rem;margin:1.6em 0 .6em;display:flex;align-items:center;gap:9px}
  h2 .ic{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;color:#fff;background:var(--brand);flex:0 0 auto}
  h2 .ic svg{width:16px;height:16px}
  h3{font-size:1.04rem;margin:0 0 .3em}
  p{margin:.5em 0}
  .lede{color:var(--muted);font-size:1.04rem}
  .muted{color:var(--muted)}

  /* hero */
  .hero{position:relative;overflow:hidden;border-radius:26px;color:#fff;padding:22px 20px;margin-top:6px;
    background:linear-gradient(135deg,var(--brand),#19a08f 55%,#34b3a3);box-shadow:var(--shadow)}
  .hero h1{color:#fff;margin:0 0 6px}
  .hero p{color:rgba(255,255,255,.92);margin:.2em 0}
  .hero .blob{position:absolute;border-radius:50%;filter:blur(2px);opacity:.22;background:#fff}
  .hero .b1{width:160px;height:160px;right:-30px;top:-50px}
  .hero .b2{width:90px;height:90px;right:70px;bottom:-40px;opacity:.16}
  .hero-row{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .hero-row .txt{flex:1;min-width:200px}
  .ring{flex:0 0 auto}
  .btn-light{display:inline-flex;align-items:center;gap:8px;margin-top:12px;background:#fff;color:var(--brand);
    border:0;border-radius:999px;font-weight:800;padding:11px 18px;min-height:46px;text-decoration:none;cursor:pointer}
  .btn-light svg{width:18px;height:18px}

  /* module tiles */
  .tiles{display:grid;grid-template-columns:1fr;gap:13px;margin-top:14px}
  @media(min-width:600px){.tiles{grid-template-columns:1fr 1fr}}
  .tile{display:block;text-decoration:none;color:inherit;background:var(--surface);border:1px solid var(--line);
    border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .tile .ico{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;color:#fff;margin-bottom:10px}
  .tile .ico svg{width:24px;height:24px}
  .tile .k{font-size:.72rem;font-weight:800;letter-spacing:.06em;color:var(--muted)}
  .tile .t{font-weight:800;font-size:1.04rem;margin:.1em 0 .2em;line-height:1.25}
  .tile .meta{font-size:.82rem;color:var(--muted);margin-top:6px}
  .bar{height:8px;border-radius:999px;background:var(--bg2);overflow:hidden;margin-top:9px}
  .bar > i{display:block;height:100%;border-radius:999px}

  /* session cards (list) */
  .scards{display:grid;grid-template-columns:1fr;gap:11px;margin-top:8px}
  .scard{display:flex;gap:13px;align-items:center;text-decoration:none;color:inherit;background:var(--surface);
    border:1px solid var(--line);border-radius:16px;padding:13px 14px;box-shadow:var(--shadow)}
  .scard .num{width:42px;height:42px;border-radius:13px;flex:0 0 auto;display:grid;place-items:center;color:#fff;font-weight:800}
  .scard .t{font-weight:700;line-height:1.25}
  .scard .s{font-size:.8rem;color:var(--muted);margin-top:2px}
  .scard .chk{margin-left:auto;flex:0 0 auto;color:var(--good)}
  .scard .chk svg{width:22px;height:22px}

  /* session page */
  .shero{border-radius:24px;color:#fff;padding:20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .shero .pill{display:inline-block;background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.35);
    padding:4px 12px;border-radius:999px;font-weight:800;font-size:.76rem;letter-spacing:.04em}
  .shero h1{color:#fff;margin:.35em 0 .1em}
  .shero .modname{color:rgba(255,255,255,.9);font-size:.86rem;font-weight:600}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .chip{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);
    color:#fff;padding:7px 12px;border-radius:999px;font-size:.82rem;font-weight:600}
  .chip svg{width:15px;height:15px;flex:0 0 auto}

  .crumb{display:inline-flex;align-items:center;gap:6px;color:var(--brand);text-decoration:none;font-weight:700;
    margin-bottom:10px;min-height:40px}
  .crumb svg{width:18px;height:18px}

  /* concept cards */
  .concept{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:15px 16px;margin:11px 0;box-shadow:var(--shadow)}
  .concept .ch{display:flex;gap:11px;align-items:flex-start}
  .concept .cic{width:38px;height:38px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;color:#fff}
  .concept .cic svg{width:20px;height:20px}
  .concept h3{margin:.18em 0 .1em}
  .concept ul{margin:.5em 0 0;padding-left:1.15em}
  .concept ul li{margin:.34em 0}
  .concept p{margin:.4em 0}

  /* numbered process cards */
  .steps{display:grid;gap:10px;margin:10px 0}
  .step{display:flex;gap:13px;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:13px 15px;box-shadow:var(--shadow)}
  .step .n{width:34px;height:34px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;color:#fff;font-weight:800}

  /* remember strip */
  .remember{background:linear-gradient(135deg,#fff8e7,#fef3d6);border:1px solid #f6e3ab;border-radius:18px;padding:14px 16px;margin:10px 0}
  .remember .rh{display:flex;align-items:center;gap:9px;font-weight:800;color:#92600a;margin-bottom:6px}
  .remember .rh svg{width:20px;height:20px}
  .remember ul{margin:.2em 0;padding-left:0;list-style:none}
  .remember li{display:flex;gap:9px;align-items:flex-start;margin:.5em 0}
  .remember li::before{content:"";flex:0 0 auto;width:9px;height:9px;border-radius:50%;background:#f59e0b;margin-top:.5em}

  /* vocabulary reveal cards (accessible, no 3D) */
  .vgrid{display:grid;grid-template-columns:1fr;gap:11px;margin:8px 0;align-items:start}
  @media(min-width:560px){.vgrid{grid-template-columns:1fr 1fr}}
  .vcard{display:block;width:100%;text-align:left;border:0;padding:0;background:none;font:inherit;color:inherit;cursor:pointer;border-radius:16px;box-shadow:var(--shadow)}
  .vcard .top{border-radius:16px;padding:14px;color:#fff;display:flex;flex-direction:column;gap:6px}
  .vcard[aria-expanded="true"] .top{border-radius:16px 16px 0 0}
  .vcard .term{font-weight:800;font-size:1.05rem}
  .vcard .hint{font-size:.74rem;opacity:.92;display:flex;align-items:center;gap:6px}
  .vcard .hint svg{width:14px;height:14px;flex:0 0 auto}
  .vcard .lbl-hide{display:none}
  .vcard[aria-expanded="true"] .lbl-show{display:none}
  .vcard[aria-expanded="true"] .lbl-hide{display:inline}
  .vcard .def{display:none;background:var(--surface);border:1px solid var(--line);border-top:0;border-radius:0 0 16px 16px;padding:13px 14px;font-size:.93rem;line-height:1.5}
  .vcard[aria-expanded="true"] .def{display:block}

  /* reflection + practice */
  .reflect{background:var(--surface);border:1px solid var(--line);border-left:5px solid var(--m3);border-radius:14px;padding:12px 15px;margin:9px 0;box-shadow:var(--shadow)}
  .reflect .q{display:flex;gap:10px;align-items:flex-start}
  .reflect .q svg{width:20px;height:20px;color:var(--m3);flex:0 0 auto;margin-top:2px}
  .practice{background:linear-gradient(135deg,#eafaf3,#dff4ec);border:1px solid #bfe7d6;border-radius:18px;padding:15px 16px;margin:10px 0}
  .practice .ph{display:flex;align-items:center;gap:9px;font-weight:800;color:#0b6b4f;margin-bottom:4px}
  .practice .ph svg{width:20px;height:20px}

  /* reviewed toggle + prev/next */
  .review{display:flex;gap:12px;align-items:center;background:var(--surface);border:2px dashed var(--line);border-radius:16px;padding:14px;margin:16px 0}
  .review input{width:26px;height:26px;flex:0 0 auto;accent-color:var(--good)}
  .review label{font-weight:600;margin:0}
  .pn{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
  .btn{display:inline-flex;align-items:center;gap:8px;min-height:46px;padding:11px 16px;border-radius:14px;border:2px solid var(--brand);
    background:var(--brand);color:#fff;font-weight:800;cursor:pointer;font-size:.95rem;text-decoration:none}
  .btn.ghost{background:#fff;color:var(--brand)}
  .btn.danger{background:#fff;color:#9a3324;border-color:#e7bcb2}
  .btn svg{width:18px;height:18px}

  /* diagrams */
  .diagram{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;margin:11px 0;box-shadow:var(--shadow)}
  .diagram .dt{font-weight:800;display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .diagram .dt svg{width:18px;height:18px;color:var(--brand)}
  .feel{display:grid;grid-template-columns:1fr 1fr;gap:8px;position:relative}
  .feel .q{border-radius:14px;padding:12px;color:#15302c;min-height:96px}
  .feel .q .ql{font-weight:800;font-size:.82rem}
  .feel .q .qx{font-size:.84rem;margin-top:6px;opacity:.92}
  .feel .ua{background:#fde4e1} .feel .pa{background:#fdeecb} .feel .ud{background:#dbe7f3} .feel .pd{background:#d9f1e6}
  .axis{display:flex;justify-content:space-between;font-size:.72rem;font-weight:800;color:var(--muted);margin:6px 2px}
  .axisY{text-align:center;font-size:.72rem;font-weight:800;color:var(--muted);margin:4px}

  .breath{display:flex;flex-direction:column;align-items:center;gap:12px}
  .breath .box{width:170px;height:170px;border-radius:24px;border:3px solid var(--m1);display:grid;place-items:center;position:relative;background:#effdfb}
  .breath .ball{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#14b8a6,#0d9488);transition:transform 3.6s ease-in-out}
  .breath .phase{font-weight:800;color:#0d7c72;font-size:1.05rem}
  .breath .sub{color:var(--muted);font-size:.86rem;margin-top:-6px}
  .breath.run .ball.s0{transform:scale(1.5)} .breath.run .ball.s1{transform:scale(1.5)}
  .breath.run .ball.s2{transform:scale(1)} .breath.run .ball.s3{transform:scale(1)}

  .istate{display:flex;gap:8px;flex-wrap:wrap;align-items:stretch}
  .istate .seg{flex:1;min-width:120px;border-radius:14px;padding:12px;text-align:center}
  .istate .lab{font-weight:800;color:#fff;border-radius:999px;padding:3px 12px;display:inline-block;font-size:.82rem}
  .istate .blank{margin-top:9px;border-bottom:3px dashed #bcdcd6;min-height:26px;color:var(--muted);font-size:.82rem}
  .istate .s1{background:#e8f7f4} .istate .s2{background:#eef2ff} .istate .s3{background:#fdeef6}

  .mbox{border:3px solid var(--m2);border-radius:18px;padding:14px;background:#eff5ff}
  .mbox .lid{text-align:center;font-weight:800;color:#1d4ed8;margin-bottom:8px}
  .mbox .tags{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
  .mbox .tag{background:#fff;border:1px solid #c7dbfb;color:#1e3a8a;border-radius:999px;padding:6px 11px;font-size:.82rem;font-weight:600}

  .flow{display:flex;flex-direction:column;gap:0}
  .flow .node{background:#f1faf4;border:1px solid #bfe7d6;border-left:5px solid var(--m7);border-radius:14px;padding:11px 14px}
  .flow .node .n{font-weight:800;color:#15803d}
  .flow .node .d{font-size:.85rem;color:var(--muted)}
  .flow .arr{align-self:center;color:var(--m7);margin:5px 0}
  .flow .arr svg{width:22px;height:22px}

  .chain .lvl{display:flex;align-items:center;gap:12px;border-radius:14px;padding:11px 13px;margin:7px 0;color:#0f3b2a}
  .chain .lvl .conc{margin-left:auto;font-size:.72rem;font-weight:800;background:rgba(255,255,255,.7);border-radius:999px;padding:3px 9px}
  .chain .lvl .n{font-weight:800}
  .chain .lvl .d{font-size:.82rem;opacity:.85}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;margin:12px 0;box-shadow:var(--shadow)}
  .panel.accent{border-left:6px solid var(--brand)}
  .note{font-size:.86rem;color:var(--muted);background:#fff7ea;border:1px dashed #f0d9a8;border-radius:14px;padding:13px;margin:12px 0}
  .field label{font-weight:700;display:block;margin:.7em 0 .25em}
  input[type=text],textarea,select{width:100%;font:inherit;padding:12px 13px;border:2px solid var(--line);border-radius:13px;background:#fff;min-height:46px}
  textarea{min-height:78px;resize:vertical}
  .search{width:100%;font-size:1.05rem;padding:14px 16px;border:2px solid var(--line);border-radius:15px;min-height:52px;background:#fff}
  .empty{color:var(--muted);padding:18px 0;text-align:center}
  .saved{display:none;background:#dff4ec;color:#0b6b4f;border-radius:999px;padding:7px 13px;font-weight:800;font-size:.84rem}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important}
    .breath .ball{transition:none !important}
  }
</style>
</head>

</header>
<main id="main" tabindex="-1" class="wrap"></main>

  <a href="#/home" data-tab="home"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 11l8-7 8 7"/><path d="M6 10v9h12v-9"/></svg><span>Home</span><span class="dot"></span></a>

  <a href="#/search" data-tab="search"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><span>Search</span><span class="dot"></span></a>
  <a href="#/passport" data-tab="passport"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="4" width="16" height="16" rx="3"/><circle cx="12" cy="10" r="2.4"/><path d="M8 17a4 4 0 0 1 8 0"/></svg><span>Passport</span><span class="dot"></span></a>
  <a href="#/about" data-tab="about"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 4h14v16H5z"/><path d="M8 9h8M8 13h8M8 17h5"/></svg><span>Rules</span><span class="dot"></span></a>

<script id="data" type="application/json">{"modules": [{"key": "Intro", "label": "Getting Started", "ids": [1], "c1": "#f59e0b", "c2": "#f97316", "icon": "sun"}, {"key": "M01", "label": "Communication and Emotional Regulation", "ids": [2, 3, 4, 5], "c1": "#14b8a6", "c2": "#0d9488", "icon": "chat"}, {"key": "M02", "label": "Gender Norms, Masculinities, and Boys' Health", "ids": [6, 7, 8, 9], "c1": "#3b82f6", "c2": "#2563eb", "icon": "people"}, {"key": "M03", "label": "Sexual and Reproductive Health", "ids": [10, 11, 12, 13], "c1": "#8b5cf6", "c2": "#7c3aed", "icon": "shield"}, {"key": "M04", "label": "Healthy Relationships and Assertiveness", "ids": [14, 15, 16, 17], "c1": "#ec4899", "c2": "#db2777", "icon": "hearts"}, {"key": "M05", "label": "Mental and Physical Health", "ids": [18, 19, 20, 21], "c1": "#06b6d4", "c2": "#0891b2", "icon": "pulse"}, {"key": "M06", "label": "Substance Use and Refusal Skills", "ids": [22, 23, 24, 25], "c1": "#f97316", "c2": "#ea580c", "icon": "stop"}, {"key": "M07", "label": "Environmental Health and Climate Resilience", "ids": [26, 27, 28, 29], "c1": "#16a34a", "c2": "#15803d", "icon": "leaf"}, {"key": "Conclusion", "label": "Looking Back, Looking Forward", "ids": [30], "c1": "#64748b", "c2": "#475569", "icon": "flag"}, {"key": "Booster", "label": "Skills Review and Renewal (Booster)", "ids": [31], "c1": "#0ea5e9", "c2": "#0284c7", "icon": "star"}], "sessions": [{"id": 1, "module": "Intro", "title": "Welcome, Ground Rules, and Getting Started", "learning": [], "keyConcepts": [{"heading": "What THRIVE-Belize is", "body": "THRIVE-Belize stands for a life-skills program designed here in Belize, for Belizean students like you. It has 7 modules -- think of them as 7 big topics -- and 31 sessions total, including today."}, {"heading": "The 7 Modules", "body": "Module 1: Communication and Emotional Regulation -- how we express ourselves and manage our emotions. Module 2: Gender Norms and Equality -- how ideas about gender affect our lives and relationships. Module 3: Sexual and Reproductive Health -- understanding our bodies, staying healthy, and making informed decisions. Module 4: Healthy Relationships -- what makes a relationship respectful and what does not. Module 5: Mental Health and Well-Being -- taking care of our minds, recognising stress, and knowing when to ask for help. Module 6: Substance Use Prevention -- understanding risks and making choices about alcohol and drugs. Module 7: My Environment and Future -- connecting our skills to our community and our goals."}, {"heading": "This program is a skills programme", "body": "This program is a skills programme. It is not counselling. It is not therapy. We are going to learn and practise skills together as a group. If anything comes up that you want to talk about one-on-one, I will tell you who to go to -- but this space is about learning together."}, {"heading": "The 5-part session structure", "body": "After today, every regular session will follow a 5-part structure: Part 1: Check-in -- we start by connecting and reviewing what we learned last time. Part 2: Learn -- I introduce new information or a new skill. Part 3: Practise -- you try out the skill through an activity, role-play, or discussion. Part 4: Reflect -- we talk about what we learned and how it connects to real life. Part 5: Close -- we wrap up and I tell you what is coming next."}, {"heading": "The session sequence", "body": "Sessions 2-5: Communication and Emotional Regulation. Sessions 6-9: Gender Norms, Masculinities, and Boys' Health. Sessions 10-13: Sexual and Reproductive Health. Sessions 14-17: Healthy Relationships and Assertiveness. Sessions 18-21: Mental and Physical Health. Sessions 22-25: Substance Use and Refusal Skills. Sessions 26-29: Environmental Health and Climate Resilience. Session 30 is our closing session, and Session 31 is a booster review a few weeks after we finish."}, {"heading": "Your THRIVE-Belize Passport", "body": "In a moment, I am going to give you a handout called your THRIVE-Belize Passport. Think of it as your personal record for this programme. You do not have to put your name on it if you do not want to. After each module, you will write down one thing you learned. By the end, you will have a record of your whole journey."}, {"heading": "Confidentiality and its limits", "body": "We agree that what is shared here stays here. But there is a limit. If I hear that someone is being hurt or is in danger -- or if someone tells me they are going to hurt themselves -- I have a responsibility to get help. That is not breaking trust. That is keeping you safe."}, {"heading": "Right to pass", "body": "You always have the right to pass. If I ask a question or we do an activity and you do not want to share, you can say 'I pass.' No one will pressure you. That is a rule of this program."}], "remember": ["Respect -- We treat each other with respect, even when we disagree.", "Listen -- When someone is talking, we listen. One voice at a time.", "No put-downs -- No laughing at someone, no insults, no mocking -- not even as a joke.", "Right to pass -- Anyone can say 'I pass' and that is okay.", "Confidentiality -- What people share in this room stays in this room.", "Open mind -- We come in willing to learn something new."], "vocabulary": [], "reflection": ["My goal for this programme: write one thing you hope to get from this programme. It can be a skill, a piece of knowledge, a feeling -- anything."], "practiceAtHome": []}, {"id": 2, "module": "M01", "title": "Understanding Our Emotions", "learning": ["Learn to name and organize your emotions using the Feelings Map", "Discover how emotions show up in your body", "Practice noticing emotional clues"], "keyConcepts": [{"heading": "Identifying emotions through clues", "body": "We can identify emotions in ourselves and others by paying attention to clues. External clues include facial expressions, body language, tone of voice, and behaviors. Internal clues include physical sensations we feel in our bodies. Becoming good at recognizing emotion clues helps us understand ourselves and others better."}, {"heading": "The two dimensions of emotions", "body": "All emotions can be understood using two dimensions: whether they are pleasant or unpleasant, and whether they increase or decrease our energy. There are no 'bad' emotions -- all emotions give us important information. Understanding which category our emotions fall into helps us choose helpful ways to respond to them."}, {"heading": "The Four-Quadrant Feelings Map", "body": "Emotions can be organized into four categories based on two dimensions: Pleasant or Unpleasant (does the emotion feel good or bad?) and Activating or Deactivating (does the emotion give you energy or take away energy?). UNPLEASANT + ACTIVATING (high energy, feels bad): angry, worried, frustrated, nervous, tense. PLEASANT + ACTIVATING (high energy, feels good): excited, happy, joyful, energized, proud. UNPLEASANT + DEACTIVATING (low energy, feels bad): sad, tired, bored, lonely, hopeless. PLEASANT + DEACTIVATING (low energy, feels good): calm, content, relaxed, peaceful, grateful."}, {"heading": "Your body gives you clues about what you are feeling", "body": "Your body gives you clues about what you are feeling. Different emotions show up in different parts of your body. When you notice these body clues early, you can respond to your emotions in helpful ways before they become overwhelming. Everyone's body-emotion connection is a little different, so it is important to learn your own patterns."}, {"heading": "Common body clues for emotions", "body": "Anxiety or Worry: Racing heart, upset stomach or butterflies, sweaty palms, tense muscles. Anger or Frustration: Hot face, tight jaw or clenched fists, tension in shoulders and neck, fast breathing. Sadness: Heavy feeling in chest, tired or low energy, lump in throat, tears. Happiness or Excitement: Light, energized feeling all over, smiling, relaxed face, warmth in chest, feeling like you want to move or dance."}], "remember": ["All emotions are normal. There are no 'bad' emotions.", "Your body gives you clues about what you are feeling.", "Noticing these clues early helps you respond to your emotions in helpful ways.", "Everyone's body-emotion connection is a little different.", "If physical or emotional changes last more than two weeks, talk to a trusted adult."], "vocabulary": [{"term": "Emotional vocabulary", "definition": "The words we use to name and describe emotions."}, {"term": "Pleasant", "definition": "An emotion that feels good."}, {"term": "Unpleasant", "definition": "An emotion that feels uncomfortable or bad."}, {"term": "Activating", "definition": "Emotions that give us energy and make us want to move or do something."}, {"term": "Deactivating", "definition": "Emotions that take away our energy and make us feel calm or tired."}, {"term": "Body-emotion connection", "definition": "The way different emotions show up as physical sensations in different parts of your body."}, {"term": "Self-awareness", "definition": "Noticing and understanding your own feelings and reactions."}], "reflection": ["What is one new emotion word you learned today that you might use to describe your feelings?", "How might the Feelings Map help you in your daily life -- at school, at home, or with friends?", "Why is it important to notice how emotions show up in our bodies?"], "practiceAtHome": ["Sometime today or this week, notice one emotion you feel. It could be any emotion -- big or small. Ask yourself: 1. What emotion am I feeling? (Try to name it.) 2. Where do I feel this emotion in my body? 3. If I put this emotion on the Feelings Map, which quadrant would it go in?", "If you feel comfortable, share your observation with a family member or friend. You might even teach them about the Feelings Map!"]}, {"id": 3, "module": "M01", "title": "Calming the Storm", "learning": ["When emotions feel too big or overwhelming, you have the power to calm yourself.", "Learn three body-based strategies that you can use anytime, anywhere: Deep Breathing -- Slow your heart rate and relax your body; Progressive Muscle Relaxation -- Release physical tension; 5-4-3-2-1 Grounding -- Focus on the present moment when your mind is racing."], "keyConcepts": [{"heading": "Strategy 1: Deep Breathing -- Box Breathing (4-4-4-4)", "body": "When you focus on your breathing and breathe slowly, your heart rate slows and your muscles relax. Box Breathing has four steps, each taking four seconds: Breathe IN through your nose for 4 counts. HOLD your breath for 4 counts. Breathe OUT through your mouth for 4 counts. REST for 4 counts. Repeat 2-3 times. When to use: During a test, before a difficult conversation, when you feel anxious or upset, before bed. Why it works: Slowing your breathing slows your heart rate and relaxes your muscles. Your body calms down, and your mind follows."}, {"heading": "Strategy 1: Deep Breathing -- Hand-Tracing Breathing", "body": "Hold one hand in front of you, palm facing you. Use your other hand's finger to trace along your fingers. Breathe IN as you trace UP the outside of your thumb. Breathe OUT as you trace DOWN the inside of your thumb. Continue with each finger (5 fingers = 5 deep breaths). You can do this with your hand on your lap, under your desk -- it just looks like you're tracing your hand. No one has to know you're calming yourself down."}, {"heading": "Strategy 2: Progressive Muscle Relaxation (Tense and Release)", "body": "Your body holds tension when you're stressed, anxious, or upset. By tensing and then releasing your muscles, you teach your body what relaxation feels like. Steps: 1. Start with deep breathing (take 1-2 deep breaths). 2. Tense one muscle group for 5 seconds. 3. Release and notice the difference. 4. Move to the next muscle group. Muscle groups to practice: Feet -- curl your toes tight, then release. Legs -- squeeze your thigh and calf muscles, then release. Hands -- make fists, squeeze tight, then release. Shoulders -- pull shoulders up to your ears, then release and drop. Face -- scrunch your face tight, then release and smooth. When to use: Before bed (helps you fall asleep), when your body feels tense or tight, after a stressful day, when you notice your shoulders or jaw are clenched. Why it works: Your body holds tension when you're stressed. By tensing and releasing muscles, you teach your body what relaxation feels like."}, {"heading": "Strategy 3: 5-4-3-2-1 Grounding", "body": "Grounding means focusing on the present moment instead of anxious or overwhelming thoughts. Using your five senses helps bring your attention back to what's real and happening right now. Steps: 1. Take a deep breath. 2. Name 5 things you can SEE. 3. Name 4 things you can FEEL (physically -- what's touching your body). 4. Name 3 things you can HEAR. 5. Name 2 things you can SMELL. 6. Name 1 thing you can TASTE. 7. Take another deep breath. When to use: When your mind is racing with worry, when emotions feel out of control, when you feel disconnected or numb, after something upsetting happens. Why it works: Grounding brings your attention back to the present moment. It interrupts anxious or overwhelming thoughts by focusing on what's real and happening right now."}], "remember": ["All emotions are valid. There are no 'wrong' emotions to feel.", "You have power over your responses. Even when you can't control what happens to you, you can control how you respond.", "Practice makes it easier. The more you use these strategies, the more automatic they become.", "Not every technique works for everyone. Try all three, then use what works best for you."], "vocabulary": [{"term": "Emotion regulation", "definition": "The ability to manage and respond to strong emotions in helpful ways."}, {"term": "Deep breathing", "definition": "A strategy of breathing slowly and deliberately to slow the heart rate and relax the body."}, {"term": "Progressive Muscle Relaxation", "definition": "A strategy of tensing and then releasing different muscle groups to release physical tension."}, {"term": "Grounding", "definition": "A strategy of focusing on the present moment using the five senses to interrupt overwhelming thoughts or emotions."}], "reflection": ["Which technique felt most natural to you? Which one do you think you'd actually use?", "When might you use each one? For example, when would breathing help? When would muscle relaxation help? When would grounding help?", "Which sense was easiest to focus on during 5-4-3-2-1? Which was hardest?", "How did your mind feel after the grounding exercise? Did it slow down, or feel clearer?"], "practiceAtHome": ["Practice one breathing technique before bed each night this week. It can help you fall asleep and gives you a chance to build the habit.", "If you feel comfortable, you can teach the hand-tracing breathing technique to a younger sibling or family member.", "Remember: This is optional. No one will check. The important thing is that YOU know these strategies and can use them when you need them."]}, {"id": 4, "module": "M01", "title": "Speaking and Listening with Heart", "learning": ["Body Language Awareness -- Your body communicates even when you're silent", "Active Listening -- How to really hear and understand others", "'I' Statements -- How to express your feelings without blaming others", "These skills will help you in every part of your life: with friends, family, teachers, and anyone you want to understand and be understood by."], "keyConcepts": [{"heading": "Body Language", "body": "Body language is communication without words. Your face, posture, gestures, and tone of voice send messages to others. If your words say one thing but your body says another, people usually believe your body. Different cultures use body language differently -- what's respectful in one culture may be different in another. Pay attention to what your body is 'saying' when you communicate."}, {"heading": "SOLER Active Listening", "body": "Active listening means paying full attention to the speaker, understanding what they say, and responding to show you heard them. It's different from just 'hearing' -- it's REALLY listening. S -- Sit (or Stand) facing the speaker: Turn your body toward the person talking. Show them they have your full attention. O -- Open posture: Uncross your arms. Relax your body. Don't create barriers between you and the speaker. L -- Lean slightly toward the speaker: Shows you're interested in what they're saying. Don't lean too close (respect personal space). E -- Eye contact (appropriate to your culture): Look at the speaker when they talk. In some cultures, looking down shows respect to elders -- that's okay too. Avoid staring at your phone, the floor, or other distractions. R -- Relax: Don't fidget or interrupt. Let the speaker finish before you respond. Take a breath if you feel the urge to interrupt."}, {"heading": "Active Listening in Three Steps", "body": "FOCUS -- Give the speaker your full attention (use SOLER). CONFIRM -- Summarize what you heard ('So you're saying...'). RESPOND -- Show understanding ('I hear you' or 'That makes sense')."}, {"heading": "Why Active Listening Matters", "body": "Makes people feel respected and valued. Helps you understand others better. Reduces misunderstandings and conflicts. Builds trust in relationships. Shows you care about what the other person thinks and feels."}, {"heading": "The Three Communication Styles", "body": "Passive: Say nothing, keep feelings inside. Result: You feel bad, problem continues. Aggressive: Attack or blame ('You're so rude!'). Result: They feel bad, conflict grows. Assertive: Express feelings respectfully ('I feel hurt when...'). Result: Both people understand, problem can be solved. Assertive communication is the best choice because it respects BOTH people."}, {"heading": "The 'I' Statement Formula", "body": "An 'I' statement is a way to express your feelings without blaming the other person. It is ASSERTIVE communication -- honest AND respectful. The formula: I feel _______ (emotion) when _______ (specific situation) because _______ (reason why it matters). 'I feel' -- Name the emotion. Use emotion words from Session 2: frustrated, hurt, disappointed, worried, confused, ignored, etc. NOT 'I feel LIKE you're mean' -- that's blaming, not feeling. 'when' -- Describe the specific situation. Be specific: 'when you interrupt me' NOT 'when you're mean.' Focus on the behavior, not the person's character. 'because' -- Explain why it matters. Help the other person understand the impact."}, {"heading": "Examples of 'I' Statements", "body": "Example 1 -- Friend situation: Assertive (I Statement): 'I feel frustrated when you don't show up for our plans because I waited 30 minutes and I worry that you don't value our time together.' Example 2 -- Sibling situation: Assertive (I Statement): 'I feel annoyed when you borrow my clothes without asking because it's disrespectful and now I can't wear them when I need them.' Example 3 -- Parent situation: Assertive (I Statement): 'I feel unheard when you interrupt me because I need to finish explaining so you can understand my side.' Example 4 -- Peer pressure situation: Assertive (I Statement): 'I feel uncomfortable when you keep asking me to do something I said no to because I've already made my decision and I need you to respect it.'"}, {"heading": "Communication with heart", "body": "Communication with heart = Speaking honestly + Listening actively + Respecting both people. Communication with heart takes practice. You won't be perfect right away, and that's okay. Every time you notice your body language, really listen to someone, or use an 'I' statement instead of blaming, you're building skills that will help you for the rest of your life. Be patient with yourself. Be kind to others. Keep practicing."}], "remember": ["My body talks even when my mouth is quiet. Match my words with my body.", "Active listening means: FOCUS -- CONFIRM -- RESPOND.", "The 'I' Statement Formula: I feel _______ when _______ because _______.", "Communication with heart = Speaking honestly + Listening actively + Respecting both people."], "vocabulary": [{"term": "Nonverbal communication", "definition": "Communicating without words -- through body language, facial expressions, gestures, posture, and tone of voice."}, {"term": "Active listening", "definition": "Paying full attention to the speaker, understanding what they say, and responding to show you heard them."}, {"term": "Passive communication", "definition": "Saying nothing and keeping feelings inside, which allows problems to continue."}, {"term": "Aggressive communication", "definition": "Attacking or blaming the other person, which increases conflict."}, {"term": "Assertive communication", "definition": "Expressing your feelings honestly and respectfully -- it respects both people."}, {"term": "'I' statement", "definition": "A formula for expressing feelings without blaming: 'I feel ___ when ___ because ___.' It is assertive communication."}, {"term": "SOLER", "definition": "A framework for active listening: Sit facing the speaker, Open posture, Lean slightly forward, Eye contact (culturally appropriate), Relax and don't interrupt."}], "reflection": ["How did it feel to have someone really listen to you for a full minute?", "What was hard about listening without interrupting?", "What's the difference between 'You make me angry' and 'I feel angry when...'?", "Why is it important to name the specific situation ('when you interrupt') instead of making it general ('when you're mean')?", "Which was harder for you -- listening actively or expressing yourself with 'I' statements? Why?", "How could active listening help reduce conflicts at school? At home?", "What was the most important thing you learned today?", "Which communication skill do you want to practice most? Why?", "One way I will use my communication skills this week:"], "practiceAtHome": ["This week, try to use ONE 'I' statement with a friend, family member, or classmate. Notice what happens.", "Who did you talk to? What was the situation? What 'I' statement did you use? How did the other person respond? How did you feel afterward? What did you learn from this experience?"]}, {"id": 5, "module": "M01", "title": "Thinking It Through", "learning": ["Identify the three parts of the thoughts-feelings-actions triangle", "List at least three common thinking errors that teens experience", "Define the 'Catch It, Check It, Change It' strategy", "Value the importance of recognizing personal strengths", "Believe that thoughts can be questioned and changed", "Apply the thoughts-feelings-actions triangle to a real-life scenario", "Practice identifying thinking errors in example situations", "Use the three-step cognitive restructuring strategy with a personal example"], "keyConcepts": [{"heading": "Personal Strengths", "body": "A strength is something you're good at, a positive quality you have, or a skill you bring to challenges. It might be that you're a good listener, you're good at solving problems, you stay calm under pressure, you make people laugh, you're creative, you're persistent, or you're kind. Everyone has strengths. Think of your strengths as a shield that protects you when things are difficult. Remember them. When situations feel tough, your strengths are there to help you."}, {"heading": "The Thoughts-Feelings-Actions Triangle", "body": "Everything is connected. What you think affects how you feel. How you feel affects what you do. And what you do can change how you think and feel. Our thoughts, feelings, and actions are all connected. They influence each other. You can't always control what happens to you, but you CAN influence how you think about it. And that changes how you feel and what you do."}, {"heading": "The triangle in action -- same situation, different thoughts", "body": "Situation: Your friend walks past without saying hi. If you think 'They're ignoring me. They're mad at me.' -- You might feel sad, anxious, worried -- You might avoid them, feel bad all day. If you think 'Maybe they didn't see me. Or they're having a hard day.' -- You might feel calm, curious -- You might check in with them later, not worry. Same situation. Different thoughts. Different feelings. Different actions."}, {"heading": "Common Thinking Errors", "body": "We all make these thinking mistakes sometimes. Learn to spot them. All-or-Nothing: Seeing things as completely good or completely bad. Example: 'I failed one test, so I'm a total failure.' Mind Reading: Assuming you know what someone is thinking without evidence. Example: 'She didn't smile at me, so she must hate me.' Catastrophizing: Expecting the worst possible outcome. Example: 'If I mess up this presentation, everyone will laugh at me and I'll never recover.' Personalizing: Blaming yourself for things that aren't entirely your fault. Example: 'My friend is in a bad mood. It must be because of something I did.'"}, {"heading": "Catch It, Check It, Change It", "body": "This is your three-step strategy for changing unhelpful thoughts. Step 1: CATCH IT -- Notice the thought. What am I thinking right now? Step 2: CHECK IT -- Ask yourself two questions: Is this thought realistic? Is it really true? Is this thought helpful? Does it make me feel better or worse? Step 3: CHANGE IT -- Choose a more balanced, helpful thought. What's another way to think about this? Example: Situation -- You text a friend and they don't respond for 2 hours. Unhelpful thought: 'They're ignoring me. They don't care.' Thinking error: Mind reading. Balanced thought: 'They might be busy. I'll wait before I worry.'"}, {"heading": "Your Complete M01 Toolkit", "body": "You've now learned all four skills for managing emotions. Use them together or alone, depending on what you need. 1. NAME IT -- Use your feelings vocabulary to identify what you're feeling. 2. CALM IT -- Use breathing, muscle relaxation, or grounding to calm your body. 3. SAY IT -- Use 'I' statements and active listening to communicate your feelings. 4. THINK IT -- Use the triangle and 'Catch-Check-Change' to shift unhelpful thoughts."}], "remember": ["You don't have to believe every thought that comes into your head.", "Changing your thoughts takes practice. Be patient with yourself.", "You have strengths. Use them.", "You now have a complete toolkit for managing emotions. Use it."], "vocabulary": [{"term": "Personal strength", "definition": "Something you're good at, a positive quality you have, or a skill you bring to challenges."}, {"term": "Thoughts-Feelings-Actions Triangle", "definition": "A model showing that thoughts, feelings, and actions are all connected and influence each other. Changing any one of the three can affect the other two."}, {"term": "Thinking error", "definition": "An automatic, unhelpful thought pattern that is not completely accurate. Common examples: all-or-nothing thinking, mind reading, catastrophizing, and personalizing."}, {"term": "All-or-nothing thinking", "definition": "Seeing things as completely good or completely bad, with no middle ground."}, {"term": "Mind reading", "definition": "Assuming you know what someone else is thinking without evidence."}, {"term": "Catastrophizing", "definition": "Expecting the worst possible outcome."}, {"term": "Personalizing", "definition": "Blaming yourself for things that aren't entirely your fault."}, {"term": "Cognitive restructuring", "definition": "The process of catching an unhelpful thought, checking if it is accurate, and choosing a more balanced thought."}, {"term": "Catch It, Check It, Change It", "definition": "A three-step strategy: (1) notice the unhelpful thought, (2) ask whether it is realistic and helpful, (3) choose a more balanced thought."}], "reflection": ["What was it like to think about your strengths?", "Did anyone discover a strength you hadn't thought about before?", "Can you think of a time when your thought about a situation made you feel worse?", "Can changing your thought really change how you feel? Do you believe that?", "Are unpleasant emotions always bad? When might an unpleasant emotion be helpful?", "Which of these four skills (Name It, Calm It, Say It, Think It) do you think will be most useful to you?", "Which thinking error do you think you notice most in your own thoughts?", "Was it difficult to come up with a more balanced thought? Why or why not?", "What is one thing you learned in this module that you will try to use in your daily life?"], "practiceAtHome": ["This week, try to catch one unhelpful thought and ask yourself: 'Is this thought really true? What's another way to think about this?'", "If you feel comfortable, share what you discovered with someone you trust -- a friend, family member, or teacher."]}, {"id": 6, "module": "M02", "title": "What Makes a Boy? What Makes a Girl?", "learning": ["Distinguish between biological sex (physical traits people are born with) and gender (roles, expectations, and behaviors that society assigns to boys and girls).", "Recognize that most differences between boys and girls are learned from society -- not fixed by nature -- and can be questioned.", "Identify at least one gendered expectation in their own daily life (e.g., household tasks, school roles) and describe how it could be made more equitable."], "keyConcepts": [{"heading": "What is Gender? What is Sex?", "body": "Gender is what society teaches us about how boys and girls should act. Sex is what our bodies are born with. Most differences between boys and girls are created by society, not biology. Because gender is learned, it can be questioned and changed."}, {"heading": "Who Does the Work?", "body": "In many families, women do unpaid household work while men do the same work for pay outside the home. Household work is real work and is essential for families. Boys and men can -- and should -- share household responsibilities."}, {"heading": "Where Do We Learn Gender Rules?", "body": "Gender rules come from many sources: families, friends, schools, media, religion, and culture. These rules are not laws of nature -- they are traditions and habits that people created. Because people created them, people can question and change them."}], "remember": ["Sex is biological -- it is about the body you are born with. Gender is social -- it is about the expectations society teaches us.", "Most traits we think of as 'boy things' or 'girl things' are actually learned. Both boys and girls can be strong, caring, hardworking, and emotional.", "Gender rules come from families, schools, media, peers, and culture. Because these rules are created by people, they can be questioned and changed."], "vocabulary": [{"term": "Sex", "definition": "Biological -- what your body is born with. The traits that ONLY belong to one side (e.g., can become pregnant, has a deeper voice at puberty)."}, {"term": "Gender", "definition": "Social -- the rules and expectations society teaches us about how boys and girls should act. If gender is learned, it means it can be questioned. It means it can be changed."}], "reflection": ["Were you surprised that most traits could belong to either boys or girls?", "Where do you think these ideas about boys and girls come from?", "In your home, do you help with household work? What do you do?", "Have you ever been told 'that is not a boy's job' or 'that is not a girl's job'? How did that feel?", "Which source of gender messages do you think is the most powerful? Why?", "Can you think of a gender rule that has changed over time?"], "practiceAtHome": ["If you would like, notice one gender rule in action this week -- at home, at school, or in your community. Think about where that rule comes from and whether it is fair. You can share what you noticed at the start of our next session.", "This week, notice one 'gender rule' in action -- at home, at school, or in your community. Ask yourself: What is the rule? (e.g., 'Boys carry heavy things; girls wash dishes.') Where does it come from? (Family? School? Media? Peers? Culture?) Is it fair? Could it be changed? You may share what you noticed at the start of the next session if you wish."]}, {"id": 7, "module": "M02", "title": "The Man Box", "learning": ["Describe the 'Man Box' -- the set of rigid expectations society places on boys -- and list at least five messages that pressure boys to conform.", "Recognize that the Man Box limits boys' emotional expression and wellbeing, and believe that challenging these pressures is a sign of strength, not weakness.", "Identify which emotions they personally show versus hide because of masculinity pressures, and express one hidden emotion using an 'I feel...' statement (building on M01)."], "keyConcepts": [{"heading": "The Man Box", "body": "The 'Man Box' is a set of rigid expectations that society places on boys and men about how they should act, feel, and behave. These messages are not rules of nature -- they are taught by families, peers, media, and culture. The Man Box affects every boy, regardless of background. Messages inside the Man Box include: Be tough / Do not cry / Be strong / Do not show fear / Do not ask for help / Fight back / Stand your ground / Be the provider / Make money / Do not do 'girl things' / Be in control / Do not let anyone disrespect you / Do not show weakness."}, {"heading": "Inside and Outside the Box", "body": "Boys who step outside the Man Box often face teasing, name-calling, exclusion, or violence. But staying inside the box also has costs: stress, loneliness, poor health, damaged relationships, and an inability to express how you really feel. Real strength is not about staying in the box -- it is about being true to yourself."}, {"heading": "My Mask -- Emotions We Show and Emotions We Hide", "body": "The Man Box tells boys to show some emotions (anger, toughness) and hide others (fear, sadness, love). Hiding emotions does not make them go away -- it makes them build up. Using the 'I feel...' statements from Module 1 is a way to step outside the box safely."}], "remember": ["Staying in the box is not strength. Real strength is being honest about how you feel and treating yourself and others well -- even when the box says otherwise.", "The Man Box hurts boys in two ways: if you step outside, you get punished. If you stay inside, you pay a price in stress, loneliness, and poor health.", "Every person wears a mask sometimes. The goal is not to take it off completely -- it is to know that you CHOOSE when to wear it, instead of the Man Box choosing for you.", "Real strength is not about fitting in the box. Real strength is honesty about how you feel and courage to treat yourself and others well."], "vocabulary": [{"term": "Man Box", "definition": "The set of rigid expectations that society places on boys and men about how they should act, feel, and behave. Messages like 'be tough,' 'do not cry,' and 'do not ask for help.'"}, {"term": "Mask", "definition": "The face you show to the world -- the emotions you let others see (OUTSIDE). The emotions you keep hidden -- the ones you feel but do not show (INSIDE)."}], "reflection": ["Can you think of a man or boy you admire who does NOT fit neatly in the Man Box? What makes him admirable?", "Using your emotional vocabulary from M01: how does it feel to be pressured to stay in the box?", "Was it easy or hard to fill in the inside of your mask? Why?", "Do you think girls' masks would look different? How?", "What is ONE Man Box message you would like to challenge?"], "practiceAtHome": ["This week, notice one time when you -- or a boy you know -- feels pressured to stay in the Man Box. What is the pressure? How does it feel? You may share at the start of our next session.", "This week, notice one time when you (or a boy you know) feels pressured to hide an emotion because of the Man Box. Ask yourself: What emotion was being hidden? What was the pressure? Who or what caused it? How did it feel to hide that emotion? You may share at the start of the next session if you wish."]}, {"id": 8, "module": "M02", "title": "When Gender Hurts -- Boys' Health", "learning": ["Identify at least three ways that Man Box pressures create health risks for boys (e.g., avoiding help-seeking, bottling stress, risk-taking behaviors).", "Believe that asking for help with health concerns -- physical or emotional -- is a sign of taking charge of one's wellbeing, not a sign of weakness.", "Practice asking for help using 'I' statements (from M01) in a scenario and identify at least one trusted person they could turn to for a health concern."], "keyConcepts": [{"heading": "Boys' Health", "body": "Boys' health includes physical health, mental health, and emotional wellbeing. Many health issues boys face are connected to the pressures of the Man Box. Being aware of your health is the first step to taking care of it."}, {"heading": "Man Box Meets Health", "body": "The Man Box is not just about feelings -- it directly damages boys' health. When boys are told 'don't ask for help,' they avoid doctors, counsellors, and trusted adults -- and health problems get worse. Taking care of your health is not weakness. It is taking charge of your own wellbeing. Man Box messages and their health connections: 'Be tough / don't cry' leads to bottled-up stress, anxiety, headaches, stomachaches. 'Don't ask for help' leads to avoiding doctors and counsellors so health problems worsen. 'Fight back / stand your ground' leads to physical injuries, trouble at school, violence. 'Take risks / prove yourself' leads to substance use (vaping, alcohol), dangerous behavior. 'Don't show weakness' leads to hiding mental health struggles, depression, self-harm."}, {"heading": "Breaking Through: Asking for Help", "body": "Everyone needs support. Having people you can turn to is a sign of strength, not weakness. Asking for help is a SKILL -- and like any skill, it gets easier with practice. You already have people who care about you. The first step is knowing who they are."}], "remember": ["Taking care of your health -- physical AND mental -- is one of the strongest, most responsible things you can do. The Man Box says otherwise. But now you know better.", "Asking for help is not weakness -- it is wisdom. And now you have both the skills and the network to do it.", "Asking for help is a SKILL, not a failure.", "Taking care of your health -- physical AND mental -- is one of the strongest things you can do.", "You do not have to handle everything alone. That is what support networks are for.", "If you ever feel unsafe or in crisis, tell a trusted adult right away."], "vocabulary": [{"term": "Health Support Network", "definition": "The people and places in your life that you can count on when you need help with a health concern -- physical, mental, or emotional. Inner Circle: people you trust most (could talk to about anything). Middle Circle: helpful adults who could help even if you do not know them well. Outer Circle: services and places you could go to for help."}, {"term": "'I feel...I need...' statement", "definition": "A format from Module 1 for asking for help: 'I feel ________ and I have been experiencing ________. I need ________.' Example: 'I feel stressed and I have been having headaches for two weeks. I need someone to listen and help me figure out what to do.'"}], "reflection": ["Which Man Box message do you think causes the most health damage? Why?", "Do you think girls face similar health pressures from their 'box'? How might it be different?", "What made it easier to ask for help? What made it harder?", "How can you be a good support person for someone else?", "Turn to a partner and complete this sentence: 'One thing I will do differently for my health after today is _______.'"], "practiceAtHome": ["If you are comfortable, show your Health Support Network to one person on it this week and thank them for being someone you trust. You do not have to explain the activity -- just let them know they matter to you.", "This week, show your support network to one person on it. You do not have to explain the activity -- just let them know they matter to you. A simple 'thank you for being someone I can count on' goes a long way."]}, {"id": 9, "module": "M02", "title": "Stepping Outside the Box", "learning": ["Explain how gender-based power imbalances operate in everyday situations and describe at least one way to use personal power positively.", "Feel confident that they can challenge at least one harmful gender norm in their own life and support others who do the same.", "Write a personal Gender Equity Pledge with three specific commitments: one norm to challenge, one way to support a friend, and one health-positive action."], "keyConcepts": [{"heading": "The Privilege Walk", "body": "Boys and girls do not start from the same place in our society -- boys often have more freedoms and fewer restrictions. These privileges are not earned -- they come from gender norms. Recognizing privilege is the first step to using it responsibly. Privilege is not something to feel guilty about -- but it IS something to be aware of. When you know you have an advantage, you can choose to use it to help others, not to hold them down."}, {"heading": "Persons and Things -- Experiencing Power", "body": "Power exists in every relationship -- at home, at school, between genders, between ages. Being treated like a 'thing' (told what to do, denied choice) feels terrible. Being a 'person' with power over others creates responsibility. The goal is not to eliminate power, but to share it -- 'power WITH,' not 'power OVER.'"}, {"heading": "My Gender Equity Pledge", "body": "You have the power to change gender norms, starting with yourself. Change does not have to be dramatic. Small, consistent actions add up. Supporting others who break out of the box is just as important as breaking out yourself. The Pledge has three parts: Part 1 -- ONE MAN BOX MESSAGE I WILL CHALLENGE: Pick one message from the Man Box that you personally want to push back against and write what you will do differently. Part 2 -- ONE WAY I WILL SUPPORT A FRIEND: Think of a time when a friend might be pressured by the Man Box and write down how you will support them using active listening and 'I' statement skills from Module 1. Part 3 -- ONE HEALTH-POSITIVE ACTION I COMMIT TO: Pick one thing you will do to take care of your health -- physical or mental."}], "remember": ["Gender is learned. It can be questioned and changed.", "The Man Box hurts boys -- whether they stay inside or step outside.", "Asking for help is wisdom, not weakness.", "Real strength is being honest about who you are and treating yourself and others well.", "You have the power to change gender norms, starting with yourself.", "Power is a tool. Like any tool, it can build or destroy. Choose to build.", "This pledge is what you AIM for, not a contract. If you fall short, you try again.", "Keep your Pledge card, your Mask, and your Health Support Network. They are tools you can use anytime."], "vocabulary": [{"term": "Privilege", "definition": "Advantages and freedoms that come from gender norms rather than from being earned. These are not earned -- they come from the same gender norms we have been studying. And just like those norms, they can be changed."}, {"term": "Power OVER", "definition": "A way of using power where one person gives orders and the other has no choice. One wins, one loses. (Harmful.)"}, {"term": "Power WITH", "definition": "A way of using power where both people discuss and both have a voice. Both benefit. (Healthy.) Using the active listening skills from Module 1, you can share power by listening to others, respecting their choices, and speaking up when someone is being treated unfairly."}, {"term": "Gender Equity Pledge", "definition": "A personal commitment to step outside the Man Box: one norm you will challenge, one way you will support a friend, and one health-positive action you commit to. This is your commitment to yourself. You do not need anyone's permission to be true to who you are."}], "reflection": ["Were you surprised by the result of the Privilege Walk? Why or why not?", "How can boys use their privilege to help make things more fair?", "How did it feel to be told what to do? To have no choice?", "Using emotional vocabulary from M01: What emotion best describes how you felt as a 'Thing'?", "How did it feel to have power over someone else?", "Did anyone feel uncomfortable giving orders? Why?", "Where in real life are people treated like 'things' because of their gender? Think about home, school, relationships.", "How does the Man Box give boys 'Person' power in some situations and 'Thing' powerlessness in others?", "Can you think of a time when YOU had power over someone else? How did you use it?", "What does 'power with' look like in a friendship? In a family?", "What makes these pledges feel possible? What makes them feel hard?", "How can we hold each other accountable in a supportive way?"], "practiceAtHome": ["Share one thing you learned in this module with someone you trust -- a friend, a sibling, a parent. You do not have to use the exact activities. Just share one idea that stuck with you. That is how change spreads -- one conversation at a time.", "Share one thing you learned in this module with someone you trust. It could be: the difference between sex and gender; what the Man Box is and why it matters; why asking for help is a strength. Change spreads one conversation at a time."]}, {"id": 10, "module": "M03", "title": "My Changing Body", "learning": ["Identify at least five physical changes of puberty for both boys and girls, and name the key parts of the male and female reproductive systems.", "Accept that all bodies develop at different rates and that puberty changes are normal and healthy.", "Use positive self-talk to respond to a body-image concern and demonstrate respectful language when discussing body changes."], "keyConcepts": [{"heading": "What Is Puberty?", "body": "Puberty is when your body changes from a child's body to an adult's body. It is caused by hormones. Puberty includes physical changes (body), emotional changes (feelings), and social changes (how others treat you). Everyone goes through puberty, but at different times and speeds. There is no 'normal' timeline."}, {"heading": "Physical Changes (inside the body)", "body": "Things that happen to your body during puberty. Examples: body hair, growth spurts, voice changes, acne, menstruation, wet dreams, body odor."}, {"heading": "Emotional Changes (thought bubble above)", "body": "New feelings or moods you experience. Examples: mood swings, new attractions, feeling self-conscious, wanting more independence."}, {"heading": "Social Changes (outside the body)", "body": "How other people treat you differently as you grow up. Examples: more responsibility, people judge your appearance, treated more like an adult, peer pressure."}, {"heading": "What Is Self-Talk?", "body": "Self-talk is the conversation you have with yourself inside your head. It can be positive or negative, and it makes a big difference to how you feel."}, {"heading": "Positive Self-Talk Practice", "body": "When you notice a negative thought about your body, try replacing it with a positive one. The positive thought does not have to ignore the situation -- it just has to be kinder and truer. For example, instead of 'Nothing is wrong,' try 'This is normal and it will get easier.'"}, {"heading": "Remember from Module 1", "body": "If someone teases you about your body, you can use an 'I' statement: 'I feel hurt when you comment on my body. I need you to stop.'"}, {"heading": "Remember from Module 2", "body": "Many expectations about how bodies 'should' look are shaped by gender norms -- not biology. When you feel pressure to look a certain way, ask yourself: is this a real standard, or is it something society created?"}], "remember": ["Puberty is when your body changes from a child's body to an adult's body. It is caused by hormones.", "Puberty includes physical changes (body), emotional changes (feelings), and social changes (how others treat you).", "Everyone goes through puberty, but at different times and speeds. There is no 'normal' timeline.", "Positive self-talk helps you feel confident about your changing body.", "Teasing someone about their body is never okay."], "vocabulary": [{"term": "Puberty", "definition": "When the body changes from a child's body to a teenager's and eventually an adult's body. These changes are caused by chemicals in our body called hormones."}, {"term": "Hormones", "definition": "Chemicals in our body that cause puberty changes."}, {"term": "Physical changes", "definition": "Things that happen to your body during puberty. Examples: body hair, growth spurts, voice changes, acne, menstruation, wet dreams, body odor."}, {"term": "Emotional changes", "definition": "New feelings or moods you experience during puberty. Examples: mood swings, new attractions, feeling self-conscious, wanting more independence."}, {"term": "Social changes", "definition": "How other people treat you differently as you grow up. Examples: more responsibility, people judge your appearance, treated more like an adult, peer pressure."}, {"term": "Self-talk", "definition": "The conversation you have with yourself inside your head. It can be positive or negative, and it makes a big difference to how you feel."}], "reflection": ["Which category of change -- physical, emotional, or social -- do you think is hardest to deal with? Why?", "What is one thing you could do to take care of yourself during puberty?", "Why do you think people tease others about their bodies?", "Is it easier to have positive self-talk or negative self-talk? Why?", "How does it feel when a friend says something supportive about your body instead of something hurtful?", "Were you surprised that boys and girls share many of the same puberty changes?", "Why do you think puberty happens at different times for different people?"], "practiceAtHome": ["If you would like, practice one positive self-talk statement this week when you notice a negative thought about your body. You do not need to share this with anyone -- it is just for you.", "Take-Home Challenge (optional): This week, catch yourself having one negative thought about your body. Write it down below, then rewrite it as a positive self-talk statement. You do not need to share this with anyone -- it is just for you."]}, {"id": 11, "module": "M03", "title": "My Body, My Rules", "learning": ["Define consent and bodily autonomy, and explain at least three characteristics of valid consent (freely given, reversible, informed, enthusiastic, specific).", "Believe that every person has the right to decide what happens to their own body, and that asking for consent is a sign of respect -- not weakness.", "Demonstrate how to set a personal boundary using clear language, and identify whether consent is present or absent in a given scenario."], "keyConcepts": [{"heading": "What Is Consent?", "body": "Consent means freely agreeing to something without pressure, fear, or force. Use the FRIES test to check if consent is real."}, {"heading": "The FRIES Framework", "body": "F -- Freely given: No pressure, threats, or guilt. You choose because you WANT to, not because someone is forcing you. R -- Reversible: You can change your mind at ANY time. Saying yes before does not mean yes now. I -- Informed: You know exactly what you are agreeing to. No tricks or hidden information. E -- Enthusiastic: You actually want to -- not just going along to avoid conflict. S -- Specific: Saying yes to ONE thing does not mean yes to EVERYTHING. Each situation needs its own consent. Remember: If any of these are missing, it is NOT true consent."}, {"heading": "What Are Boundaries?", "body": "Boundaries are limits that protect your physical, emotional, and digital safety. Everyone has the right to set boundaries. Healthy boundaries are not rude -- they are respectful of yourself. You can set boundaries even with people you love or respect."}, {"heading": "My Boundary Circle", "body": "Think about your boundary circle: Inside the circle are things you are comfortable with. Outside the circle are things you are NOT comfortable with. Think about physical touch, personal space, your belongings, your personal information, and your digital life (phone, photos, social media)."}, {"heading": "What Can I Say to Set Boundaries?", "body": "Setting boundaries takes practice. Examples of clear, respectful language: If someone touches you without asking -- 'Please do not touch me. I did not give you permission.' If someone pressures you -- 'I said no. Please respect my decision.' (Using M01 'I' statement: 'I feel pressured when you keep asking. I need you to stop.') If someone shares your photo without asking -- 'That is my photo. Please delete it. You did not have my consent.' If someone keeps asking after you said no -- 'I already gave you my answer. No means no.' Tip: You do not need to explain WHY you are setting a boundary. 'No' is a complete answer. But if you want to explain, use an 'I' statement from Module 1: 'I feel ______ when ______. I need ______."}, {"heading": "Silence Is Not Consent", "body": "Silence or not saying 'no' is NOT the same as consent. Consent must be freely given -- pressure, guilt, or threats invalidate consent. Both boys and girls have the right to say no and have that respected."}, {"heading": "Consent Applies to Everyday Life", "body": "Consent is not just about sexual situations. Everyday examples: 'Your friend wants to borrow your phone. You say yes. That is consent.' 'Someone takes a photo of you without asking. That is NOT consent.' 'Your friend asks to copy your homework. You say no, but they keep asking until you give in. That is NOT true consent -- that is pressure.'"}], "remember": ["Consent means freely agreeing to something without pressure, fear, or force.", "Good consent is FRIES: Freely given, Reversible, Informed, Enthusiastic, Specific.", "Silence is not consent. Pressure is not consent. Having said yes before does not mean yes now.", "Everyone has the right to set boundaries, and everyone has the responsibility to respect them.", "Your body belongs to YOU. You have the right to say no, and you have the responsibility to respect when others say no.", "If someone does not respect your boundaries, it is NEVER your fault. And you can always tell a trusted adult."], "vocabulary": [{"term": "Consent", "definition": "Freely agreeing to something. It is given without pressure, fear, or force. It can be changed at any time."}, {"term": "Bodily autonomy", "definition": "Your right to decide what happens to your own body."}, {"term": "FRIES", "definition": "An acronym for the five elements of valid consent: Freely given, Reversible, Informed, Enthusiastic, Specific."}, {"term": "Boundary", "definition": "A limit that protects your physical, emotional, and digital safety."}, {"term": "Coercion", "definition": "Using pressure, threats, or guilt to make someone do something they would not freely choose."}], "reflection": ["Can you think of a time when someone did something without your permission? How did that feel?", "Why do you think people sometimes have trouble saying no?", "Which scenario was the hardest for your group to decide? Why?", "What makes it difficult for people to say no, even when they want to?", "Turn to a partner and share: what is one boundary that is important to you?"], "practiceAtHome": ["If you would like, notice one situation this week where consent was or was not asked for. Think about how it could have been handled better. You do not need to share this with anyone.", "Take-Home Challenge (optional): This week, practice two things: Setting a boundary: Say 'no' to something small but clearly. For example: 'No thank you, I do not want that.' Notice how it feels. Noticing consent: Observe one situation where consent was or was not asked for. Think about how it could have been handled better. You do not need to share this with anyone. This is for your own practice."]}, {"id": 12, "module": "M03", "title": "Staying Healthy", "learning": ["Explain the basics of the menstrual cycle, name at least three common STIs and how they are transmitted, and list at least two methods of preventing pregnancy.", "Believe that menstruation is a normal, healthy process (not shameful), that knowing about STIs and contraception is responsible (not inappropriate), and that both boys and girls have a responsibility to protect their sexual health.", "Correctly distinguish between SRH facts and myths in a quiz format, and identify where to access health services in their community."], "keyConcepts": [{"heading": "The Reproductive System", "body": "The reproductive system is a part of the human body -- understanding it is part of taking care of your health. Using correct names for body parts helps us communicate clearly about health. Both boys and girls benefit from understanding how reproduction works."}, {"heading": "Female Reproductive System", "body": "Ovaries -- produce eggs (one is released each month). Fallopian tubes -- carry eggs from the ovaries to the uterus. Uterus -- where a baby grows during pregnancy; builds up a lining each month. Vagina -- the canal leading from the uterus to outside the body."}, {"heading": "Male Reproductive System", "body": "Testes -- produce sperm. Vas deferens -- tubes that carry sperm. Penis -- the external reproductive organ. Urethra -- carries both urine and sperm (at different times)."}, {"heading": "The Menstrual Cycle", "body": "Each month, an egg is released from the ovary (ovulation). The uterus builds up a lining of tissue to prepare for a possible pregnancy. If the egg is not fertilized, the lining is shed -- this is menstruation, or a period. This cycle repeats roughly every 28 days, though it varies from person to person. Key fact: The menstrual cycle is a normal, healthy process. It is a sign that the reproductive system is working as it should."}, {"heading": "STIs (Sexually Transmitted Infections)", "body": "STIs (sexually transmitted infections) are infections passed from one person to another through sexual contact. Common STIs include HIV, chlamydia, gonorrhea, syphilis, herpes, and HPV. Many STIs have NO visible symptoms -- you cannot tell if someone has one by looking. STIs can be prevented (abstinence, barrier methods). STIs can affect ANYONE regardless of gender, age, or background. Getting tested and treated early is important."}, {"heading": "STI Fact Card", "body": "Chlamydia -- spreads through sexual contact -- often NO symptoms -- can be cured with antibiotics. Gonorrhea -- spreads through sexual contact -- discharge, burning -- can be cured with antibiotics. Syphilis -- spreads through sexual contact -- sores, rash -- can be cured with antibiotics. HIV -- spreads through sexual contact, blood, mother to child -- often NO symptoms early -- no cure, but treatment lets people live healthy lives. HPV -- spreads through sexual contact and skin contact -- warts or NO symptoms -- no cure, but often clears on its own; vaccine available. Herpes -- spreads through sexual contact and skin contact -- sores/blisters -- no cure, but treatment reduces symptoms. Key message: 'You CANNOT tell if someone has an STI by looking at them. Many STIs have no symptoms.'"}, {"heading": "Prevention Methods", "body": "The most effective way to prevent both pregnancy and STIs is abstinence -- choosing not to have sex. If someone does choose to have sex, using contraception (like condoms) every time helps prevent both pregnancy and STIs. Both partners share responsibility for protection -- not just one person. Young people have the right to accurate information about how to protect their health. Key message: 'Only abstinence and condoms protect against BOTH pregnancy and STIs.' Remember: Both partners share responsibility for protection. This is not only a girl's responsibility or only a boy's responsibility."}, {"heading": "Prevention Methods Table", "body": "Abstinence (not having sex) -- Prevents Pregnancy: YES -- Prevents STIs: YES. Male condom -- Prevents Pregnancy: YES -- Prevents STIs: YES. Female condom -- Prevents Pregnancy: YES -- Prevents STIs: YES. Birth control pills -- Prevents Pregnancy: YES -- Prevents STIs: NO. Injectable (Depo-Provera) -- Prevents Pregnancy: YES -- Prevents STIs: NO."}, {"heading": "Where to Get Help", "body": "If you have questions about reproductive health, or if you need testing or treatment, these services are available in your area: Punta Gorda Community Hospital. Local health posts and clinics. School counselor or trusted teacher. You have the right to confidential health services."}], "remember": ["The menstrual cycle is a normal, healthy process -- not dirty or shameful.", "STIs are infections passed through sexual contact. Common STIs include HIV, chlamydia, gonorrhea, syphilis, herpes, and HPV.", "Many STIs have no symptoms -- you cannot tell if someone has one by looking.", "Abstinence (not having sex) is the only method that is 100% effective at preventing both pregnancy and STIs.", "Condoms are the only method that protects against both pregnancy and STIs for people who are sexually active.", "Both boys and girls share responsibility for protecting their sexual health.", "Getting tested and treated early is important. Health services are confidential."], "vocabulary": [{"term": "Menstruation", "definition": "When the uterine lining is shed each month if the egg is not fertilized. Also called a period. A normal, healthy sign that the reproductive system is working as it should."}, {"term": "Ovulation", "definition": "When an egg is released from one of the ovaries. Happens roughly once a month."}, {"term": "STI (sexually transmitted infection)", "definition": "An infection
